<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Life of Christ — An Illustrated Chronicle</title>
<style>
  /* =====================================================================
     THEME — editorial + antique engraving illustrations. Ink on aged paper.
     ===================================================================== */
  :root {
    --paper: #ffffff;
    --paper-2:#f3f2ef;
    --ink:   #1b1b1b;
    --ink-2: #454138;
    --grey:  #7c7368;
    --line:  #1b1b1b;
    --sans: "Helvetica Neue", Helvetica, Arial, sans-serif;
    --serif: "Times New Roman", Times, Georgia, serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 78px; }
  body {
    margin: 0; padding-top: 52px; color: var(--ink);
    font-family: var(--sans); line-height: 1.5;
    background: var(--paper);
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
  @media (max-width: 640px){ .wrap { padding: 0 22px; } }

  /* ---------- Top navigation ---------- */
  .topnav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(255,255,255,.94); border-bottom: 1px solid var(--line); -webkit-backdrop-filter: blur(5px); backdrop-filter: blur(5px); }
  .topnav.is-visible { transform: none; }
  .topnav-inner { display: grid; grid-template-columns: auto minmax(0,1fr) minmax(180px,280px); align-items: center; gap: 20px; height: 52px; }
  .tn-mark { font-family: var(--serif); font-size: 18px; color: var(--ink); text-decoration: none; white-space: nowrap; }
  .tn-links { display: flex; align-items: center; justify-content: center; gap: 18px; overflow-x: auto; scrollbar-width: none; }
  .tn-links::-webkit-scrollbar { display: none; }
  .tn-links a { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--grey); text-decoration: none; white-space: nowrap; transition: color .15s ease; }
  .tn-links a:hover { color: var(--ink); }
  .tn-links a.is-here { color: var(--ink); }
  .tn-search-wrap { min-width: 0; }
  .tn-search {
    width: 100%; border: 1px solid var(--line); background: var(--paper); color: var(--ink);
    padding: 6px 10px; font: 12px var(--sans); letter-spacing: .04em; outline: none;
  }
  .tn-search::placeholder { color: var(--grey); }
  .tn-search:focus { border-color: var(--ink); }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  @media (max-width: 860px){ .topnav-inner { grid-template-columns: minmax(0,1fr) minmax(140px,190px); gap: 12px; } .tn-mark { display: none; } .tn-links { justify-content: flex-start; gap: 14px; } }
  @media (max-width: 520px){ .topnav-inner { grid-template-columns: minmax(0,1fr) 132px; } .tn-links { gap: 12px; } .tn-links a { font-size: 10px; } .tn-search { padding: 6px 8px; font-size: 11px; } }

  svg { display: block; }
  .art { fill: none; stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }

  /* ---------- Title block ---------- */
  .title-block { padding: 54px 0 40px; border-bottom: 2px solid var(--line); }
  .tb-grid { display: grid; grid-template-columns: minmax(0,1fr) minmax(250px,320px); gap: 40px; align-items: center; }
  @media (max-width: 780px){ .tb-grid { grid-template-columns: 1fr; gap: 28px; } .tb-emblem { display:block; } .tb-emblem svg { max-width: 280px; } }
  @media (max-width: 520px){ .tb-emblem svg { max-width: 240px; } }
  .title-block .overline { font-size: 12px; letter-spacing: .28em; text-transform: uppercase; color: var(--grey); margin-bottom: 20px; }
  .title-block h1 {
    font-family: var(--serif); font-weight: 500; font-size: clamp(46px, 10vw, 128px);
    line-height: .9; letter-spacing: -.02em; margin: 0;
  }
  .title-block .lede { max-width: 48ch; font-size: 17px; margin-top: 22px; color: var(--ink-2); }
  .tb-emblem svg { width: 100%; max-width: 320px; height: auto; margin: 0 auto; }

  /* ---------- Chronicle overview ---------- */
  .overview-shell { padding: 34px 0 42px; border-bottom: 2px solid var(--line); display: grid; gap: 42px; }
  .overview-section {
    display: grid; grid-template-columns: minmax(310px,.86fr) minmax(0,1.14fr); gap: 44px;
    align-items: start; padding: 34px 0 0; border-top: 2px solid var(--line); scroll-margin-top: 78px;
  }
  .overview-section:first-child { border-top: 0; padding-top: 0; }
  .overview-left { min-width: 0; border-right: 1px solid var(--line); padding-right: 38px; }

  /* ---------- Timeline navigator ---------- */
  .timeline { padding: 0; }
  .tl-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
  .tl-head .tl-title { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: var(--grey); font-weight: 700; }
  .tl-head .tl-sub { font-size: 12px; color: var(--grey); }
  .timeline-list { margin-top: 18px; border-top: 2px solid var(--line); }
  .tl-era-card {
    color: var(--ink); text-decoration: none; display: grid; grid-template-columns: 48px minmax(0,1fr) auto;
    align-items: center; gap: 13px; border-bottom: 1px solid var(--line); padding: 12px 0;
    transition: background .15s ease, color .15s ease, padding .15s ease, margin .15s ease;
  }
  .tl-era-card:hover, .tl-era-card:focus-visible {
    background: var(--paper-2); outline: none; margin-left: 0; padding-left: 10px; padding-right: 10px;
  }
  .tl-era-card.is-here {
    background: var(--ink); color: var(--paper); margin-left: 0; padding-left: 10px; padding-right: 10px;
  }
  .tl-mini {
    width: 42px; height: 42px; display: grid; place-items: center; border: 1px solid rgba(27,27,27,.42);
    background: var(--paper);
  }
  .tl-mini svg { width: 38px; height: 36px; }
  .tl-era-card.is-here .tl-mini { border-color: var(--paper); }
  .tl-era-card.is-here .tl-mini svg { stroke: var(--ink); }
  .tl-era-copy { min-width: 0; }
  .tl-era-roman { display: block; font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--grey); line-height: 1; }
  .tl-era-name { display: block; font-family: var(--serif); font-size: 21px; line-height: 1.05; margin-top: 4px; }
  .tl-era-count { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--grey); white-space: nowrap; }
  .tl-era-card.is-here .tl-era-roman, .tl-era-card.is-here .tl-era-count { color: var(--paper); opacity: .72; }

  /* ---------- Gospel filter ---------- */
  .filter { margin-top: 0; padding: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filter .fl-label { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: var(--grey); font-weight: 700; margin-right: 6px; }
  .filter button { font-family: var(--sans); background: var(--paper); color: var(--ink); border: 1px solid var(--line); padding: 6px 14px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; transition: background .15s ease, color .15s ease; }
  .filter button .n { color: var(--grey); margin-left: 7px; font-variant-numeric: tabular-nums; }
  .filter button:hover { background: var(--paper-2); }
  .filter button.is-active { background: var(--ink); color: var(--paper); }
  .filter button.is-active .n { color: var(--paper); opacity: .7; }
  .gospel-note {
    flex-basis: 100%; display: grid; grid-template-columns: 76px minmax(0,1fr) auto; gap: 18px;
    align-items: start; margin-top: 18px; padding: 18px 0 2px; border-top: 1px solid var(--line);
  }
  .gospel-note-icon { width: 66px; height: 58px; display: grid; place-items: center; }
  .gospel-note-icon svg { width: 66px; height: 58px; }
  .gospel-note-kicker { display: block; font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--grey); font-weight: 700; margin-bottom: 4px; }
  .gospel-note h3 { margin: 0; font-family: var(--serif); font-weight: 500; font-size: 30px; line-height: 1; }
  .gospel-note-line { margin-top: 4px; font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--ink); }
  .gospel-note p { margin: 11px 0 0; font-size: 13.5px; line-height: 1.58; color: var(--ink-2); max-width: 62ch; }
  .gospel-note-count { font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--grey); white-space: nowrap; padding-top: 5px; }
  .gospel-note-standalone { margin: 0 0 22px; padding: 0 0 20px; border-top: 0; border-bottom: 1px solid var(--line); }
  .gospel-scene-grid { margin-top: 0; }
  .category-panel { display: grid; gap: 0; }
  .category-head { padding-bottom: 14px; border-bottom: 2px solid var(--line); }
  .category-kicker { display: block; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--grey); font-weight: 700; }
  .category-head p { margin: 8px 0 0; color: var(--ink-2); font-size: 13.5px; line-height: 1.55; }
  .category-list { display: grid; gap: 0; }
  .places-overview .category-list {
    max-height: min(445px, calc(100vh - 260px));
    overflow: auto;
    padding-right: 10px;
    scrollbar-gutter: stable;
  }
  .places-overview .category-list::-webkit-scrollbar { width: 8px; }
  .places-overview .category-list::-webkit-scrollbar-thumb { background: rgba(27,27,27,.28); }
  .places-overview .category-list::-webkit-scrollbar-track { background: transparent; }
  .category-card {
    appearance: none; width: 100%; border: 0; border-bottom: 1px solid var(--line); background: transparent; color: var(--ink);
    display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px 16px; text-align: left; cursor: pointer;
    padding: 16px 0; font-family: var(--sans); transition: background .15s ease, color .15s ease, padding .15s ease, margin .15s ease;
  }
  .category-card:hover, .category-card:focus-visible { background: var(--paper-2); outline: none; margin-left: -10px; padding-left: 10px; padding-right: 10px; }
  .category-card.is-active { background: var(--ink); color: var(--paper); margin-left: -10px; padding-left: 10px; padding-right: 10px; }
  .category-title { display: block; font-family: var(--serif); font-size: 25px; line-height: 1.04; }
  .category-count { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--grey); white-space: nowrap; padding-top: 5px; }
  .category-desc { grid-column: 1 / -1; margin: 0; color: var(--ink-2); font-size: 12.5px; line-height: 1.5; }
  .category-card.is-active .category-count, .category-card.is-active .category-desc { color: var(--paper); opacity: .72; }
  .overview-scroll { max-height: min(650px, calc(100vh - 126px)); overflow: auto; padding-right: 10px; }
  .overview-scroll .era-scene-grid { margin-bottom: 0; }
  @media (max-width: 700px){
    .gospel-note { grid-template-columns: 58px minmax(0,1fr); gap: 14px; }
    .gospel-note-count { grid-column: 2; padding-top: 0; }
    .gospel-note-icon, .gospel-note-icon svg { width: 52px; height: 48px; }
  }
  .entry.is-hidden, .entry-section.is-hidden { display: none; }

  /* ---------- Era scene chooser ---------- */
  .era-scenes-panel { min-width: 0; padding: 0; }
  .era-scenes-head { display: flex; justify-content: space-between; align-items: start; gap: 22px; margin-bottom: 20px; }
  .era-scenes-kicker { display: block; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--grey); font-weight: 700; margin-bottom: 8px; }
  .era-scenes-head h2 { margin: 0; font-family: var(--serif); font-weight: 500; font-size: clamp(42px,5vw,72px); line-height: .95; }
  .era-scenes-meta { text-align: right; font-size: 11px; letter-spacing: .13em; text-transform: uppercase; color: var(--grey); white-space: nowrap; padding-top: 10px; }
  .era-scenes-desc { margin: 0 0 22px; max-width: 68ch; color: var(--ink-2); font-size: 15px; line-height: 1.58; }
  .era-scene-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); border-top: 2px solid var(--line); border-left: 1px solid var(--line); }
  .era-scene-card {
    appearance: none; background: transparent; color: var(--ink); border: 0; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
    display: grid; grid-template-columns: 40px minmax(0,1fr); gap: 9px; min-height: 76px; padding: 9px 11px 8px;
    text-align: left; cursor: pointer; font-family: var(--sans); transition: background .15s ease, color .15s ease;
  }
  .era-scene-card:hover, .era-scene-card:focus-visible { background: var(--paper-2); outline: none; }
  .era-scene-card.is-active { background: var(--ink); color: var(--paper); }
  .era-scene-thumb { width: 38px; height: 34px; border: 1px solid rgba(27,27,27,.42); background: var(--paper); display: grid; place-items: center; overflow: hidden; }
  .era-scene-thumb svg { width: 48px; height: 44px; stroke: var(--ink); }
  .era-scene-no { display: block; font-family: var(--serif); font-size: 14px; line-height: 1; color: var(--grey); margin-bottom: 3px; }
  .era-scene-title { display: block; font-family: var(--serif); font-size: 18px; line-height: 1.05; }
  .era-scene-ref { display: block; margin-top: 6px; font-size: 7.8px; letter-spacing: .12em; text-transform: uppercase; color: var(--grey); line-height: 1.28; }
  .era-scene-card.is-active .era-scene-no, .era-scene-card.is-active .era-scene-ref { color: var(--paper); opacity: .72; }
  .era-scene-empty { border-top: 2px solid var(--line); border-bottom: 2px solid var(--line); padding: 26px 0; font-family: var(--serif); font-size: 24px; color: var(--ink-2); }
  @media (max-width: 960px){
    .overview-section { grid-template-columns: 1fr; gap: 28px; }
    .overview-left { border-right: 0; border-bottom: 2px solid var(--line); padding-right: 0; padding-bottom: 28px; }
    .overview-scroll { max-height: none; overflow: visible; padding-right: 0; }
    .timeline-list { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--line); }
    .tl-era-card:nth-child(odd) { border-right: 1px solid var(--line); padding-right: 12px; }
    .tl-era-card:nth-child(even) { padding-left: 12px; }
  }
  @media (max-width: 700px){
    .era-scenes-head { display: block; }
    .era-scenes-meta { text-align: left; padding-top: 12px; }
    .era-scene-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px){
    .timeline-list { grid-template-columns: 1fr; }
    .tl-era-card { grid-template-columns: 44px minmax(0,1fr); }
    .tl-era-count { grid-column: 2; justify-self: start; margin-top: -6px; }
    .tl-era-card:nth-child(odd) { border-right: 0; padding-right: 0; }
    .tl-era-card:nth-child(even) { padding-left: 0; }
    .era-scene-card { grid-template-columns: 38px minmax(0,1fr); min-height: 72px; padding: 9px 0; border-right: 0; }
    .era-scene-grid { border-left: 0; }
    .era-scene-thumb { width: 36px; height: 34px; }
    .era-scene-title { font-size: 17px; }
  }

  /* ---------- Section dividers ---------- */
  .entry-section { text-align: center; padding: 64px 0 8px; scroll-margin-top: 78px; }
  .entry-section .es-roman { font-family: var(--serif); font-size: 15px; letter-spacing: .3em; color: var(--grey); margin-bottom: 12px; }
  .entry-section .es-title { font-family: var(--serif); font-size: clamp(26px,4vw,40px); letter-spacing: .06em; text-transform: uppercase; color: var(--ink); position: relative; display: inline-block; padding: 0 30px; }
  .entry-section .es-title::before, .entry-section .es-title::after { content: ""; position: absolute; top: 50%; width: 46px; height: 1px; background: var(--line); }
  .entry-section .es-title::before { right: 100%; }
  .entry-section .es-title::after { left: 100%; }
  .entry-section .es-range { margin-top: 14px; font-size: 12px; letter-spacing: .16em; text-transform: uppercase; color: var(--grey); }
  .entry-section .es-desc { max-width: 60ch; margin: 16px auto 0; font-size: 15.5px; color: var(--ink-2); }
  .entry-section .es-egw { max-width: 62ch; margin: 26px auto 0; padding-top: 22px; border-top: 1px solid var(--line); font-family: var(--serif); font-style: italic; font-size: clamp(16px,2vw,20px); line-height: 1.5; color: var(--ink); }
  .entry-section .es-egw cite { display: block; margin-top: 12px; font-style: normal; font-family: var(--sans); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--grey); }


  /* ---------- Chronicle reader ---------- */
  .chronicle-reader {
    display: grid; grid-template-columns: minmax(0,1fr); gap: 42px;
    padding: 48px 0 72px; border-bottom: 2px solid var(--line); scroll-margin-top: 78px;
  }
  .scene-rail {
    position: sticky; top: 72px; align-self: start; max-height: calc(100vh - 92px);
    overflow: auto; padding: 0 18px 6px 0; border-right: 1px solid var(--line);
  }
  .scene-rail-head { border-top: 2px solid var(--line); border-bottom: 2px solid var(--line); padding: 15px 0; margin-bottom: 18px; }
  .scene-rail-head span { display: block; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--grey); font-weight: 700; }
  .scene-rail-head strong { display: block; margin-top: 3px; font-family: var(--serif); font-size: 30px; line-height: 1; font-weight: 500; }
  .scene-era-block { border-bottom: 1px solid var(--line); padding: 0 0 16px; margin-bottom: 16px; scroll-margin-top: 78px; }
  .scene-era-title { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .scene-era-title h2 { margin: 0; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink); font-family: var(--sans); }
  .scene-era-title span { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--grey); white-space: nowrap; }
  .scene-link {
    appearance: none; width: 100%; border: 0; border-top: 1px solid rgba(27,27,27,.28); background: transparent;
    color: var(--ink); display: grid; grid-template-columns: 34px minmax(0,1fr); gap: 10px 12px;
    text-align: left; padding: 11px 0 10px; cursor: pointer; font-family: var(--sans);
  }
  .scene-link:hover { color: var(--ink); }
  .scene-link .scene-no { font-family: var(--serif); font-size: 18px; line-height: 1; color: var(--grey); }
  .scene-link .scene-title { font-family: var(--serif); font-size: 18px; line-height: 1.08; }
  .scene-link .scene-ref { grid-column: 2; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--grey); }
  .scene-link.is-active {
    background: var(--ink); color: var(--paper); margin-left: -10px; padding-left: 10px; padding-right: 10px;
    width: calc(100% + 10px);
  }
  .scene-link.is-active .scene-no, .scene-link.is-active .scene-ref { color: var(--paper); opacity: .72; }
  .scene-detail { min-width: 0; }
  .scene-detail .entry { padding: 0 0 48px; border-bottom: 0; scroll-margin-top: 78px; }
  .scene-detail .entry:first-of-type { border-top: 0; }
  .scene-detail .entry-grid { grid-template-columns: minmax(280px,420px) minmax(0,1fr); gap: 48px; }
  .scene-detail .plate { top: 78px; justify-self: center; width: 100%; max-width: 420px; margin-inline: auto; }
  .scene-detail .plate svg { max-width: 420px; }
  .scene-detail .cols { columns: 1; }
  .scene-empty { padding: 48px 0; border-top: 2px solid var(--line); border-bottom: 2px solid var(--line); font-family: var(--serif); font-size: 24px; color: var(--ink-2); }
  @media (max-width: 1080px){
    .chronicle-reader { grid-template-columns: minmax(0,1fr); gap: 30px; }
    .scene-detail .entry-grid { grid-template-columns: 1fr; gap: 28px; }
    .scene-detail .plate { position: static; max-width: 420px; }
  }
  @media (max-width: 780px){
    .chronicle-reader { grid-template-columns: 1fr; padding-top: 32px; }
    .scene-rail { position: static; max-height: none; border-right: 0; padding-right: 0; }
    .scene-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0 22px; }
    .scene-link.is-active { margin-left: 0; width: 100%; }
  }
  @media (max-width: 560px){ .scene-list { grid-template-columns: 1fr; } }



  /* ---------- Reader enhancements ---------- */
  .chronicle-reader.is-reading { grid-template-columns: minmax(0,1fr); }
  .chronicle-reader.is-reading .scene-rail { display: none; }
  .chronicle-reader.is-reading .scene-detail .entry-grid { grid-template-columns: minmax(260px,360px) minmax(0,1fr); }
  .rail-controls { border-bottom: 2px solid var(--line); padding-bottom: 16px; margin-bottom: 18px; }
  .rail-control-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .rail-button, .filter-chip, .tag-chip, .reader-nav button { appearance: none; border: 1px solid var(--line); background: transparent; color: var(--ink); cursor: pointer; font: 700 9.5px var(--sans); letter-spacing: .12em; text-transform: uppercase; padding: 6px 9px; }
  .rail-button:hover, .filter-chip:hover, .tag-chip:hover, .reader-nav button:not(:disabled):hover { background: var(--paper-2); }
  .rail-button.is-active, .filter-chip.is-active, .tag-chip.is-active { background: var(--ink); color: var(--paper); }
  .rail-button:disabled, .reader-nav button:disabled { opacity: .38; cursor: default; }
  .rail-section { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 13px; }
  .rail-section summary { cursor: pointer; font-size: 10.5px; letter-spacing: .15em; text-transform: uppercase; color: var(--grey); font-weight: 700; list-style: none; }
  .rail-section summary::-webkit-details-marker { display: none; }
  .rail-section summary::after { content: "+"; float: right; color: var(--ink); font-family: var(--serif); font-size: 18px; line-height: .8; }
  .rail-section[open] summary::after { content: "-"; }
  .chip-list { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .filter-note { font-size: 11px; color: var(--grey); margin: 11px 0 0; line-height: 1.4; }
  .scene-link { grid-template-columns: 38px 28px minmax(0,1fr); align-items: center; }

<script>
/* ======================================================================
   ENGRAVING PRIMITIVES
   ====================================================================== */
const F = n => (+n).toFixed(1);
function line(x1,y1,x2,y2,w){ return `<line x1="${F(x1)}" y1="${F(y1)}" x2="${F(x2)}" y2="${F(y2)}"${w?` stroke-width="${w}"`:""}/>`; }
function rays(cx,cy,r1,r2,n,w){ let s=""; for(let i=0;i<n;i++){ const a=i/n*Math.PI*2; s+=line(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1,cx+Math.cos(a)*r2,cy+Math.sin(a)*r2,w||0.9); } return s; }
function ground(y,x0,x1){ let s=line(x0,y,x1,y,1.6); for(let x=x0+6;x<x1-2;x+=9){ s+=line(x,y,x-5,y+11,0.7); } return s; }
function scallopPath(cx,cy,rx,ry,n,r){ let s="M"; for(let i=0;i<=n;i++){ const a=i/n*Math.PI*2; const x=cx+Math.cos(a)*rx, y=cy+Math.sin(a)*ry; s+= i===0 ? `${F(x)},${F(y)} ` : `A ${r} ${r} 0 0 1 ${F(x)},${F(y)} `; } return s+"Z"; }
function scallops(cx,cy,rx,ry,n,r){ return `<path d="${scallopPath(cx,cy,rx,ry,n,r)}"/>`; }
function hatchShape(d){ return `<path d="${d}" fill="url(#hatchLight)" stroke="none"/>`; }
function bird(x,y,s){ s=s||1; return `<path d="M${F(x-9*s)},${F(y)} Q${F(x-4*s)},${F(y-7*s)} ${F(x)},${F(y)} Q${F(x+4*s)},${F(y-7*s)} ${F(x+9*s)},${F(y)}" stroke-width="1"/>`; }
function C(cx,cy,r,w){ return `<circle cx="${F(cx)}" cy="${F(cy)}" r="${F(r)}"${w?` stroke-width="${w}"`:""}/>`; }
function E(cx,cy,rx,ry,w){ return `<ellipse cx="${F(cx)}" cy="${F(cy)}" rx="${F(rx)}" ry="${F(ry)}"${w?` stroke-width="${w}"`:""}/>`; }
function RE(x,y,w,h,sw){ return `<rect x="${F(x)}" y="${F(y)}" width="${F(w)}" height="${F(h)}"${sw?` stroke-width="${sw}"`:""}/>`; }
function PT(d,w){ return `<path d="${d}"${w?` stroke-width="${w}"`:""}/>`; }
function moon(cx,cy,r){ return `<path d="M${F(cx+r*0.55)},${F(cy-r*0.82)} A ${F(r)} ${F(r)} 0 1 0 ${F(cx+r*0.55)},${F(cy+r*0.82)} A ${F(r*0.78)} ${F(r*0.78)} 0 1 1 ${F(cx+r*0.55)},${F(cy-r*0.82)} Z" stroke-width="1.2"/>`; }
function star(cx,cy,s){ return line(cx-s,cy,cx+s,cy,0.7)+line(cx,cy-s,cx,cy+s,0.7)+line(cx-s*0.6,cy-s*0.6,cx+s*0.6,cy+s*0.6,0.5)+line(cx-s*0.6,cy+s*0.6,cx+s*0.6,cy-s*0.6,0.5); }

function thornRing(cx,cy,r){
  const n=22; let p="M";
  for(let i=0;i<=n;i++){ const a=i/n*Math.PI*2; const rr=r+(i%2?2.6:-2.6); p+=(i?"L":"")+F(cx+Math.cos(a)*rr)+","+F(cy+Math.sin(a)*rr*0.62)+" "; }
  let s=PT(p+"Z",1.2);
  let p2="M";
  for(let i=0;i<=n;i++){ const a=i/n*Math.PI*2+0.28; const rr=r+(i%2?-2.6:2.6); p2+=(i?"L":"")+F(cx+Math.cos(a)*rr)+","+F(cy+Math.sin(a)*rr*0.62)+" "; }

  return s;
}

    desc:"Through childhood and youth in an obscure village, the Son of God grows in wisdom and stature, the perfect pattern of an ordinary life lived wholly for God.",
    egw:"Through all those secluded years at Nazareth, His life flowed out in currents of sympathy and tenderness.… He whose word of power upheld the worlds would stoop to relieve a wounded bird." },
  { id:"begin", roman:"III", title:"The Ministry Begins", range:"AD 27 · The Jordan & Galilee", emblem:"begin",
    desc:"Anointed at the Jordan and proved in the wilderness, Jesus gathers His first followers and reveals His glory in the first of His signs.",
    egw:"Jesus did not begin His ministry by some great work before the Sanhedrin at Jerusalem. At a household gathering in a little Galilean village His power was put forth to add to the joy of a wedding feast. Thus He showed His sympathy with men, and His desire to minister to their happiness." },
  { id:"galilee", roman:"IV", title:"The Galilean Ministry", range:"AD 28 – 30 · Galilee", emblem:"galilee",
    desc:"On hillside and lakeshore the kingdom is opened to the multitudes — in teaching that pierces the heart and in works of power over nature, hunger, and fear.",
    egw:"In Christ is the tenderness of the shepherd, the affection of the parent, and the matchless grace of the compassionate Saviour." },
  { id:"jerusalem", roman:"V", title:"Toward Jerusalem", range:"AD 30 – 31 · Judea & Perea", emblem:"jerusalem",
    desc:"The shadow of the cross lengthens. A dead man walks from the tomb, and the meek King rides at last to the city that will not receive Him.",
    egw:"The precious Saviour was now most surely standing under the shadow of the cross." },
  { id:"passion", roman:"VI", title:"The Passion", range:"AD 31 · Passover Week", emblem:"passion",
    desc:"In one dark week the Lamb of God is betrayed, condemned, and crucified — and lays down His life that the world through Him might live.",
    egw:"Christ was treated as we deserve, that we might be treated as He deserves. He was condemned for our sins, in which He had no share, that we might be justified by His righteousness, in which we had no share. He suffered the death which was ours, that we might receive the life which was His." },
  { id:"risen", roman:"VII", title:"Risen & Ascended", range:"AD 31 · Jerusalem & Olivet", emblem:"risen",
    desc:"Death cannot hold Him. The risen Christ walks with His own, opens the Scriptures, and ascends — with the promise that He will so come again.",
    egw:"“I am the resurrection, and the life.” In Christ is life, original, unborrowed, underived." }

const EVENTS = [
{ id:"annunciation", era:"advent", title:"The Annunciation", gospel:"Luke 1", ref:"Luke 1:26–38",
    lens:"Luke is the only evangelist who tells it, and he tells it twice over in miniature: first an old priest struck dumb for his doubt, then a young girl who believes at once. The contrast is surely deliberate. Of the four Gospels this is the one that keeps turning toward women, toward the poor, toward the quiet promptings of the Spirit—and so it opens the story of salvation not under the temple’s gold but in a workman’s house, in a town nobody expected anything from.",
    scripture:"“Behold, thou shalt conceive in thy womb, and bring forth a son, and shalt call his name JESUS.”",
    setting:"Gabriel is sent to Nazareth, to a girl promised in marriage to Joseph the carpenter, of David’s line. She is nobody the world would notice. He greets her as “highly favoured,” and then lays before her a thing no mind could have invented: that she, still a virgin, will bear a son by the Holy Ghost—Jesus, the Son of the Highest, heir to David’s throne without end. Mary is frightened, and she asks plainly how such a thing can be. But when the answer comes she does not bargain or stall. “Behold the handmaid of the Lord.”",
    background:"Nazareth was the kind of place people made jokes about—“Can there any good thing come out of Nazareth?” Mary was likely still in her teens. Betrothal in that world was no loose engagement; it already bound a couple with the force of marriage, so that a bride found with child before the wedding stood exposed to public shame, and by the letter of the law to worse. Into that unprotected moment steps Gabriel, who had lately stood in the temple to promise John’s birth to Zacharias—one of the two angels Scripture troubles to name, who wait in the presence of God.",
    prophecy:"Everything the prophets had been reaching for is folded into a few sentences from an angel. Isaiah’s virgin and her child called Immanuel, “God with us.” The throne God swore to David would never fall. And older than either, the first flicker of hope spoken in Eden—that the woman’s seed would one day crush the serpent’s head. All of it had waited, written down, for centuries. In Mary’s yes it begins to become a body.",
    meaning:"God does not force His way into the world. The Word who had been with the Father before there was a world waits—actually waits—on the consent of a village girl, and will not be born until she gives it. Her answer is not mere resignation; it is faith with its eyes open: “be it unto me according to thy word.” Long ago another woman’s doubt had helped unpick the human race. Now a daughter of Eve, believing, begins to knit it back.",
    revealed:"Why insist on the virgin conception? Because everything hangs on it. The child is not a good man whom God later promoted; He comes down from above, the eternal Son, taking His humanity from Mary as really as any of us take ours from our mothers. God and man meet in one Person—not two beings standing side by side, but one Christ, the place where heaven and earth are at last joined into one.",
    moments:["Gabriel sent to Nazareth","“Hail, thou that art highly favoured”","The virgin conception announced","“He shall reign… for ever”","Mary submits: “Behold the handmaid of the Lord”"],
    lessons:["God seeks consent, not conscription; grace waits for the open “yes” of an ordinary heart.","Faith often means answering God before you can see how any of it will work.","The lowliest place—a workman’s house in a town people mocked—is exactly where God chooses to begin."],
    quote:"This was a voluntary sacrifice. Jesus might have remained at the Father’s side. He might have retained the glory of heaven, and the homage of the angels. But He chose to give back the scepter into the Father’s hands, and to step down from the throne of the universe, that He might bring light to the benighted, and life to the perishing.", },

  { id:"visitation", era:"advent", title:"The Visitation", gospel:"Luke 1", ref:"Luke 1:39–56",
    lens:"Before there is a stable or a star, Luke gives us two pregnant women in a hill-country house. No court, no temple, no officiating priest—just an old woman and a young one and the children they carry. This is how his Gospel likes to work: God’s largest business done first in the smallest rooms, and the secret told to nobodies long before the great ever catch wind of it.",
    scripture:"“Blessed art thou among women, and blessed is the fruit of thy womb.”",
    setting:"Mary sets out in haste for the Judean hills, the promised child already hidden within her. The moment she calls a greeting, Elisabeth is filled with the Holy Ghost and the baby she carries leaps—John bearing witness to his Lord before either child has drawn a breath. Elisabeth blesses her, and notice what for: not her youth, not any deed, only that she believed what God had said. Then Mary sings. It is the Magnificat, and it is not a soft song. God pulls down the proud, empties the rich, fills the hungry, and keeps His old faith with Israel.",
    background:"The road from Nazareth to the Judean hills was long and hard, and Mary took it pregnant. This was no visit of leisure. The angel had given her Elisabeth as a sign, and she went to see the sign with her own eyes—half expecting, perhaps, to have to explain herself. What she found was a welcome. Elisabeth’s son had already been marked out as the forerunner, and here, still unborn, his whole life turns like a needle toward the One he will point to years later at the river.",
    prophecy:"Mary sings in borrowed words—Hannah’s old prayer, the psalms, the promises made to Abraham—and they fit her mouth exactly. What Abraham was told to hope for is no longer far off. It is beating under her ribs. And the toppling of the proud has already quietly begun; the weapon God has chosen for it is a child in the body of a poor girl.",
    meaning:"Faith looks for company. God did not ask Mary to bear the mystery by herself; He gave her a door to knock on where her belief would be met by another’s, and her joy would steady her obedience. It is often like this. The Lord confirms His biggest promises in small rooms, through one other person who sees the grace at work in you before anyone else in the world suspects a thing.",
    revealed:"He is Lord already, months before He is born—known by the Spirit, greeted by a leap in the dark of Elisabeth’s womb. This is the mercy God swore to the fathers, come at last in person; and the first people it reaches are exactly the sort the world keeps overlooking—the unmarried girl, the old woman, the empty-handed—who discover in Him that they have been seen all along.",
    moments:["Mary journeys to the hill country","Elisabeth is filled with the Holy Ghost","The unborn John leaps for joy","Mary is blessed because she believed","The Magnificat praises God's mercy"],
    lessons:["Faith grows in company; seek out the one person who can recognize God’s work in you.","God tends to confirm His promises in quiet rooms before He announces them to the world.","Joy is meant to be shared while it is still a secret, not only once it is proved."],
    quote:"In taking our nature, the Saviour has bound Himself to humanity by a tie that is never to be broken. Through the eternal ages He is linked with us." },
    { id:"birth-john", era:"advent", title:"The Birth of John the Baptist", gospel:"Luke 1", ref:"Luke 1:57–80",
    lens:"Luke will not hurry past John’s birth. To him the forerunner is no warm-up act; his story is part of the overture, and every detail is scored on purpose—the mute father, the steady mother, the argument over the name, the song that breaks loose at the end. Put together they say one thing. God is not making redemption up as He goes. He is keeping very old promises, on time, to the letter.",
    scripture:"“And thou, child, shalt be called the prophet of the Highest: for thou shalt go before the face of the Lord to prepare his ways.”",
    setting:"Elisabeth’s time comes, and the child promised months earlier by the altar is born in the Judean hills. The neighbours and relatives crowd in—not only to coo over a newborn, but because everyone knew this woman had been barren a lifetime, and now the Lord had plainly had mercy on her. On the eighth day, at the circumcision, they move to name the boy after his father, as custom expected. Elisabeth stops them: “He shall be called John.” They turn to Zacharias, who has not spoken in nine months. He asks for a tablet and writes four words that end the argument: “His name is John.” With that his tongue is freed. The room that had buzzed with questions fills instead with praise.",
    background:"Everything about the scene is thoroughly Jewish—circumcision on the eighth day, the household of relatives, a priestly family, the heavy weight of ancestral names—and cutting straight across all of it, a name handed down from heaven instead of chosen by custom. Months before, Zacharias had stood in the temple with the incense going up and a nation waiting for comfort, and had prayed with a doubt tucked inside the prayer. The angel who answered shut his mouth until the promise came true. Now the old priest steps back into speech chastened and obedient, and the first use he makes of his voice is not to explain himself. It is to bless God.",
    prophecy:"Zacharias gathers up the whole inheritance—Abraham, David’s throne, the prophets, the mercy God swore ages ago—and then looks down at the baby in his arms and speaks to him directly. This child will walk ahead of the Lord to clear His road, teaching a people that their salvation comes through the forgiveness of their sins. Malachi’s promised messenger has arrived. The voice that will one day roar in the wilderness is, for now, crying in a village nursery.",
    meaning:"Great public work often starts as small private mercy. A baby arrives, a father does as he is told, a name gets written on a tablet, and a whole neighbourhood goes quiet with awe. Those nine silent months were not God turning His back on Zacharias. They were a hard kindness—his mouth shut so that his faith could finally learn to listen. When the discipline had done its work, the Lord handed his voice back, and the very first thing it did was praise.",
    revealed:"Christ is still only weeks along, hidden under Mary’s heart—and yet Zacharias sings as if the sun were already up. He calls the coming One the dayspring from on high, the mercy of God stooping to visit people who sit in the dark, come to set their stumbling feet on a road that ends in peace. John will spend his whole life pointing away from himself to Jesus. His birth is already doing it.",
    witness:"The chapter reads like something remembered inside a family: the names, the kinship ties, the priestly detail, the way the neighbours reacted, a birth-hymn kept and passed down word for word. Luke seems to have talked to people who were there, or to their children. And it all sits where it should in the larger story—temple, prophecy, and household memory drawing together in the years just before Jesus steps into public view.",
    moments:["Elisabeth brings forth the promised son","Neighbours and kinsfolk rejoice in mercy","The child is circumcised on the eighth day","Zacharias writes, “His name is John”","His tongue is loosed in prophetic praise","John is named as the prophet of the Highest"],
    lessons:["God keeps His promises with patient exactness; nothing in redemption is improvised.","A season of enforced silence can be God’s severe mercy, teaching us to listen.","Great public callings are usually prepared long beforehand in unremarkable homes."],
    quote:"Already to Zacharias the priest, as he ministered before the altar, the nearness of Christ’s coming had been announced. Already the forerunner was born, his mission attested by miracle and prophecy." },


  { id:"joseph-dream", era:"advent", title:"Joseph's Dream", gospel:"Matthew 1", ref:"Matthew 1:18–25",
    lens:"Where Luke watches Mary, Matthew watches Joseph—and for a reason. His Gospel is following the royal bloodline and the fulfilment of prophecy, and it is through Joseph, son of David, that the child is legally received into David’s house. The dream that comes to him settles two things at once: whose son this boy will be reckoned, and what He has come to do—save His people from their sins.",
    parallels:"Luke 1:26–38",
    scripture:"“Thou shalt call his name JESUS: for he shall save his people from their sins.”",
    setting:"Joseph learns that Mary is pregnant, and the child is not his. He is a good man, and he is heartbroken, and the two facts pull against each other: the law is on his side, but he cannot bring himself to make an example of her, so he decides to end the betrothal as quietly as it can be done. Then he sleeps, and an angel meets him there. Do not be afraid, it says; the child is of the Holy Ghost. Take her home. Name Him Jesus. Joseph wakes and does exactly that—no argument recorded—and so the Son of God is taken in under a carpenter’s roof and a king’s name.",
    background:"A Jewish betrothal was legally binding, and a bride thought unfaithful in that season carried real disgrace. Look closely at Joseph’s first instinct, before the angel says a word: he will not pretend that sin is nothing, and he will not crush the girl he loves. Holiness and mercy already live together in him. The dream then asks something costlier still—to take up a story no neighbour will believe, and to wear the misunderstanding himself.",
    prophecy:"Matthew stops the story to point at Isaiah: a virgin shall bear a son, and He shall be called Immanuel, God with us. Two names now hang over the cradle before it is even built. Immanuel says who He is—God, here, among us. Jesus says why He came—the old saving name of the Lord, given to a boy whose work will not be to improve our circumstances but to deal with our sin.",
    meaning:"Joseph never speaks a word in the whole account. His faith is all in what he does—quiet, immediate, protective. He shoulders a burden he never asked for, on nothing more than a word from God given in the night. This is what belief looks like in him: making room for Christ, standing between Mary and the gossips, and leaving to God the sense of a thing he cannot explain to a single neighbour.",
    revealed:"He is Immanuel, God with us—and He comes needing a human father to shelter Him. From His first months He belongs to a household under a cloud, a family with something the neighbours think wants explaining. The Saviour begins His life exactly where so many people live theirs: among the misjudged.",
    moments:["Joseph learns of Mary's pregnancy","He resolves on mercy instead of exposure","The angel appears in a dream","The child is named Jesus","Joseph obeys and takes Mary home"],
    lessons:["Real faith is often shown in quiet action rather than in words.","Obedience sometimes means shouldering a burden you did not choose and cannot explain.","To make room for Christ may cost you your reputation before it ever brings you honor."],
    quote:"Since Jesus came to dwell with us, we know that God is acquainted with our trials, and sympathizes with our griefs. Every son and daughter of Adam may understand that our Creator is the friend of sinners." },

{ id:"nativity", era:"advent", title:"The Nativity", gospel:"Luke 2", ref:"Luke 2:1–7",
    lens:"Only Matthew and Luke tell the birth at all, and they stand on opposite sides of the manger—Matthew with Joseph and the foreign magi, Luke with Mary and the local shepherds. Luke is the careful one here, dating the night by an emperor and a governor, nailing it into real history so no one can file it under legend. And then that same careful historian tells you who heard the news first. Not the palace. The night shift in a field.",
    parallels:"Matthew 1:18–25",
    scripture:"“She brought forth her firstborn son, and wrapped him in swaddling clothes, and laid him in a manger; because there was no room for them in the inn.”",
    setting:"A decree of Caesar Augustus sends the whole empire home to be counted, and it drags a carpenter and his pregnant wife eighty miles from Nazareth down to Bethlehem, David’s town, because Joseph is David’s son. They arrive late to a place already full; the guest room is taken. So the birth happens where there is room—among the animals. Mary delivers her firstborn, binds Him in strips of cloth, and lays Him in a manger, the trough the cattle feed from, now a king’s first bed. The Word who framed the worlds is born into the world He made, and the great of the earth sleep straight through it.",
    background:"Rome ran its provinces partly by periodic tax enrolments, and Jewish custom sent each family to register in its ancestral town—which is what pulls a son of David back to little Bethlehem. The word Luke uses for the crowded lodging (kataluma) is not the roadside inn of the Good Samaritan; it means a guest room. In an ordinary village house the animals were kept in a lower or adjoining space, and it was there, the upper room being full, that the birth most likely took place. The swaddling is worth noticing too: wrapping a newborn tight in linen bands was simply what Hebrew mothers did, kings’ mothers included—the Son of God gets the same plain first hour as everyone else. And the town’s own name means “house of bread.” Bread was born in the house of bread, a few miles from Jerusalem, among the fields that raised the temple’s lambs.",
    prophecy:"Seven hundred years earlier Micah had put a name to the place: Bethlehem would produce Israel’s ruler, one “whose goings forth have been from of old, from everlasting.” The detail cuts both ways. When Herod’s scholars are asked, they answer instantly—“In Bethlehem of Judaea”—chapter and verse, no hesitation. They had the address exactly right and missed the arrival entirely. The long thread running from Eden through David to the prophets is pulled tight on this one night: the Eternal One born in the house of bread, of the royal line, precisely as it stood in writing.",
    meaning:"Heaven’s Majesty picks poverty and obscurity for His entrance, and by doing so leaves human snobbery without a leg to stand on forever. The hand that holds the worlds up is laid in a stone trough. Let that settle where it falls: no one is now too low for God to reach, because God has already gone lower. The whole life to come is folded into this first descent from the throne to a borrowed stable—a love that goes down in order to lift, that empties itself to fill. Greatness, it turns out, was never the throne. It was the self-giving.",
    revealed:"The incarnation is never gentler to look at than here: the Word who was with God, and was God, has become an infant who cannot hold up His own head. He is not playing at being human, and He has not pulled our nature on like a coat to shrug off later. He has taken it—from the inside, at its most helpless point, so that from the inside He can heal it. The manger looks like weakness. It is the strength of a God who has decided to save us by becoming one of us. And already, over the straw, there is the faint shape of a cross.",
    moments:["Caesar’s decree of enrolment goes out","The long journey to Bethlehem, the city of David","No room found in the guest chamber","The birth in the shelter of the animals","Wrapped in swaddling bands by His mother","The King of glory laid in a manger"],
    witness:"The scaffolding Luke gives us holds up under the records of the period. A Roman inscription, the Titulus Venetus, attests to empire-wide tax enrolments on a recurring cycle from Augustus onward; an Egyptian papyrus preserves an actual order for people to return to their home towns to be registered—the very practice that put Joseph on the road. Other inscriptions suggest Quirinius held office in Syria more than once, which softens the old puzzle about the date. The census and the manger belong to a real reign, in a world you can put a year to.",
    lessons:["God measures greatness by self-giving, not by rank or wealth or throne.","No one is too low for God to reach, because in the manger He has already gone lower.","The way down—emptying yourself to lift others—is the shape of the whole life that follows."],
    quote:"The King of glory stooped low to take humanity. Rude and forbidding were His earthly surroundings. His glory was veiled, that the majesty of His outward form might not become an object of attraction.", },

{ id:"shepherds", era:"advent", title:"The Shepherds", gospel:"Luke 2", ref:"Luke 2:8–20",
    lens:"The shepherds are Luke’s, of course. His Gospel keeps handing the microphone to the people no one else would think to ask. The angels’ song of peace and “good will toward men,” delivered to men working the night shift in a field, is the keynote he will play again and again: a Saviour meant for everybody, and a gladness that starts at the bottom.",
    scripture:"“Glory to God in the highest, and on earth peace, good will toward men.”",
    setting:"Out in the fields past Bethlehem, shepherds are keeping the night watch over their sheep—the ordinary boredom of it—when the glory of the Lord blazes up around them and an angel is speaking: good news, great joy, “Unto you is born this day in the city of David a Saviour, which is Christ the Lord.” Then the whole sky is full of them, an army of heaven singing. And then it is dark and quiet again. The shepherds do not stand around debating what they saw. They run to Bethlehem, find the baby in the feeding-trough exactly as they were told, and come back praising God at the top of their voices.",
    background:"Shepherds sat low on the social ladder and were widely mistrusted; the work kept them out on the hills and out of the careful ceremonial life of the respectable. Heaven told them first anyway. And there is a quiet fitness in it. The fields around Bethlehem are thought to have raised lambs for the temple sacrifices, so the men who watched the sacrificial flock were the first ones called to the Lamb of God. Even the sign fit them—a wrapped baby in a feed-trough, something the poorest man there could find and understand.",
    prophecy:"A thousand years before, a shepherd boy had kept his father’s sheep on these same hills before anyone thought to make him king. Now, to shepherds on David’s ground, heaven announces David’s greater Son. The angel’s title—“a Saviour, which is Christ the Lord”—and the army’s song of peace are Isaiah’s old promise coming true out loud: unto us a child is born, and He shall be called the Prince of Peace.",
    meaning:"The good news goes to the poor and the wide-awake before it goes anywhere near the powerful and the pleased-with-themselves. It was men faithfully keeping a dull watch who had the sky torn open over their heads—and once they had seen the child, these same unschooled men became its first preachers, telling anyone who would stand still. Heaven’s brightest glory had bent all the way down to the humblest hearts in the district.",
    revealed:"“Peace on earth,” the angels sing, and it tells you what the newborn King has come to do. Not a treaty between empires—peace between God and the human race, the old quarrel finally ended. The One that whole shining army calls “Christ the Lord” is lying helpless in a cattle-trough. He commands the host of heaven. He has come to save shepherds.",
    moments:["The night watch over the flocks","The glory of the Lord shines round about","“Unto you is born… a Saviour”","The heavenly host praising God","The shepherds seek, find, and make known"],
    lessons:["Heaven’s best news still comes first to the humble and the wide-awake.","Faithfulness in a dull duty can be the very place where God opens the sky.","Those who have truly seen Christ cannot keep the news to themselves."],
    quote:"Had the leaders in Israel been true to their trust, they might have shared the joy of heralding the birth of Jesus. But now they are passed by.", },

{ id:"presentation", era:"advent", title:"The Presentation", gospel:"Luke 2", ref:"Luke 2:22–38",
    lens:"Only Luke walks the infant into the temple and sets Him in the arms of two very old people—Simeon and Anna, the last of a waiting remnant. His opening chapters are full of singing, and theirs join Mary’s and Zacharias’; but Simeon adds a line the others had not said out loud: a light for the Gentiles. Before the child can walk, the horizon has opened to take in the whole world.",
    scripture:"“Mine eyes have seen thy salvation … a light to lighten the Gentiles, and the glory of thy people Israel.”",
    setting:"Forty days after the birth, keeping the law, Joseph and Mary carry the child up to the temple to present Him to the Lord and make the required offering. There an old man named Simeon is waiting—he had been promised he would not die until he had seen the Lord’s Christ. He lifts the baby out of Mary’s arms and blesses God: “Mine eyes have seen thy salvation.” Old Anna, a widow who all but lived in the temple, comes up at the same hour, gives thanks, and begins telling everyone still hoping for Jerusalem’s redemption that it has come.",
    background:"The law of Moses asked for a mother’s purification after childbirth and the redemption of a firstborn son, with a lamb for the offering—or, if the family was poor, two young pigeons. Mary brings the two pigeons. It is a small, quiet detail, and it tells you the family had no lamb to spare. Simeon and Anna belonged to a faithful remnant who, inside a religion grown formal and satisfied with itself, still ached for the “consolation of Israel.” It was to these watching old hearts, and not to the officials running the temple, that God chose to reveal His Christ.",
    prophecy:"Simeon’s song is Isaiah’s servant set into a father’s blessing—“a light to lighten the Gentiles, and the glory of thy people Israel.” But then he turns to Mary with a harder word: a sword will go through your own soul too. He is looking, though he cannot know it, straight down the road to Calvary. And the rite itself, presenting a firstborn son to God, had always been a picture waiting for its fact. Here the true Firstborn is carried into His Father’s house.",
    meaning:"Two pigeons, because there was no money for a lamb—and in their arms, the Lamb of God Himself. The irony is the whole point. Proud eyes saw a poor couple discharging a cheap obligation; two waiting hearts saw the salvation of the world. That is usually how it goes. And after a lifetime of hoping, Simeon and Anna were finally allowed to see it with their own eyes.",
    revealed:"An old man is holding the salvation of the world, and he says so—a light for the nations, not for Israel alone. The baby brought in on a poor woman’s offering, laid under the law like any other Jewish child, is the Lord of that very temple, come home at last to His own house. He belongs to the Gentile and the Jew alike.",
    moments:["The offering of the poor presented","Simeon’s long hope rewarded","“Mine eyes have seen thy salvation”","The sword foretold for Mary’s soul","Anna’s thanksgiving and testimony"],
    lessons:["Waiting hearts see what proud eyes miss.","God is often revealed to the poor and the aged rather than to the important.","Every joy in Christ is shadowed by a cross; Simeon’s blessing carried a sword."],
    quote:"The Shekinah had departed from the sanctuary, but in the Child of Bethlehem was veiled the glory before which angels bow.", },

{ id:"magi", era:"advent", title:"The Visit of the Magi", gospel:"Matthew 2", ref:"Matthew 2:1–12",
    lens:"The magi are Matthew’s alone, and he puts them near the front for a reason he will not drop until his last sentence: this Jewish Messiah belongs to the nations too. Foreigners out of the east read the sky, and read the Scriptures, better than Jerusalem read her own—a small preview of the closing command in this Gospel, to go and teach all nations.",
    scripture:"“Where is he that is born King of the Jews? for we have seen his star in the east, and are come to worship him.”",
    setting:"Some time after the birth, wise men from the East—men who studied the stars and the old writings—turn up in Jerusalem asking an alarming question out loud: “Where is he that is born King of the Jews? for we have seen his star.” Herod goes cold, and the whole city with him. His scholars name the town: Bethlehem. The star leads the travellers to the house, and there they fall on their faces and worship a small child, laying out gold, frankincense, and myrrh. Then, warned in a dream, they slip home by another road and leave Herod waiting.",
    background:"The magi were most likely a learned caste from Persia or Babylon—lands where a large Jewish community had kept the Scriptures and the hope of a deliverer alive since the exile, and where watching the heavens was tangled up with the search for meaning. There is a rebuke buried in the story: outsiders read the stars and the prophets more honestly than Jerusalem read the books on her own shelf. The gifts were a king’s ransom, and the church early heard them as a kind of prophecy in metal and resin—gold for a king, frankincense for God, and myrrh, the spice of burial, for the death already waiting at the far end.",
    prophecy:"Centuries back, the pagan seer Balaam had said it against his own will—“there shall come a Star out of Jacob”—and the psalms had sung of distant kings arriving with gifts to bow before Israel’s King. Herod’s scribes, asked for the birthplace, read it straight off from Micah: Bethlehem. And these searching Gentiles are the first small harvest of the oldest promise of all, that through Abraham’s seed every family on earth would be blessed.",
    meaning:"Jerusalem sleeps, and its king schemes, while the outside world comes looking for Christ. Watch how God works with the magi: He meets them in the little light they already have—a star, some half-understood prophecies—and walks them toward more. They followed what they could see, and found a Saviour at the end of it. That is a picture of the whole future, every nation coming to His light. The scribes had all the knowledge and stayed home. The foreigners had a fraction of it, and knelt.",
    revealed:"The child cannot yet form a word, and already the nations are on their knees to Him and a king is trying to kill Him. The gifts spell out who He is—sovereign, God, and sacrifice-in-waiting. And the sight of learned men flat on the floor before a baby says the thing plainly: this infant may rightly be given the worship that belongs to God and to no one else.",
    moments:["The star seen in the East","“Where is he that is born King of the Jews?”","Herod and all Jerusalem troubled","The star rests over the house","Gold, frankincense, and myrrh—and worship"],
    lessons:["Follow faithfully the light you already have, and it will lead you to more.","Knowledge without humility can leave you standing outside the very door you point others through.","God meets sincere seekers wherever they begin—even under a foreign sky."],
    quote:"While God was opening the door to the Gentiles, the Jewish leaders were closing the door to themselves.", },

{ id:"flight-egypt", era:"advent", title:"The Flight into Egypt", gospel:"Matthew 2", ref:"Matthew 2:13–23",
    lens:"Only Matthew records the flight and the killing that follows, and he reads both through the prophets—“Out of Egypt have I called my son”—so that the child ends up walking Israel’s own history over again. It fits the portrait he is painting: Jesus as the true Israel and a second Moses, hunted in infancy the way Moses was, and called up out of Egypt like the nation before Him.",
    parallels:"Luke 2:39–40",
    scripture:"“Arise, and take the young child and his mother, and flee into Egypt.”",
    setting:"The angel comes to Joseph again, in another dream: Herod means to kill the child—get up. He gets up that same night, takes the boy and His mother, and goes down into Egypt, and stays until word comes that Herod is dead. Behind them, Herod—cheated by the magi and wild about it—has the little boys of Bethlehem, two and under, put to the sword. The Saviour is already gone. When the old king finally dies, the angel sends the family back, and they make their home again in Nazareth.",
    background:"Egypt lay outside Herod’s reach and held a very large Jewish population; along the well-travelled roads it was the natural place to run, and the magi’s gold may well have paid for the road and the months away. As for the crime itself—Herod was old, diseased, and so jealous of his throne that he had already murdered several of his own sons. Bethlehem was a small town; the boys killed there would have numbered not the thousands of legend but a handful. A handful is enough. It does not shrink one mother’s grief by a degree.",
    prophecy:"In the coming-back from Egypt, Matthew hears Hosea—“Out of Egypt have I called my son”—the child tracing again the path of Israel, God’s own firstborn. In the crying of Bethlehem he hears Jeremiah: Rachel weeping for her children and refusing to be comforted. And in the family’s settling at Nazareth he hears the prophets’ picture of a despised and rootless Branch, a man from a town nobody respected.",
    meaning:"The Prince of Peace is a wanted man before He can walk, and innocent blood is spilled around Him almost at once. And yet—hold onto this—nothing Herod or hell can arrange will touch the purpose of God for His Son. The baby carried off in the dark will not be laid a hand on until the hour He chooses. Herod’s sword throws its shadow across the manger early. It falls on empty straw.",
    revealed:"The Son of God takes the refugee’s road for Himself—the night border-crossing, the fear, the helplessness of a family with nowhere safe to be. The One who will later tell a storm to be quiet is for now entirely dependent on a carpenter’s arms and a foreign highway. God is with us in the danger, then, and not only in the singing.",
    moments:["Joseph warned by the angel in a dream","The night flight into Egypt","Herod’s slaughter of the innocents","The death of the king","The return, and dwelling in Nazareth"],
    lessons:["God’s purposes are never at the mercy of a tyrant’s schemes.","Christ shares the lot of the refugee and the hunted; He is with us in danger, not only in joy.","Suffering permitted around us does not mean God has lost the thread of the story."],
    quote:"Such was the Saviour’s reception when He came to the earth. There seemed to be no place of rest or safety for the infant Redeemer.", },

{ id:"boy-temple", era:"hidden", title:"The Boy in the Temple", gospel:"Luke 2", ref:"Luke 2:41–52",
    lens:"This is the only window the Gospels ever open on Jesus between the cradle and the Jordan, and Luke is the one who opens it. He sets it between two soft reminders that the boy “increased in wisdom and stature”—which is very Luke: orderly, careful, and fascinated by the fact that the Saviour was a real child who actually grew.",
    scripture:"“How is it that ye sought me? wist ye not that I must be about my Father’s business?”",
    setting:"At twelve He comes up to Jerusalem with His family for the Passover, and when the caravan starts home He stays behind in the temple. It takes His parents three days of rising panic to find Him—sitting among the teachers of the law, listening and asking questions, and everyone within earshot amazed at the understanding of this boy. Mary’s relief comes out as a mild reproach, and He answers with the first words of His that anyone wrote down: “Wist ye not that I must be about my Father’s business?”",
    background:"At twelve a Jewish boy stood on the edge of religious adulthood, about to be held responsible for the law himself, so this Passover would have been Jesus’ first as a near-grown participant. Pilgrim families travelled in big companies, the children drifting among aunts and cousins along the way—which is exactly how a whole day could pass before anyone noticed He was gone. The “doctors” were the rabbis who taught and argued in the temple courts, a place where a sharp question, even from a boy, was welcomed rather than hushed.",
    prophecy:"Malachi had promised that the Lord they were looking for would “suddenly come to his temple.” Here He is—no announcement, no notice taken, the true Owner of the place sitting cross-legged among its teachers. The psalmist’s zeal for his Father’s house is already awake in Him, and the Desire of all nations is quietly in His own courts, twelve years old and busy with His Father’s affairs.",
    meaning:"His first recorded sentence shows a heart already handed over to His Father, and a boy beginning to understand who He is and what He is for. And then He goes home to Nazareth and does as He is told. That is the astonishing half of it. For roughly eighteen more years the Son of God grows up quietly under Joseph and Mary, gaining wisdom and height and favour with God and men. A young life wholly given to God turns out to look like this: the Father’s business first, and honest obedience in an ordinary house.",
    revealed:"The boy already calls God His Father in a way no one else has any right to, and calls the temple His Father’s house. And the same boy who has just left the rabbis speechless walks out with His parents and spends the next years minding a carpenter and his wife. He is fully God. He is also, really, a twelve-year-old—learning obedience the slow way, in the plain schoolroom of a human childhood.",
    moments:["The Passover pilgrimage to Jerusalem","Left behind, and sought for three days","Found questioning the teachers","“I must be about my Father’s business”","Subject at Nazareth, growing in wisdom"],
    lessons:["A consecrated life puts the Father’s business first and honest obedience close behind.","Most of holiness is worked out quietly, in ordinary days that no one applauds.","Even the Son of God grew—He learned obedience the slow, human way."],
    quote:"New impulses were awakening within Him. Silent and absorbed, He seemed to be studying out a great problem. The mystery of His mission was opening to the Saviour.", },

{ id:"john-baptist", era:"begin", title:"The Voice in the Wilderness", gospel:"Matthew 3 · Mark 1 · Luke 3", ref:"Matthew 3:1–12",
    parallels:"Mark 1:1–8 · Luke 3:1–18 · John 1:19–28",
    scripture:"“Prepare ye the way of the Lord, make his paths straight.”",
    setting:"Out of the desert walks a man in camel’s hair, eating locusts, and Israel cannot stay away. After four silent centuries a prophet is preaching again—a baptism of repentance for the forgiveness of sins—and the crowds pour out from Jerusalem and Judea to the Jordan to confess and be washed. He spares no one, not the soldiers, not the Pharisees; and every sermon ends by pointing past himself to Someone mightier, whose sandal he is not fit to untie.",
    background:"For four hundred years heaven had said nothing. Now a prophet stood in the wilderness again, and the whole nation felt it. Everything about him—the rough garment, the desert home, the blunt fierceness—brought Elijah to mind. He called the crowds a “generation of vipers” to their faces. And his baptism turned the usual expectation upside down: the covenant people themselves, not merely Gentile converts, were told they needed washing and a change of heart.",
    prophecy:"Isaiah had heard him centuries ahead—“the voice of one crying in the wilderness”—and Malachi had promised a messenger sent on ahead to clear the road. Jesus Himself would call John the Elijah who was to come. He is the last of the prophets, and the greatest of them; and his whole greatness is that he exists to point away from himself to Another.",
    meaning:"“He must increase, but I must decrease.” There is the whole secret of the man. John drew enormous crowds and then spent them—handing his own followers over to Jesus, content to fade. He never claimed to be the light; he only testified to it. And the road he told people to prepare was an inward one: the high places of pride pulled down, the crooked places in the heart made straight, so the Lord could come in.",
    revealed:"Every word John says about the coming One tells you who He is: the Lamb of God, the mightier Lord who will baptize not with water but with the Holy Ghost and with fire. His whole life is a raised arm pointing forward. The Lord so long awaited is near at last—and the only welcome that fits Him is a repentant heart.",
    lens:"All four Gospels start the ministry here, with the Baptist and Isaiah’s wilderness voice. Mark opens his whole book with him. Luke fixes the date by naming emperors and governors, and records John’s plain counsel to tax collectors and soldiers. And John’s Gospel strips him down to a single role: “he was not that Light, but was sent to bear witness of that Light.”",
    moments:["The prophet’s voice after long silence","“Repent ye: for the kingdom of heaven is at hand”","Crowds baptised, confessing their sins","The Pharisees warned to flee the wrath","“One mightier than I cometh”"],
    lessons:["Real greatness may mean decreasing so that Christ can increase.","Every true ministry points away from itself to Jesus.","Preparing for the Lord is inward work—pride leveled, the crooked heart made straight."],
    quote:"John found in the wilderness his school and his sanctuary. Like Moses amid the mountains of Midian, he was shut in by God’s presence, and surrounded by the evidences of His power.", },

{ id:"baptism", era:"begin", title:"The Baptism of Jesus", gospel:"Matthew 3", ref:"Matthew 3:13–17",
    lens:"All four Gospels open the public ministry at the Jordan. Mark starts his whole story here, with no infancy at all. Matthew adds John’s protest and the word about fulfilling all righteousness. Luke sets it inside his sweep of world history and notices, as he so often does, that Jesus was praying. John never describes the baptism itself—he gives us only the Baptist’s witness to the Lamb and the dove coming down.",
    parallels:"Mark 1:9–11 · Luke 3:21–22 · John 1:29–34",
    scripture:"“This is my beloved Son, in whom I am well pleased.”",
    setting:"John is baptizing the crowds for repentance when Jesus comes down from Galilee and asks to be baptized too. He has no sin to confess. He steps into the water anyway—to fulfill all righteousness, and to stand where the guilty stand, among the very people He came to save. John recoils; who is he to baptize this man? But he yields. And as Jesus comes up out of the river, the sky tears open above Him.",
    background:"John’s baptism was genuinely new. The ritual washings people knew were repeated and self-administered, and the baptism given to converts was for Gentiles joining the covenant. John summoned the covenant people themselves to one public baptism of repentance—as though the whole nation needed converting. The likely site, near Bethany-beyond-Jordan, was the very ford where Israel had first crossed into the land. Even the ground underfoot preached a fresh start.",
    prophecy:"The dove and the voice answer two old prophecies at once. Isaiah had promised a Servant on whom the Spirit of the Lord would rest; the second Psalm had God greet His King as His own Son. Both come true over the water in a single moment. And John’s own preaching had already made good on Isaiah’s word about a voice crying in the wilderness, “Prepare ye the way of the Lord.”",
    meaning:"The sinless One asking for a sinner’s baptism is the whole gospel in one gesture. Before He has taught a single sentence, He steps down into the place of the guilty. And heaven answers that step: the Spirit comes as a dove, the Father speaks, and for one moment Father, Son, and Spirit stand revealed together at the doorway of His ministry. The word spoken over Him—“in whom I am well pleased”—is the word every one of us aches to hear. In Christ it is spoken over us too.",
    revealed:"For one moment at the Jordan the one God is seen as three: the Son in the river, the Spirit descending, the Father’s voice out of the open sky. The Servant who will one day carry the sin of the many takes His place here among sinners—and is claimed by the Father as the beloved Son. He is God; and He now stands in the water as the Man who represents us all.",
    moments:["Jesus comes from Galilee to the Jordan","John’s protest: “I have need to be baptized of thee”","“Thus it becometh us to fulfil all righteousness”","The heavens opened, the Spirit as a dove","The Father’s voice: “This is my beloved Son”"],
    lessons:["Jesus began by taking His place among sinners; identification is the shape of His whole mission.","The Father’s “in whom I am well pleased” is spoken over every soul hidden in Christ.","Willing obedience, not achievement, is what heaven delights to honor."],
    quote:"The voice which spoke to Jesus says to every believing soul, This is My beloved child, in whom I am well pleased.", },

{ id:"temptation", era:"begin", title:"The Temptation", gospel:"Matthew 4", ref:"Matthew 4:1–11",
    lens:"All three Synoptics record the temptation. Mark does it in one stark sentence—the wilderness, the wild beasts, the forty days. Matthew and Luke give the three exchanges of Scripture, but in different order: Luke ends at the temple in Jerusalem, the city his whole Gospel is traveling toward. Each writer arranges the scene to serve the Christ he is showing us.",
    parallels:"Mark 1:12–13 · Luke 4:1–13",
    scripture:"“Man shall not live by bread alone, but by every word that proceedeth out of the mouth of God.”",
    setting:"Straight from the glory of His baptism, Jesus is driven by the Spirit into the wilderness, where He fasts forty days. Then, in the hour of His deepest weakness, the tempter comes. Turn these stones into bread. Throw Yourself from the temple’s height. Bow once, and take the kingdoms of the world. To each, Jesus answers the same way: “It is written.” At last the devil leaves Him, and angels come and feed Him.",
    background:"The barren hill country between Jerusalem and the Jordan, prowled by wild animals, made a fitting stage. Forty days of fasting echo the forty days of Moses and Elijah—and the forty years Israel was tested in the desert. That parallel is the whole point. Where Israel, God’s “son,” grumbled and failed under hunger, the true Son holds firm. And every answer Jesus gives is quoted from Deuteronomy, the very book of Israel’s wilderness testing.",
    prophecy:"The scene reaches back to Eden. There the first Adam fell to the tempter while surrounded by every good thing; here the last Adam holds His ground with nothing at all. And it reaches forward to the oldest promise of all—that the woman’s seed would crush the serpent’s head. In the desert the first blow of that long war is struck, and the serpent loses.",
    meaning:"Where the first Adam gave in, the second Adam stands—and notice how. Not by overpowering the enemy with divine force, but as a man leaning His whole weight on His Father’s word. He was tempted at every point we are, and did not sin. So He is both the Substitute who stands in our place and the example of how a person actually stands. And the weapon He used—“It is written”—He puts into our hands.",
    revealed:"That the Son of God could be hungry, cornered, and worked over by the tempter shows how completely He has taken our nature and stepped into our fight. He does not fight from the safe height of deity. He fights on the exact ground where we go down—and wins there, so that in His strength we can win there too.",
    moments:["Led by the Spirit into the wilderness","The forty days’ fast and hunger","The appeal to appetite refused","The pinnacle and the kingdoms rejected","“It is written”—and angels minister"],
    lessons:["Temptation is answered not by clever argument but by the word of God taken to heart.","Christ met the tempter as a dependent man, not from the safety of deity—so His victory can become ours.","The hour of greatest weakness is often the hour of fiercest testing; watch and pray."],
    quote:"The tempter can never compel us to do evil. He cannot control minds unless they are yielded to his control. The will must consent, faith must let go its hold upon Christ, before Satan can exercise his power upon us.", },

{ id:"first-disciples", era:"begin", title:"The First Disciples", gospel:"John 1 · Luke 5", ref:"John 1:35–51",
    lens:"John tells of the first followers by the Jordan—“Behold the Lamb of God”—while the lakeside call and the great catch of fish belong to the Synoptics, Luke most fully. John’s version rings with titles tumbling out one after another: Messias, Son of God, King of Israel. Luke’s reads more like a parable of grace—Peter falls down a sinner and gets up a fisher of men.",
    parallels:"Matthew 4:18–22 · Mark 1:16–20 · Luke 5:1–11",
    scripture:"“Follow me, and I will make you fishers of men.”",
    setting:"By the Jordan, John points two of his own disciples toward Jesus—“Behold the Lamb of God”—and they simply follow Him and spend the day where He is staying. Andrew goes and fetches his brother Simon, whom Jesus renames Peter. Philip and Nathanael are called next. Later, on the Sea of Galilee, after a catch so large it nearly swamps the boats, these fishermen walk away from everything at His word to fish for men instead.",
    background:"The men He called were working fishermen, partners in a modest trade on the lake, with no training in the rabbinic schools—yet steeped in the Scriptures and the nation’s hope all the same. Ordinarily a would-be disciple went looking for a rabbi. Here the Rabbi comes looking, and does the choosing. And their very lack of schooling, free of the hardened traditions of the temple academies, left them the readier to be taught something new.",
    prophecy:"When John calls Jesus “the Lamb of God,” he folds two old images into one: the Passover lamb of the Exodus and Isaiah’s suffering servant, “brought as a lamb to the slaughter.” And when Jesus speaks of angels going up and down upon the Son of man, He takes up Jacob’s ladder—claiming to be the true stairway that joins earth to heaven, the King Nathanael has just confessed.",
    meaning:"Christ builds His kingdom out of ordinary men made new, not out of the powerful or the learned. To follow Him is to be re-made for a calling far larger than any trade you could leave behind. “We have found the Messias,” they keep telling each other, half in disbelief—and at once they go looking for someone else to tell. That is the reflex of a found person: go and find another.",
    revealed:"He calls, and grown men walk away from their livelihoods to follow—an authority that belongs to God alone. And when He looks at unsteady Simon and names him “Rock” long before he is anything of the sort, He shows Himself the One who sees the end from the beginning, and who builds the pillars of His church out of the unlikeliest material.",
    witness:"These calling scenes carry the texture of things actually remembered: Andrew fetching Peter, Philip finding Nathanael, Cana and Bethsaida dropped in as a matter of course, private words that only made full sense later. Faith does not begin here as myth or spectacle. It begins as a string of ordinary introductions that happened to change ordinary men for good.",
    moments:["“Behold the Lamb of God”","“We have found the Messias”","Simon named Peter","The miraculous draught of fishes","Nets forsaken to follow Christ"],
    lessons:["Christ still builds His work out of ordinary, teachable people, not the impressive.","The first instinct of a found disciple is to go and find someone else.","Jesus names us for what He will make of us, not for what we already are."],
    quote:"Jesus knew that the disciples were following Him. They were the first fruits of His ministry, and there was joy in the heart of the divine Teacher as these souls responded to His grace.", },

{ id:"cana", era:"begin", title:"The Wedding at Cana", gospel:"John 2", ref:"John 2:1–11",
    lens:"Cana is John’s, the first of the seven “signs” by which his Gospel unfolds Christ’s glory. Set right at the start, water turned to wine says something about all that follows: in Jesus the old order of ceremony is giving way to the new wine of the kingdom. It reads almost like a quiet manifesto for the whole Book of Signs to come.",
    scripture:"“This beginning of miracles did Jesus in Cana of Galilee, and manifested forth his glory.”",
