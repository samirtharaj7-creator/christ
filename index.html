    setting:"The morning after the triumphal entry, Jesus comes in from Bethany hungry. He spots a fig tree in full leaf, goes to it—and finds nothing but leaves. He speaks a word over it: no one will eat from it again. Between that word and the disciples finding the tree withered, Jesus walks into the temple and tears the mask off a house of prayer turned into a den of thieves. Next morning Peter notices the fig tree dead to the roots. Jesus does not marvel at the miracle; He turns it into a call—“Have faith in God”—and teaches prayer, forgiveness, and confidence in the Father.",
    background:"A fig tree in full leaf ought to have early fruit already forming under the leaves—so the leaves were a promise the tree did not keep. And in the prophets, Israel was again and again pictured as a fig tree or a vineyard that God came looking to for fruit. So this is not Jesus losing His temper at a plant. It is a visible warning in Passover week. A nation loud with religious leaves—temple traffic, public profession—is being searched by its Lord, and the question is whether any actual fruit is on the branch: prayer, mercy, repentance, faith.",
    prophecy:"The prophets had grieved over the missing fruit among God’s people, and warned that outward privilege could never stand in for repentance. Now the Lord has come suddenly to His temple, exactly as Malachi said He would. And the fig tree, dead to its roots, becomes a two-edged sign: judgment on fruitless worship, and a call back to the living faith God had wanted from His people all along.",
    meaning:"Christ looks deeper than the surface. Leaves can impress a passerby; they cannot feed a hungry man. And the warning is sharp because empty religion is genuinely dangerous—it advertises life while producing nothing. Yet Jesus does not leave the disciples staring at a dead tree; He turns them toward living trust. Faith in God bears fruit where mere display cannot. And He ties prayer to forgiveness, lest even our zeal turn into another kind of barrenness.",
    revealed:"Jesus is the Lord who comes looking for fruit from His people, and whose word reaches all the way to the roots. He is never fooled by a lot of religion with no life in it. Even His judgments are honest mercies—they expose the hollowness on purpose, so that prayer and forgiveness and faith can finally become something real.",
    witness:"Mark’s sandwich—fig tree, temple, fig tree—is a deliberate signal, both literary and historical. He is not just listing what happened in order; he is preserving the meaning Jesus Himself gave that week, by setting the acted sign and the temple action side by side so each reads the other.",
    moments:["Jesus comes hungry from Bethany","The leafy fig tree has no fruit","A word of judgment is spoken","The temple is cleansed between the two mornings","The tree is found dried from the roots","Jesus says, “Have faith in God”","Prayer and forgiveness are joined"],
    lessons:["Leaves impress the passerby; only fruit feeds the hungry.","Empty religion is dangerous precisely because it looks alive.","Christ’s word reaches the roots—He is never fooled by a show of piety."],
    quote:"Those who thus live for self are like the fig tree, which made every pretension but was fruitless. They observe the forms of worship, but without repentance or faith." },

{ id:"temple-cleansed", era:"passion", title:"Cleansing the Temple", gospel:"Matthew 21", ref:"Matthew 21:12–17",
    lens:"The Synoptics put the temple cleansing in the last week—the act that finally hardens the rulers against Him. John sets a cleansing at the very opening of his Gospel. One event remembered in two places, or two events: either way the zeal for the Father’s house, and that scalding phrase, a den of thieves, belong to every portrait of the King arriving at His own temple.",
    parallels:"Mark 11:15–19 · Luke 19:45–48",
    scripture:"“My house shall be called the house of prayer; but ye have made it a den of thieves.”",
    setting:"He comes into the temple in the last week and finds the outer court running like a market—oxen, sheep, doves for sale, the money-changers behind their tables. He drives them out, tips the tables over, and will not let a man carry his goods through the courts. And then, in the quiet He has made, the blind and the lame come to Him, and He heals them, while the children keep up their cry: “Hosanna to the Son of David.”",
    background:"The trade filled the Court of the Gentiles—the one court where the nations were allowed to come and pray—so worship was literally crowded out by commerce. Pilgrims had to change their money into the temple coin and buy “approved” animals, and the rates were rigged to line the pockets of the priestly families. It was greed wearing the clothes of religion. And this late cleansing rhymes with the one at the very start of His ministry: the same rebuke, bracketing everything in between.",
    prophecy:"In a single sentence Jesus welds two prophets together—Isaiah’s vision of the temple as “an house of prayer for all people,” and Jeremiah’s accusation that they had turned it into “a den of robbers.” And Malachi had said the Lord would “suddenly come to his temple” to purify its worship. That is exactly what happens, in front of everyone: the Lord, suddenly, in His own house.",
    meaning:"His zeal for the Father’s house burns against every defilement of holy things, and against a religion that grows fat off the worshipper. The One who cleared the temple of its traders wants to clear the temple of the heart too—to drive out whatever has crowded the place where prayer belongs. The anger is not the opposite of His love. It is what His love looks like when it meets what has been done to something holy.",
    revealed:"He calls it “my house.” He claims the right to purge God’s own dwelling—and no one who watches doubts the authority. Yet notice where it lands: in the court He has just swept clean, the blind and the lame come to Him, and He heals them. The same hands that overturned the tables are the hands that heal. He casts out the profane and gathers in the needy, in one motion.",
    moments:["The outer court turned to a market","The tables of the money-changers overturned","“My house shall be called the house of prayer”","The blind and lame healed in the courts","The children’s Hosanna"],
    lessons:["Christ’s anger is the other face of His love for what is holy.","Commerce had crowded out the one court where the nations could pray—privilege can push out the very people it was meant to welcome.","He clears the temple of the heart the same way—driving out whatever crowds the place of prayer."],
    quote:"Divinity flashed through humanity, investing Christ with a dignity and glory He had never manifested before.", },

    { id:"questions-temple", era:"passion", title:"Questions in the Temple", gospel:"Mark 12 · Matthew 22 · Luke 20", ref:"Mark 12:13–34",
    lens:"The Synoptics cluster these temple controversies into the final week, after Jesus has entered the city as King and cleansed the temple as Lord. One group after another comes with a question rigged to trap Him—Rome, resurrection, the law itself—and each time the trap springs open into His authority instead of closing on Him.",
    parallels:"Matthew 22:15–40 · Luke 20:20–40",
    scripture:"“Render to Caesar the things that are Caesar's, and to God the things that are God's.”",
    setting:"The opponents come in waves. First the Pharisees and Herodians—enemies who have made peace to trap one man—ask whether it is lawful to pay tribute to Caesar. Jesus asks to see the coin, exposes them, and gives an answer that neither flatters Rome nor foments revolt: render to Caesar what is Caesar’s, and to God what is God’s. Then the Sadducees, who do not believe in resurrection at all, float a mocking riddle about seven brothers and one widow. Jesus answers straight out of their own Moses: God is not the God of the dead, but of the living. Last, a scribe asks which commandment comes first, and Jesus gathers the whole life of faith into two loves—for the one Lord, and for the neighbour.",
    background:"Every question is a loaded weapon. Say the wrong thing about tribute and Jesus is either a traitor to Israel or a rebel against Rome—and the coin in His hand, stamped with Caesar’s face and Caesar’s divine title, puts the whole trap where everyone can see it. The Sadducees attack the resurrection by making it look ridiculous, and they quote Moses to do it—so Jesus answers them from Moses. The scribe’s question drops Him into a debate the rabbis had been having for generations. And through all of it He is never rushed, never cornered, never on the defensive. He asks for a coin. He opens the Torah. He hands back the heart of the commandments.",
    prophecy:"The stone the builders rejected now stands in the temple, answering the builders to their faces. The law and the prophets turn out to have their centre in Him—for He is the one man who renders to God, without remainder, what bears God’s image; who lives in the certainty of resurrection; who loves the Father with all His heart and soul and mind and strength.",
    meaning:"Jesus will not accept any of the false choices He is handed. Paying Caesar does not cancel what you owe God; clever doubt does not abolish the resurrection; keeping commandments without love misses the whole point. The coin carries Caesar’s image—hand it back to Caesar. But you carry God’s image. The real question was never how little you can give to God. It is whether you will hand back the whole self that already belongs to Him.",
    revealed:"He speaks as the true Teacher in His Father’s house—reading hypocrisy on sight, honouring Scripture down to the tense of a single verb, shutting down error without ever being cruel, and warmly telling the scribe who answers well that he is “not far from the kingdom.” This is not mere cleverness. It is wisdom that is holy, ordered, and full of the living God.",
    witness:"The scene fits the world we independently know: the actual parties—Pharisees, Herodians, Sadducees—the real friction of tribute under Roman occupation, the live arguments over resurrection and over which commandment ranked first. The three accounts keep the same core and differ in their emphases, the way genuine memory of a public debate does.",
    moments:["Pharisees and Herodians ask about tribute","Jesus calls for the coin","Caesar’s claim is set beneath God’s greater claim","Sadducees challenge the resurrection","God is declared God of the living","A scribe asks the greatest commandment","Love for God and neighbour is named as the heart of the law"],
    lessons:["Jesus refuses the false choice—loving God does not cancel your ordinary obligations, and keeping them does not cancel God.","The coin bears Caesar’s image; you bear God’s—so it is the whole self that God asks for.","Traps set for the truth only give it another door to walk through."],
    quote:"When God has His rightful place on the throne of the heart, the right place will be given to our neighbor. We shall love him as ourselves." },

{ id:"widow-mite", era:"passion", title:"The Widow’s Mite", gospel:"Mark 12", ref:"Mark 12:41–44",
    lens:"Only Mark and Luke keep the widow’s two mites, and they set the story deliberately against the long robes and showy giving of the scribes Jesus has just denounced. He “sat over against the treasury”—He sat down and watched—and out of a whole crowd He weighed the coins of a woman no one would have named. In that one glance is the Gospels’ whole reversal of great and small.",
    parallels:"Luke 21:1–4",
    scripture:"“This poor widow hath cast more in, than all they which have cast into the treasury.”",
    setting:"In the last days of His public teaching, Jesus sits down across from the temple treasury and simply watches people give. The rich come and put in large sums. Then a poor widow steps up and drops in two mites—the smallest coins there were. He calls the disciples over to make sure they see it: she has given more than all the others put together. They gave out of their surplus. She gave out of her need—everything she had to live on.",
    background:"Thirteen trumpet-mouthed chests stood in the Court of the Women to catch the offerings, so a gift could be seen going in—and, as the coins struck the metal, even heard. Two mites came to a fraction of a day’s wage, about the least a person could put in. For the widow they were everything she owned. And in all that clatter of larger money, the one eye in the temple that mattered was resting on the coins nobody else even noticed.",
    prophecy:"Long before, the Lord had named Himself the widow’s defender, who “relieveth the fatherless and widow,” and had told Samuel that “the LORD looketh on the heart.” Here that searching eye rests on two small coins; and the God who once sustained a widow of Zarephath by her last handful of meal honours a widow’s all again.",
    meaning:"God does not weigh a gift by its size but by what it costs the giver. Two mites given from all she had outweighed every large gift given from plenty, because she held nothing back. A thing that is small in the hand can be enormous in the heart—and the heart is what Christ was reading across that court.",
    revealed:"He noticed. He remembered. He made two small coins, dropped by a woman history would otherwise never have heard of, into a story the whole world now knows. That is the kind of knowledge God has—searching and tender at once, letting no hidden act of love fall through. The Lord who watches the treasury is really reading the giver.",
    moments:["Jesus watches over against the treasury","The rich cast in much","A poor widow’s two mites","“She hath cast in more than they all”","Given of her want, even all her living"],
    lessons:["God weighs a gift by what it costs the giver, not by what it comes to.","She kept nothing back—true giving is measured by what stays in your hand as much as by what leaves it.","No hidden act of love falls through; the eye that mattered was on the coins no one else noticed."],
    quote:"Her heart went with her gift; its value was estimated, not by the worth of the coin, but by the love to God and the interest in His work that had prompted the deed.", },

{ id:"olivet", era:"passion", title:"On the Mount of Olives", gospel:"Matthew 24 · Mark 13", ref:"Matthew 24:1–14",
    parallels:"Mark 13:1–13 · Luke 21:5–19",
    scripture:"“Heaven and earth shall pass away, but my words shall not pass away.”",
    setting:"As Jesus walks out of the temple for the last time, the disciples turn back to admire its huge stones. He tells them not one of those stones will be left on another. Later, sitting on the Mount of Olives with the temple full in view across the valley, He answers their questions—when will this happen, and what will be the sign of your coming and of the end of the age—and His answer runs the fall of Jerusalem and the close of the world together in a single thread.",
    background:"The temple was the nation’s pride, freshly rebuilt and assumed to be permanent. Within forty years it was rubble, exactly as He said. From Olivet the great courts lay spread out across the Kidron, so the disciples heard the prophecy with the doomed building right in front of them. His words look through the nearer judgment on the city toward the far horizon of His own return, and the refrain all the way through is the same: watch, endure, and do not be fooled.",
    prophecy:"He picks up the prophets’ language of the day of the Lord—wars, famines, the sun darkened, the powers of heaven shaken—and draws all of it around His own coming as the Son of man on the clouds. The gospel carried to every nation, and then the end: the long march of history laid out beneath one sure word, His.",
    meaning:"Nations will shake and the proudest works of the world will fall, and through all of it one thing holds: “heaven and earth shall pass away, but my words shall not pass away.” His people are not meant to be terrified by the signs—they are meant to stay awake and ready, because the day closes like a snare on anyone asleep. The end of all things is not chaos. It is the King, arriving.",
    revealed:"Days before His own execution, He speaks with complete calm about the destruction of the temple, the whole span of the age to come, and His own return in glory. Only one kind of person talks like that: the Lord of history and the Judge of the world. His word will still be standing when heaven and earth are gone, because it is the word of God.",
    lens:"This is the last of Matthew’s five great teaching blocks, closing the public ministry the way the Sermon on the Mount opened it. All three Synoptics carry it, braiding the doom of Jerusalem into the end of the age, and all three press the same point: keep watch. Matthew alone lets it spill on into the parables of the ten virgins and the talents, and the judgment of the nations.",
    moments:["“There shall not be left one stone upon another”","The disciples’ question on Olivet","Wars, famines, and false christs foretold","“This gospel… shall be preached in all the world”","“Heaven and earth shall pass away, but my words shall not”"],
    lessons:["When everything permanent proves temporary, His word is the one thing left standing.","The signs are not for terror but for wakefulness—the day traps only the sleeping.","History is not drifting toward chaos; it is moving toward the King’s arrival."],
    quote:"By giving the gospel to the world it is in our power to hasten our Lord’s return.", },

{ id:"foot-washing", era:"passion", title:"The Washing of Feet", gospel:"John 13", ref:"John 13:1–17",
    lens:"The foot-washing is John’s alone, standing exactly where the other Gospels put the bread and the cup; it opens his long account of the last night. That the Lord who “came from God, and went to God” would tie on a towel and wash feet is, for John, the very shape of divine love—the same downward motion that ends at the cross.",
    scripture:"“If I then, your Lord and Master, have washed your feet; ye also ought to wash one another’s feet.”",
    setting:"It is the last night, and the disciples are still arguing about which of them is greatest. In the middle of that, Jesus gets up from the meal, takes off His outer garments, wraps a towel around His waist, and starts washing their feet. Peter recoils—“Thou shalt never wash my feet”—until he hears that unless he lets Him, he has no part with Him. Then, having done the servant’s work Himself, the Master tells them to do it for one another.",
    background:"Feet got filthy on the dusty roads, and washing a guest’s feet at the door was the lowest servant’s job in the house. Not one of the disciples would stoop to it for the others—each thought it beneath him. So when the Lord Himself picked up the basin and the towel, He turned their whole idea of greatness upside down. It was also His quiet answer to the pride that had crept into even this hour.",
    prophecy:"Even as He stoops, the psalm is being fulfilled that Jesus Himself will name: “He that eateth bread with me hath lifted up his heel against me.” The Servant of Isaiah’s vision is here in flesh—He who would be “numbered with the transgressors” and pour out His soul—now girded with a towel, rehearsing at the basin the greater cleansing of the cross.",
    meaning:"The Majesty of heaven kneels at the feet of fishermen and makes lowly service the badge of His kingdom: whoever wants to be greatest has to become the servant of all. The washing reaches past the feet to the pride in the heart. And Christ makes His own humility do double work—both the pattern His people are to copy and the power that makes such love possible between them.",
    revealed:"The Lord and Master takes the servant’s place, and in that one stooping act He shows us the actual heart of God—who came not to be waited on, but to wait on us. The towel in the hands of the King is cut from the same cloth as the cross: a love that empties itself in order to lift someone else up.",
    moments:["The strife over who should be greatest","Jesus lays aside His garments","“Thou shalt never wash my feet”","“If I wash thee not, thou hast no part with me”","“Ye also ought to wash one another’s feet”"],
    lessons:["Greatness in His kingdom is measured by how low you will stoop to serve.","The basin reaches past the feet to the pride in the heart.","His humility is not only the example to copy but the power that makes such love possible."],
    quote:"No one was so exalted as Christ, and yet He stooped to the humblest duty.", },

{ id:"last-supper", era:"passion", title:"The Last Supper", gospel:"Luke 22", ref:"Luke 22:14–20",
    lens:"The Synoptics and Paul all record the bread and the cup; John, who gives the foot-washing in this spot instead, had already set out the Bread of Life chapters earlier. Luke frames the meal inside the Passover and lets it look forward to the feast in the kingdom, while the words “this do in remembrance of me” tie the church to the cross until He comes.",
    parallels:"Matthew 26:26–30 · Mark 14:22–26",
    scripture:"“This is my body which is given for you: this do in remembrance of me.”",
    setting:"On the night He is betrayed, in an upper room made ready for them, Jesus keeps the Passover with the Twelve. He gets up to wash their feet, teaching that the greatest must be the servant of all. He tells them, to their dismay, that one of them will hand Him over. And He takes ordinary bread and a cup of wine and pours new meaning into them—“This is my body… this is my blood”—setting up the memorial His church has kept ever since.",
    background:"The Passover went back to the night when lamb’s blood on the doorposts spared Israel’s firstborn and God marched His people out of Egypt—every dish on the table was telling that one story of rescue. Washing feet belonged to the lowest servant, so the Master taking the basin knocked their notions of greatness flat. And into this ancient feast of the old deliverance, without fanfare, Jesus sets Himself down as the new one.",
    prophecy:"For centuries the Passover lamb, whose blood had shielded Israel, had been pointing past itself to something it could not name. Now the true Lamb gets ready to be offered. When Jesus speaks of “the new testament in my blood,” He is keeping Jeremiah’s promise of a new covenant written on the heart, with sins remembered no more.",
    meaning:"The old feast of deliverance hands off to the new. The broken bread and the poured cup show the body given and the blood shed, and they bind His people to Him in a covenant of love. He turns their eyes off the lamb of Egypt and onto Himself, off the past and onto the day He comes again. The table He spreads faces two directions at once—back to His cross, forward to His return.",
    revealed:"In washing their feet the Lord of all takes the servant’s place; in the bread and the cup He offers His own body and blood as the food of the soul. And underneath both is a staggering claim: that His death is the ground of a new covenant between God and the human race. At this table the Servant and the Sacrifice turn out to be the same person.",
    moments:["The upper room made ready","The washing of the disciples’ feet","The betrayer foretold","Bread broken, the cup blessed","“This do in remembrance of me”"],
    lessons:["He fills ordinary bread and wine with Himself—the plainest things become the soul’s food.","The table faces both ways at once: back to the cross, forward to His return.","The Servant with the basin and the Sacrifice on the cross are one and the same Lord."],
    quote:"It is at these, His own appointments, that Christ meets His people, and energizes them by His presence.", },

  { id:"farewell-prayer", era:"passion", title:"The Farewell Words and Prayer", gospel:"John 14–17", ref:"John 14:1–17:26",
    lens:"The long farewell—four chapters of it—is John’s alone. On the very night He is about to be arrested, Jesus spends His last free hours not bracing Himself but steadying them: comforting, teaching, promising the Spirit, talking about a love that abides, and finally praying His disciples straight into the Father’s keeping.",
    scripture:"“Let not your heart be troubled: ye believe in God, believe also in me.”",
    setting:"After supper He talks to the frightened disciples with a tenderness that is almost hard to bear. He tells them about the Father’s house; He calls Himself the way, the truth, and the life; He promises another Comforter; He asks them to stay in Him the way a branch stays in the vine; He warns them the world will hate them, and then promises their grief will turn into joy. And at the end He simply lifts His eyes and prays—for His own glory, for the safe-keeping of His friends, and for everyone who will ever believe because of their words.",
    background:"All of this happens in the shadow of what is coming—betrayal, denial, arrest, before the night is out. The disciples are confused, afraid, and far weaker than any of them realizes. And Jesus, who has every reason to be inward and self-protective, spends the hours instead on them: steadying them, planting promises they will only understand later, and letting them overhear how He talks to His Father.",
    prophecy:"The promise of the Spirit picks up the old prophetic hope of a renewed people with God’s law written on the heart, not on stone. And the talk of vine and branches and fruit reaches back to Israel’s calling—Israel was God’s vine, and kept failing—now answered in Christ, the true Vine, whose life is the only thing that makes His people bear anything at all.",
    meaning:"These words are medicine for a troubled heart. Notice what Jesus does not promise: an easy road. What He promises instead is presence, peace, the Spirit, a way to the Father, and a joy the world cannot reach in to spoil. And the prayer settles one thing for good—we are being carried on His heart long before we ever learn how to stand on our own feet.",
    revealed:"He is the way to the Father, the true Vine, the one who gives peace and sends the Spirit, the Son who has shared eternal glory with the Father since before the world was. And all of that comes out not in thunder but in tenderness—majesty with the distance taken out of it, close enough to wash your feet and pray you by name.",
    witness:"The discourse has the texture of something actually remembered: disciples interrupt with real questions, misunderstandings are left standing rather than tidied away, and the same themes keep circling back a little deeper each time. It reads like the recollection of a man who leaned close at that table and then spent the rest of his life turning those words over.",
    moments:["Jesus comforts troubled hearts","He promises the Father's house","He reveals Himself as the way, truth, and life","He promises the Comforter","He prays for His disciples and future believers"],
    lessons:["Jesus meets fear not by fixing the circumstances but by giving His presence, His peace, and His Spirit.","He promises the Comforter for exactly the moments when we feel most alone.","We are carried on His heart in prayer before we ever learn to stand on our own."],
    quote:"At all times and in all places, in all sorrows and in all afflictions, when the outlook seems dark and the future perplexing, and we feel helpless and alone, the Comforter will be sent in answer to the prayer of faith." },

{ id:"gethsemane", era:"passion", title:"Gethsemane", gospel:"Matthew 26", ref:"Matthew 26:36–46",
    lens:"The agony in the garden is in all three Synoptics. John, whose Jesus moves through the passion in sovereign calm, skips it and gives instead the majestic “I am he” at the arrest. It is the other three who let us watch the sweat, the cup, the sleeping friends—the real, human place where the Son hands His own will over to the Father’s.",
    parallels:"Mark 14:32–42 · Luke 22:39–46",
    scripture:"“O my Father … not as I will, but as thou wilt.”",
    setting:"In a garden across the Kidron, under the olive trees, at night, Jesus takes Peter, James, and John a little further in to watch with Him, then goes on alone and prays in such anguish that His sweat falls like great drops of blood to the ground. Three times He prays the same prayer—“O my Father, if it be possible, let this cup pass from me: nevertheless not as I will, but as thou wilt”—and three times He comes back to find His friends asleep. An angel comes and strengthens Him.",
    background:"Gethsemane means “the oil-press”—a grove of olives on the lower slope of the mount, a place Jesus went often, which is exactly how Judas knew where to lead the soldiers. What He shrank from was not simply pain or death; martyrs have walked into both singing. It was something far heavier: the whole world’s sin coming down on Him, and with it the turning-away of His Father’s face. Blood in the sweat is what anguish looks like when it presses on body and soul at once.",
    prophecy:"The prophets had described a Servant who would be “a man of sorrows, and acquainted with grief,” the one on whom the Lord would “lay… the iniquity of us all.” In the garden that load begins to come down. The cup of wrath the Scriptures kept warning about is raised to His lips—and He takes it, not because He is forced, but because it is His Father’s will.",
    meaning:"The whole weight of the world’s sin comes down here, and the cup of separation is drained to the bottom—so the sharpest suffering of the passion happens before a single hand is laid on Him. And redemption turns on five words: “not my will, but thine.” He is not dragged to the cross; He chooses it, on His knees, in the dark. The victory is really won here, kneeling, before it is ever finished on the tree.",
    revealed:"We are not used to a God who trembles. But the ground of Gethsemane took His sweat, and the prayer was wrung out of Him, not spoken from some calm height. What steadies the scene is not that the fear passed—it did not—but that His asking did. Three times He begged; three times He bent. The dread was real. The surrender ran deeper.",
    moments:["“Tarry ye here, and watch with me”","The agony and the bloody sweat","“Not as I will, but as thou wilt”","The disciples sleeping for sorrow","The angel strengthening Him"],
    lessons:["The hardest part of the cross was fought and won kneeling, before anyone laid a hand on Him.","Real surrender does not wait for the fear to pass—His dread stayed, and He bent anyway.","Heaven’s help in Gethsemane was not escape from the cup but strength to drink it."],
    quote:"The angel came not to take the cup from Christ’s hand, but to strengthen Him to drink it, with the assurance of the Father’s love.", },

{ id:"betrayal", era:"passion", title:"The Betrayal", gospel:"Matthew 26", ref:"Matthew 26:47–56",
    lens:"All four Gospels tell of the arrest. The Synoptics keep the traitor’s kiss; John keeps the moment the whole armed band staggers backward at a single word from Jesus. Either way the picture is the same: He goes willingly—healing the man Peter wounds, calling off the sword—so the betrayal shows not a victim overpowered but a life being laid down on purpose.",
    parallels:"Mark 14:43–52 · Luke 22:47–53 · John 18:1–12",
    scripture:"“Friend, wherefore art thou come?”",
    setting:"He is still speaking when Judas arrives at the head of a crowd with lanterns, torches, and weapons, and gives his Master away with the agreed signal—a kiss. Peter’s sword flashes and takes off the ear of the high priest’s servant; Jesus heals the man on the spot and tells Peter to put the sword away. Then He simply hands Himself over. And every last disciple abandons Him and runs.",
    background:"The party that came out after dark was the temple guard and, it seems, a detachment of Roman soldiers besides—armed as if for a dangerous insurrectionist, though He had taught openly in the temple every day and could have been arrested at any time. A kiss was the ordinary way a disciple greeted his rabbi, which is what makes Judas’ chosen signal so grotesque. And the last miracle Jesus works before the cross is healing the ear of the man who came to seize Him—an enemy.",
    prophecy:"The psalmist had grieved over the close friend who “lifted up his heel” against him, and Zechariah had foreseen the Shepherd struck and the sheep scattered. Both come true in the same few minutes—Judas betrays, the disciples bolt. And Jesus says plainly that He is letting it happen “that the scriptures of the prophets might be fulfilled.”",
    meaning:"The kiss—the plainest sign of love there is—is turned into the instrument of treason. And yet nothing here is done to Jesus that He does not allow: no one takes His life from Him; He lays it down. He calls off the sword, heals the enemy, and walks into the dark of His own accord, so that Scripture is kept and the world is saved. The Shepherd lets Himself be struck—so that one day the scattered sheep can be gathered back.",
    revealed:"Even under arrest He is the one in command—one word from Him and the soldiers stumble backward to the ground. So no one watching should mistake this for defeat; it is a decision. He goes like a lamb to the slaughter, and the going itself is how He reigns.",
    moments:["Judas leads the armed multitude","The traitor’s kiss","Peter’s sword, and the healed ear","“I am he”—Jesus gives Himself up","The disciples forsake Him and flee"],
    lessons:["Nothing is done to Jesus that He does not permit—no one takes His life; He lays it down.","His last act before the cross is to heal an enemy who came to seize Him.","The deepest wound was not the soldiers’ but a friend’s kiss—and even Judas was met with love."],
    quote:"He knew how weak was their faith, and He sought to shield them from temptation and trial. For them He was ready to sacrifice Himself.", },

{ id:"denial", era:"passion", title:"Peter’s Denial", gospel:"Luke 22", ref:"Luke 22:54–62",
    lens:"All four Gospels record Peter’s three denials, foretold hours earlier at the supper. Luke alone keeps the detail that cuts deepest: “the Lord turned, and looked upon Peter.” Set against Jesus’ own faithful confession in the next room, the collapse of the bravest disciple is both a warning about self-confidence and a promise that grace can put a broken man back together.",
    parallels:"Matthew 26:69–75 · Mark 14:66–72 · John 18:15–27",
    scripture:"“Before the cock crow, thou shalt deny me thrice.”",
    setting:"While Jesus is being questioned inside the high priest’s house, Peter follows at a distance and sits down by a fire in the courtyard. Three times someone says he is one of Jesus’ men, and three times he says he is not—the last time with oaths. The cock crows. The Lord turns and looks straight at him. And Peter goes out and weeps as though his heart will break.",
    background:"Only hours earlier Peter had sworn he would die before he denied Him, and had actually drawn a sword in the garden. Now, warming his hands at the enemy’s fire, his nerve simply gives out—and his thick Galilean accent keeps giving him away. The open courtyard let him watch the trial and be watched in return. What finally broke him was not a judge or a soldier. It was a servant girl’s question.",
    prophecy:"The fall Peter swore could never happen, Jesus had predicted that same night, right down to the crowing of the cock. But the warning came wrapped in a promise—“I have prayed for thee, that thy faith fail not”—so that even this humiliating failure was already foreseen, and already fenced in by grace.",
    meaning:"Confidence in yourself is the short road to a fall: the disciple most sure of his own courage caves at a servant girl’s remark. But the denial is not the last word on Peter—the look of Christ is, and the bitter, cleansing tears that follow it. Weakness that shames us, brought back under that look, is exactly where repentance begins.",
    revealed:"In the middle of His own trial—accused, bound, hours from the cross—Jesus turns and looks at Peter. Not a glare. A look with no anger in it, the kind of love that breaks a heart in order to heal it. That He would spend that look on a man caught in the very act of disowning Him tells you what kind of Saviour this is: still going after the one who is failing Him, even while He is being condemned.",
    moments:["Peter follows afar off","Warming himself at the enemy’s fire","Three times: “I know him not”","The cock crows","The Lord turns and looks—and Peter weeps"],
    lessons:["The disciple surest of his own strength is the one who falls at a servant girl’s question.","The denial is not the last word on Peter—the look of Christ is.","His love goes looking for the one who is failing Him, even while He Himself is condemned."],
    quote:"In that gentle countenance he read deep pity and sorrow, but there was no anger there.", },

{ id:"trial", era:"passion", title:"The Trial & Condemnation", gospel:"John 18–19", ref:"John 18:28–19:16",
    lens:"Each Gospel frames the trials to fit its own portrait. The Synoptics dwell on the night hearing before the high priest and the charge of blasphemy; John gives the longest exchange with Pilate—“What is truth?”, “Behold the man,” “My kingdom is not of this world”—so that even standing in the dock the King is somehow reigning, and it is His judges who end up on trial.",
    parallels:"Matthew 27:11–26 · Mark 15:1–15 · Luke 23:1–25",
    scripture:"“Behold the man!”",
    setting:"All through the night and into the morning He is shuttled from Annas to Caiaphas and the council, then to Pilate, off to Herod, and back to Pilate again. The false witnesses cannot get their stories straight, so in the end He is condemned for the one thing He will not deny: that He is the Christ, the Son of God. Pilate says three times he finds no fault in Him—and then, cornered by the mob and afraid of Caesar, has Him scourged anyway. After the soldiers mock Him and jam a crown of thorns on His head, Pilate brings Him out—“Behold the man!”—and hands Him over to be crucified.",
    background:"The council had no authority to execute anyone, so the religious charge of blasphemy had to be repackaged as a political charge of treason before the Roman governor—“We have no king but Caesar.” The rushed night trial broke the council’s own rules for capital cases. And Pilate, already on thin ice with Rome and now facing the threat of a riot, condemned a man he had three times called innocent. The Roman scourge was a horror in itself—it often left a man maimed before he ever reached the cross.",
    prophecy:"Isaiah had sketched the whole scene centuries ahead: “he was oppressed, and he was afflicted, yet he opened not his mouth; he is brought as a lamb to the slaughter.” The silence in front of His accusers, the scourging, the mockery, the being lumped in with criminals—all of it fills in the prophet’s portrait of the suffering Servant, and the psalmist’s cry of a righteous man ringed round by enemies.",
    meaning:"The innocent One says nothing before His accusers, so that the guilty might one day have a voice before God. The King of kings is sentenced by the very world He came to rescue, and He takes its contempt without a single word of retaliation. That silence is not weakness; it is love, refusing to defend itself because it has decided to be condemned in our place. The Judge of all the earth is standing there as the prisoner at the bar.",
    revealed:"They dress Him up as a mock king—thorns for a crown, an old purple robe—and without knowing it they announce exactly who He is: “Behold the man,” and behold the King. The Son of God lets Himself be judged by men, so that men would not have to be judged by God.",
    moments:["From Annas to Caiaphas to Pilate","Condemned for confessing He is the Christ","Pilate: “I find in him no fault”","The scourging and the crown of thorns","“Behold the man!”—delivered to be crucified"],
    witness:"The Roman governor who sentenced Jesus is no legend. Tacitus, writing for pagan readers, notes that Christ “suffered the extreme penalty during the reign of Tiberius at the hands of one of our procurators, Pontius Pilatus”; Josephus likewise ties Pilate to the condemnation; and a limestone block dug up at Caesarea is carved with Pilate’s own name and title as Rome’s prefect of Judea. A trial before this exact official, in these exact years, rests on solid ground.",
    lessons:["His silence before His accusers was not weakness but love refusing to defend itself.","The Judge of all the earth chose to stand as the prisoner, condemned in our place.","Even the mockery told the truth—“Behold the man,” and behold the King."],
    quote:"He stood silent, but His silence was eloquence. It was as a light shining from the inner to the outer man.", },

{ id:"crucifixion", era:"passion", title:"The Crucifixion", gospel:"Luke 23 · John 19", ref:"Luke 23:33–46",
    lens:"Each evangelist keeps his own last words from the cross: Matthew and Mark, the cry of God-forsakenness; Luke, the forgiveness of His killers and paradise for the dying thief; John, “It is finished,” and the handing of His mother to a friend. Put together, the four hold all seven sayings—and four angles on the single death in which the world is bought back.",
    parallels:"Matthew 27:33–56 · Mark 15:22–41",
    scripture:"“It is finished: and he bowed his head, and gave up the ghost.”",
    setting:"They lead Him out to Golgotha, the place of a skull, just outside the city wall, and crucify Him between two criminals. From noon until three an unnatural darkness settles over the whole land. In those hours He prays for the men driving the nails, promises paradise to the thief who turns to Him, gives His mother into the care of the beloved disciple, and at the very end, with a loud cry, gives up His life.",
    background:"Crucifixion was the most shameful, most agonizing death Rome had—kept for slaves, rebels, and the lowest criminals, and staged out in the open along the roads to terrify everyone who passed. The condemned man usually carried the crossbeam to a fixed upright, and then death came slowly, by exhaustion and suffocation. Worse, the Law of Moses had put a curse on anyone “hanged on a tree,” so to Jewish eyes the very way He died looked like proof that God had rejected Him. And yet, at the moment He died, the temple veil tore from top to bottom—telling the opposite story: the way into God’s presence had finally been thrown open.",
    prophecy:"No page of the prophets is written more plainly across Calvary than Isaiah’s: “he was wounded for our transgressions… and with his stripes we are healed.” Psalm 22 had already named the pierced hands and feet, the soldiers splitting up His clothes and gambling for them, the jeering, the thirst—and the very cry of His abandonment, “My God, my God, why hast thou forsaken me,” is that psalm’s opening line.",
    meaning:"At the cross the justice of God and the mercy of God meet and are both satisfied at once: the sinless Son takes the penalty of a broken law in the place of the guilty, and the darkness over Golgotha is the Father turning His face from the sin now heaped on His Son. “It is finished” is not the groan of a beaten man—it is the shout of a finished work, the debt paid to the last coin. What looked to everyone watching like the triumph of evil was in fact love winning its deepest victory.",
    revealed:"The man dying there is the Lord of glory, and the blacked-out sun and the torn veil confess what the crowd around the cross could not see. He suffers as a man—forsaken, pierced, thirsty—and in that same death carries the sin of the whole world. Nothing less than God, and truly one of us, offering the one sacrifice that buys the world back.",
    moments:["The way to Golgotha, the place of a skull","“Father, forgive them; for they know not what they do”","The penitent thief promised paradise","The darkness from noon until the ninth hour","The veil rent, and “It is finished”"],
    witness:"The crucifixion is one of the best-attested events in all of antiquity, and the attesting comes largely from outside the church. Tacitus records that Christ was executed under Pontius Pilate in the reign of Tiberius; Josephus and later Jewish and Roman writers say the same. One early chronicler is even quoted straining to explain the noonday darkness away as an eclipse—hostile evidence that the darkness was remembered at all. And the ground itself has spoken: archaeologists have recovered the bones of a crucified man of the period, a great iron nail still through the heel and the leg-bones broken—exactly the practices the Gospels describe. Of the ancient non-Christian sources that mention Jesus at all, most mention His death, and several name the cross.",
    lessons:["At the cross God’s justice and God’s mercy are both satisfied at once.","“It is finished” is not defeat but a completed work—the debt paid in full.","What looked like evil’s triumph was love winning its deepest victory."],
    quote:"The battle had been won. His right hand and His holy arm had gotten Him the victory. As a Conqueror He planted His banner on the eternal heights.", },

{ id:"burial", era:"passion", title:"The Burial", gospel:"John 19", ref:"John 19:38–42",
    lens:"All four Gospels record the burial, and all four name Joseph of Arimathea; John adds Nicodemus and the sheer weight of the spices. The trouble the accounts take to note the brand-new tomb, the wrapping, and the women who watched is not incidental—it lays the groundwork for the empty tomb, and answers in advance every later theory that Jesus never really died.",
    parallels:"Matthew 27:57–60 · Mark 15:42–47 · Luke 23:50–56",
    scripture:"“There laid they Jesus … in the garden a new sepulchre, wherein was never man yet laid.”",
    setting:"As the Sabbath comes on, Joseph of Arimathea—a wealthy member of the very council that condemned Jesus, and a secret disciple—goes boldly to Pilate and asks for the body. Nicodemus, the man who had first come to Jesus by night, brings a heavy load of myrrh and aloes. Between them they wrap the body in linen with the spices and lay it in Joseph’s own new tomb, cut into the rock of a nearby garden, and roll a great stone across the doorway.",
    background:"The bodies of the crucified were usually left hanging as a warning, or dumped in a common grave, so an honourable burial was itself an act of mercy and love. And notice who performs it: two men who had been too afraid to be known as Jesus’ followers while He lived now step forward openly in His death—just as the boldest of the Twelve are in hiding. That the tomb was new, never used, sealed, and soon put under guard leaves no room to argue later that some other body was mistaken for His, or that the grave was quietly emptied.",
    prophecy:"Isaiah had said of the Servant that “he made his grave with the wicked, and with the rich in his death”—and that is exactly how it falls out: condemned among criminals, buried in a rich man’s tomb. And there He rests through the Sabbath, both His works finished now, creation and redemption alike, keeping the seventh day in the silence of the grave.",
    meaning:"The Prince of life lies in the tomb all through the Sabbath, the borrowed grave sealed shut—but borrowed is the word, because death has no lasting hold on Him. What looked to everyone like the end was really the quiet hinge of the ages, the seed dropped into the ground before the harvest. Even the burial is preaching something: the Creator, resting from a finished work.",
    revealed:"The One laid out lifeless in the rock is the Author of life Himself, keeping Sabbath in a tomb the way He once rested after making the world. And His death was real—body wrapped, grave sealed, side pierced—which is precisely what makes the rising unanswerable. Nobody could doubt the return of a Life that had truly, fully passed through death.",
    witness:"The burial account carries real weight precisely because of who is at its center: Joseph of Arimathea, a named member of the same council that had just condemned Jesus. That is not the kind of detail a movement invents to make itself look good. And the women who watched the body go in are the same women who come back on the first day of the week—an unbroken chain of witnesses running from the cross to the tomb to the resurrection morning.",
    moments:["Joseph of Arimathea asks for the body","Nicodemus brings myrrh and aloes","Wrapped in linen with the spices","Laid in the new tomb in the garden","The great stone rolled to the door"],
    lessons:["Two men too afraid to follow Jesus in life step forward openly at His death.","The grave was only borrowed—death had no lasting hold on Him.","His death was fully real, and that is exactly what makes the resurrection unanswerable."],
    quote:"At last Jesus was at rest. The long day of shame and torture was ended. As the last rays of the setting sun ushered in the Sabbath, the Son of God lay in quietude in Joseph’s tomb.", },

{ id:"resurrection", era:"risen", title:"The Resurrection", gospel:"Matthew 28", ref:"Matthew 28:1–10",
    lens:"Each Gospel tells the resurrection from a different angle—the women, the angels, the guards, the various appearances—and the differences are the fingerprint of independent witnesses, not of a story rehearsed in advance. Matthew is the one who keeps the earthquake, the descending angel, and the guards paid off to say the disciples stole the body—a rumour his whole account is written to knock down.",
    parallels:"Mark 16:1–8 · Luke 24:1–12",
    scripture:"“He is not here: for he is risen, as he said. Come, see the place where the Lord lay.”",
    setting:"Very early on the first day of the week the ground shakes, an angel of the Lord comes down, rolls the stone back, and sits on it—and the hardened guards drop like dead men. The women arrive with spices to anoint a corpse and instead get the sentence that flips grief into joy: “He is not here: for he is risen, as he said.” As they run to tell the disciples, Jesus Himself meets them on the way—“All hail”—and they take hold of His feet and worship.",
    background:"The rulers themselves had asked for a guard and a sealed stone, precisely so the disciples could not steal the body and shout resurrection—and every one of those precautions only made the empty grave harder to explain later. In that world a woman’s testimony hardly counted, yet it is women who first find the tomb open and first carry the news. Nobody making up a story would have built it that way. And from that morning on, the first day of the week belonged to the Lord’s people.",
    prophecy:"Christ Himself had said it over and over—that He would be killed and rise on the third day—and had pointed back to Jonah’s three days in the deep as the sign of it. The psalmist had sung that God would not abandon His Holy One to the grave or let Him see decay, and the apostles watched that ancient line come true in an empty tomb.",
    meaning:"The empty tomb is the foundation the whole Christian hope stands on: because He lives, death is a beaten enemy, and the grave is downgraded to a resting-place His people will be called out of. The resurrection is the Father’s Amen to the cross—His seal that the sacrifice is accepted and the ransom paid in full. Death was defeated on its own ground, in its own house.",
    revealed:"He rises by a life that is His own—the Prince of life, whom death simply could not keep—and He takes the women’s worship without a word of correction. The One who was crucified is the living Lord, and His victory over the grave is both the promise of ours and the shape it will take.",
    moments:["The earthquake and the angel descending","The stone rolled back, the keepers as dead","The women come with their spices","“He is not here: for he is risen”","Jesus meets them: “All hail”"],
    witness:"What the first witnesses claimed can be traced startlingly close to the events themselves. Paul passes on a fixed confession—Christ died, was buried, rose the third day, and appeared—which he says he had received from others before him: a formula older than any Gospel, reaching back to within a few years of the cross. Even the earliest rival story gives away the decisive point—if the charge was that the disciples stole the body, then everyone agreed the tomb was empty. A first-century decree threatens death for anyone who disturbs a grave; later writers record that Jesus’ followers were proclaiming they had seen Him alive. This did not grow up late and far away. It started early, and in Jerusalem, where anyone could have checked.",
    lessons:["Every precaution taken against a resurrection only made the empty tomb harder to explain.","God entrusted the first news to women the world would not even count as witnesses.","Because He lives, the grave is demoted from a prison to a resting-place."],
    quote:"His resurrection is the type and pledge of the resurrection of all the righteous dead.", },

{ id:"magdalene", era:"risen", title:"Mary Magdalene", gospel:"John 20", ref:"John 20:11–18",
    lens:"The garden meeting with Mary Magdalene is John’s alone, and he tells it with all his intimate skill: the weeping, the man she takes for the gardener, the single spoken word “Mary,” and her answering cry, “Rabboni.” That the risen Christ shows Himself first to a woman who loved much, and makes her His first messenger, is the crown of John’s whole Gospel of personal encounter.",
    parallels:"Mark 16:9–11",
    scripture:"“Woman, why weepest thou? … Mary. … Rabboni.”",
    setting:"After the others have gone, Mary stays behind at the open tomb, crying. She bends down to look in and sees two angels where the body had lain. She turns and there is a man she assumes is the gardener, and she begs him to tell her where they have taken her Lord—until He says one word, her name: “Mary.” She wheels around with the cry “Rabboni,” and He sends her, before anyone else, to tell the brethren: “I ascend unto my Father, and your Father.”",
    background:"Mary Magdalene—the woman out of whom Jesus had cast seven devils—had followed Him, served Him, and stood at His cross; her love keeps her at the grave after hope itself has died. That the risen Lord comes first to her, a woman from whom so much had been forgiven, and makes her His messenger to the apostles, turns every human scale of worth upside down. And when He tells her not to cling to Him, it is not coldness—it is because a new and closer kind of fellowship is about to begin.",
    prophecy:"In the old Song the seeker had cried through the dark, “I sought him whom my soul loveth… I held him, and would not let him go”—and here that very longing meets its Lord at dawn in a garden. The psalm comes true in front of us: weeping may last through the night, but joy comes in the morning. And the promise that God would not let His Holy One see decay stands sealed by an empty grave.",
    meaning:"The first sight of the risen Christ is given to a woman who loved much—and she recognizes Him not by His face but by the voice that says her name. The one who came to mourn becomes the first herald of the resurrection, sent to the apostles with the news their faith, and ours, would rest on. Grief that keeps holding on to Christ in the dark is answered, in the end, by His own voice.",
    revealed:"The Good Shepherd calls His own sheep by name, and the moment He says hers, she knows Him. And in the same breath He calls God “my Father, and your Father”—His by right, ours only by grace through Him. The One standing in the garden is the same Jesus who was crucified: not a ghost, not a vision, but her living Lord.",
    moments:["Mary weeping at the open tomb","The two angels within","“Woman, why weepest thou?”","“Mary”—“Rabboni”","Sent to tell: “I ascend unto my Father”"],
    lessons:["He is known not by His face but by the voice that speaks your name.","The first herald of the resurrection is a mourner the world overlooked.","Grief that keeps holding on to Christ in the dark is met, at last, by His voice."],
    quote:"But now in His own familiar voice Jesus said to her, “Mary.” Now she knew that it was not a stranger who was addressing her, and turning she saw before her the living Christ.", },

{ id:"emmaus", era:"risen", title:"The Road to Emmaus", gospel:"Luke 24", ref:"Luke 24:13–35",
    lens:"The walk to Emmaus is Luke’s alone, and it is one of his masterpieces: a risen Stranger opening up “Moses and all the prophets,” and the recognition that finally comes “in breaking of bread.” It pulls together everything Luke cares about—the Scriptures fulfilled, the shared table, the heart set on fire—and shows how Christ is still met, in the Word and at the meal.",
    parallels:"Mark 16:12–13",
    scripture:"“Did not our heart burn within us … while he opened to us the scriptures?”",
    setting:"That same day two disciples are walking the road to Emmaus, going over the terrible events out loud, when the risen Jesus falls in beside them—though something keeps their eyes from recognizing Him. He gently scolds them for being so slow to believe, and then, starting with Moses and working through all the prophets, He explains everything the Scriptures had said about Himself. They press Him to stay; He takes the bread and blesses it—and in that breaking their eyes open, they know Him, and He is gone.",
    background:"Emmaus was about seven miles from Jerusalem, a couple of hours on foot, and the two were walking away from the city under the weight of a hope that had collapsed—“we trusted that it had been he which should have redeemed Israel.” What blinded them to the cross was a misreading of their own Scriptures: they had been looking for a conquering Messiah, not a suffering one. And the gesture that finally gave Him away—the way He took the bread, blessed it, and broke it—was simply how their Master had always done it.",
    prophecy:"On the road Jesus becomes His own interpreter, proving from Moses and all the prophets that the Christ had to suffer first and only then enter His glory. The cross the two had been mourning as the death of all hope turns out, He shows them, to be written on page after page—the whole of Scripture pointing to Himself.",
    meaning:"The risen Christ meets His grieving ones on an ordinary road, on an ordinary afternoon, and warms their hearts through the Word long before they ever see who He is. He is found most surely not in some spectacular sign but in the Scriptures opened up and the bread shared at His table. He walks with His own still, though our eyes are often held shut, until the heart catches fire and knows Him.",
    revealed:"He is the key that unlocks all the Scriptures, the One that Moses and the prophets were writing about the whole time—and He makes Himself known in the breaking of bread. The Stranger on the road is the living Lord, walking with His people whether or not they can see Him.",
    moments:["The sad road to Emmaus","“We trusted that it had been he”","“Beginning at Moses… he expounded”","Known in the breaking of bread","“Did not our heart burn within us?”"],
    lessons:["Christ warms the heart through the opened Word before He is ever seen with the eyes.","The cross the disciples mourned was written on every page they had misread.","He walks with His own even when their eyes are held shut."],
    quote:"They do not see, they do not know, that they have the protection of Him who has traveled the road with them.", },

{ id:"thomas", era:"risen", title:"The Doubt of Thomas", gospel:"John 20", ref:"John 20:24–29",
    lens:"The scene with Thomas is John’s, and it sits near his intended ending: the doubter’s confession, “My Lord and my God,” answers the Gospel’s opening line, “the Word was God,” and rings out as its highest note. And the blessing on those “that have not seen, and yet have believed” reaches straight past Thomas to every later reader—which is exactly why John says he wrote the book: that we might believe.",
    scripture:"“Be not faithless, but believing … My Lord and my God.”",
    setting:"Thomas was not there the first time the risen Lord came, and he flatly refuses to take the others’ word for it: “Except I shall see in his hands the print of the nails… I will not believe.” Eight days later they are gathered again, the doors shut, and Jesus comes and stands among them. He turns straight to Thomas—“Reach hither thy finger… and be not faithless, but believing.” And out of Thomas comes the answer, “My Lord and my God.”",
    background:"Thomas, also called Didymus, was the disciple who had once said, “Let us also go, that we may die with him”—loyal to the bone, but the kind of man who always sees the dark side first. His refusal is not a sneer; it is grief that cannot bear to hope again and be shattered twice. That Jesus came back a second time, on the same first day of the week, for the sake of one struggling man, tells you how He handles honest doubt. And the marks of the nails and the spear were still there in the risen body—the tokens of His love, kept forever.",
    prophecy:"Even the wounds that convince Thomas had been written down ahead of time: Zechariah heard the Lord say, “they shall look upon me whom they have pierced,” and the psalm had cried, “they pierced my hands and my feet.” The risen Christ still carries those marks, and the confession they pull out of Thomas—“My Lord and my God”—names the very Immanuel the prophets had promised: God with us.",
    meaning:"Christ meets honest doubt not with a scolding but with patient evidence—and turns it into the fullest confession of His deity anywhere in the Gospels: “My Lord and my God.” Yet He saves the larger blessing for those who have not seen and still believe—for us, who meet Him through these very pages. Doubt carried to Christ, instead of nursed away from Him, becomes the door into a deeper faith.",
    revealed:"Thomas’ cry, “My Lord and my God,” says out loud what the whole Gospel has been showing all along—that Jesus is God, accepting without a word of correction the worship that belongs to God alone. And the wounds He keeps are the proof that the risen Lord and the crucified Saviour are one and the same person.",
    moments:["Thomas absent when the Lord first came","“Except I shall see… I will not believe”","Jesus comes again, the doors shut","“Reach hither thy finger… be not faithless”","“My Lord and my God”"],
    lessons:["Christ meets honest doubt not with rebuke but with patient evidence.","He keeps His wounds—the risen Lord and the crucified Saviour are the same person.","The larger blessing is reserved for those who have not seen and still believe."],
    quote:"Jesus is ever ready to speak peace to souls that are burdened with doubts and fears.", },

{ id:"charge-peter", era:"risen", title:"The Charge to Peter", gospel:"John 21", ref:"John 21:1–17",
    lens:"The lakeside breakfast and the threefold “Lovest thou me?” are found only in John, in a closing chapter that restores Peter and quietly foretells how he will die. The healing of the three denials, and the charge to “feed my sheep,” round the Gospel off with grace—and hand the flock to a shepherd made humble by his own failure and by love.",
    scripture:"“Lovest thou me? … Feed my sheep.”",
    setting:"By the Sea of Tiberias, after a whole night of empty nets, the disciples make out a figure on the shore at first light who tells them to cast on the right side—and the net comes up full, and John says, “It is the Lord.” On the beach they find a charcoal fire with fish on it, and bread, and He feeds them. Then, three times over, He asks Peter, “Lovest thou me?”—and to each answer He gives a charge: “Feed my lambs… feed my sheep.”",
    background:"Peter had denied his Master three times over a charcoal fire in the high priest’s courtyard; now, beside another charcoal fire, he is asked three times to say that he loves Him—the same wound reopened, but only so that it can finally be healed. To be handed the care of the flock was to be restored not just to fellowship but to trust and to work. And the huge catch of fish quietly recalls the morning these same men were first called from their nets to fish for people.",
    prophecy:"Ezekiel had blasted the false shepherds of Israel, the ones who fed themselves and not the flock, and had promised that God Himself would go looking for His sheep and set true shepherds over them. Now the Good Shepherd who lays down His life for the sheep charges a just-restored disciple to feed His lambs—shepherding under Himself.",
    meaning:"Three questions heal three denials: Peter is put back on his feet not by a rebuke but by love, and handed real work to do. And love for Christ is set down as the one ground of all true service—not talent, not zeal, but a heart that can say, “Lord, thou knowest that I love thee.” Christ does not discard the ones who fail Him; He lifts them up and puts them back to work.",
    revealed:"Not once does Christ throw the denial back in Peter’s face. The risen Lord searches the man’s heart, and then hands that heart His dearest treasure—His sheep. He deals with a disciple who failed Him the way only God can: forgiving completely, and turning the forgiven man into a shepherd for others.",
    moments:["The night of empty nets","The great catch at His word","“It is the Lord”","The fire of coals and the morning meal","“Lovest thou me?”—“Feed my sheep”"],
    lessons:["Christ restores the fallen not with a rebuke but with love, and with work to do.","Love for Him, not talent or zeal, is the one ground of all true service.","The same kind of fire that saw Peter’s denial becomes the place of his healing."],
    quote:"Although Peter had denied his Lord, the love which Jesus bore him never faltered.", },

{ id:"commission", era:"risen", title:"The Great Commission", gospel:"Matthew 28", ref:"Matthew 28:16–20",
    lens:"The Great Commission is the summit and the close of Matthew’s Gospel, gathering all its threads into one last charge: all authority, all nations, everything Christ commanded, and the promise “I am with you alway.” The Immanuel—“God with us”—of the opening chapter becomes the abiding presence of the final one, sending the church out into the world.",
    parallels:"Mark 16:15–18 · Luke 24:44–49",
    scripture:"“Go ye therefore, and teach all nations… and, lo, I am with you alway.”",
    setting:"On a mountain in Galilee, the one He had told them to go to, the risen Christ meets the eleven—and even here, some worship while some still doubt. Claiming all authority in heaven and on earth, He sends them to make disciples of every nation, baptizing them and teaching them; and He seals it with a promise good for every age: “Lo, I am with you alway, even unto the end of the world.”",
    background:"The little group handed this worldwide assignment were Galileans of no rank and no schooling, scattered and frightened just days before; the commission laid a frankly impossible task on the weakest possible instruments. And yet it burst the old borders of Israel, aiming the gospel at every people, language, and nation. What made it thinkable was never their strength—it was the authority and the abiding presence of the One doing the sending.",
    prophecy:"The command to disciple all nations gathers up the oldest promise of all—that in Abraham’s seed every family of the earth would be blessed—and the prophets’ vision of the nations streaming toward the light of God. The gospel of the kingdom, penned up for so long inside one people, is finally let loose on the whole world.",
    meaning:"Christ’s parting word is not goodbye; it is a job and a companion. He sends His church into all the world, and then goes along with it. The authority is His, the task is ours, and the presence is His again—“I am with you alway.” Whatever any believer does for Him is done under that authority, and in that company.",
    revealed:"A man who claims “all power… in heaven and in earth,” and promises to be with His people everywhere until time runs out, is claiming what belongs to God alone. The risen Christ is no teacher who came and went; He is the ever-present Lord, ruling His church and walking with it through every age.",
    moments:["The eleven meet Him on the mountain","“All power is given unto me”","“Go… teach all nations”","Baptising and teaching the world","“Lo, I am with you alway”"],
    lessons:["The task is impossible for the instruments—and it is carried by His authority, not their strength.","His parting word is not goodbye but a job and a companion.","The Immanuel of the manger is the abiding presence of the sending."],
    quote:"It is in doing Christ’s work that the church has the promise of His presence.", },

{ id:"ascension", era:"risen", title:"The Ascension", gospel:"Acts 1", ref:"Acts 1:6–11",
    lens:"Luke alone tells the ascension, and he tells it twice—closing his Gospel with it and opening the book of Acts with it again, the hinge between the story of Jesus and the story of His church. The angels’ promise that “this same Jesus” will come back the way He left, and the Spirit soon to be poured out, set the pattern for everything that follows.",
    parallels:"Mark 16:19–20 · Luke 24:50–53",
    scripture:"“This same Jesus … shall so come in like manner as ye have seen him go into heaven.”",
    setting:"For forty days after the resurrection the risen Lord keeps showing Himself alive by one proof after another and talking about the kingdom of God. At the end, on the Mount of Olives, He lifts His hands and blesses them, and tells them they will be His witnesses to the ends of the earth—and while they are watching, He is lifted up, and a cloud takes Him out of their sight. Two angels are suddenly standing there: “This same Jesus… shall so come in like manner as ye have seen him go.”",
    background:"The forty days of appearances gave the disciples time to be certain their Lord was really, bodily risen—no ghost, no vision, but someone who ate with them, walked with them, taught them. The Mount of Olives, where He had wept over Jerusalem and gone out to His agony, now becomes the place of His leaving and the pledge of His return. And He does not ascend out of His humanity but still wearing it—a man, glorified, carried up into heaven.",
    prophecy:"The psalmist had seen the King go up on high, leading captivity captive and receiving gifts for men; Daniel had watched one like the Son of man brought before the Ancient of Days and handed an everlasting dominion. And the angels’ promise of His return picks up the prophets’ hope of a Lord who comes again—His feet, one day, back down on Olivet.",
    meaning:"The Saviour goes up as our forerunner and High Priest—to stand in the presence of God for us and to plead the sacrifice He has already finished. His leaving is not a farewell but a promise: He goes to get a place ready, and He will come back the same way He left. The story that started in a manger does not end in a cloud; it is waiting for its last chapter, at His return.",
    revealed:"He goes back to the glory He had with the Father before the world existed—and yet He goes back as a man, our own nature carried up to the throne of God. The same Jesus who was born, who died, and who rose is the One now reigning; and the same Jesus is the One who will come again.",
    moments:["Forty days of proofs and teaching","The great commission given","The blessing on Olivet","Received up in a cloud of glory","The angels’ promise of His return"],
    lessons:["He ascends still wearing our humanity—our nature is carried to the throne of God.","His leaving is not a farewell but a promise to return the same way He left.","The story that began in a manger is not over; it waits for His coming again."],
    quote:"From this mountain He was to ascend to heaven. Upon its summit His feet will rest when He shall come again.", }
];

/* ---- timeline navigator ---- */
function renderTimeline(){
  const host = document.getElementById("timeline");
  if (!host) return;
  const cards = ERAS.map(era => {
    const count = BY_ERA(era.id).length;
    const scenes = count === 1 ? "1 scene" : count + " scenes";
    const emb = (EMBLEM[era.emblem] || EMBLEM.advent)(50, 36);
    return `
      <a href="#era-${era.id}" class="tl-era-card" data-era="${era.id}" aria-label="${era.title}, ${scenes}">
        <span class="tl-mini"><svg viewBox="0 0 100 78" class="art" aria-hidden="true">${emb}</svg></span>
        <span class="tl-era-copy">
          <span class="tl-era-roman">${era.roman} · ${era.range}</span>
          <span class="tl-era-name">${era.title.replace(/^The /, "")}</span>
        </span>
        <span class="tl-era-count">${scenes}</span>
      </a>`;
  }).join("");
  host.innerHTML = `
    <div class="tl-head">
      <span class="tl-title">The Chronicle</span>
      <span class="tl-sub">Seven eras · ${EVENTS.length} scenes · from the manger to the Mount of Olives</span>
    </div>
    <div class="timeline-list" role="navigation" aria-label="Life of Christ timeline">
      ${cards}
    </div>`;
}

  "John 14:1-17:26": {
    "reference": "John 14:1–17:26",
    "translation": "King James Version",
    "verses": [

        "text": "Let not your heart be troubled: ye believe in God, believe also in me."

        "text": "Jesus saith unto him, Have I been so long time with you, and yet hast thou not known me, Philip? he that hath seen me hath seen the Father; and how sayest thou then, Shew us the Father?"
      },
      {
        "verse": "14:10",
        "text": "Believest thou not that I am in the Father, and the Father in me? the words that I speak unto you I speak not of myself: but the Father that dwelleth in me, he doeth the works."

        "text": "Believe me that I am in the Father, and the Father in me: or else believe me for the very works’ sake."

      {

        "text": "Verily, verily, I say unto you, He that believeth on me, the works that I do shall he do also; and greater works than these shall he do; because I go unto my Father."

      {
        "verse": "14:13",
        "text": "And whatsoever ye shall ask in my name, that will I do, that the Father may be glorified in the Son."

        "text": "Yet a little while, and the world seeth me no more; but ye see me: because I live, ye shall live also."

        "verse": "14:20",
        "text": "At that day ye shall know that I am in my Father, and ye in me, and I in you."

        "verse": "14:21",
        "text": "He that hath my commandments, and keepeth them, he it is that loveth me: and he that loveth me shall be loved of my Father, and I will love him, and will manifest myself to him."

        "text": "Peace I leave with you, my peace I give unto you: not as the world giveth, give I unto you. Let not your heart be troubled, neither let it be afraid."

      {

        "verse": "15:2",
        "text": "Every branch in me that beareth not fruit he taketh away: and every branch that beareth fruit, he purgeth it, that it may bring forth more fruit."

      {
        "verse": "15:3",
        "text": "Now ye are clean through the word which I have spoken unto you."

      {
        "verse": "15:4",
        "text": "Abide in me, and I in you. As the branch cannot bear fruit of itself, except it abide in the vine; no more can ye, except ye abide in me."

        "verse": "15:8",
        "text": "Herein is my Father glorified, that ye bear much fruit; so shall ye be my disciples."

        "verse": "15:9",
        "text": "As the Father hath loved me, so have I loved you: continue ye in my love."

        "verse": "15:10",

        "verse": "16:13",

        "verse": "16:16",

      {
        "verse": "16:17",
        "text": "Then said some of his disciples among themselves, What is this that he saith unto us, A little while, and ye shall not see me: and again, a little while, and ye shall see me: and, Because I go to the Father?"

        "verse": "16:18",

        "verse": "16:19",

      },
      {
        "verse": "16:20",
        "text": "Verily, verily, I say unto you, That ye shall weep and lament, but the world shall rejoice: and ye shall be sorrowful, but your sorrow shall be turned into joy."

      {
        "verse": "16:21",
        "text": "A woman when she is in travail hath sorrow, because her hour is come: but as soon as she is delivered of the child, she remembereth no more the anguish, for joy that a man is born into the world."

      {
        "verse": "16:22",
        "text": "And ye now therefore have sorrow: but I will see you again, and your heart shall rejoice, and your joy no man taketh from you."

        "verse": "16:23",

      {
        "verse": "16:31",

      },
      {
        "verse": "16:32",
        "text": "Behold, the hour cometh, yea, is now come, that ye shall be scattered, every man to his own, and shall leave me alone: and yet I am not alone, because the Father is with me."

      {
        "verse": "16:33",
        "text": "These things I have spoken unto you, that in me ye might have peace. In the world ye shall have tribulation: but be of good cheer; I have overcome the world."

        "verse": "17:1",
        "text": "These words spake Jesus, and lifted up his eyes to heaven, and said, Father, the hour is come; glorify thy Son, that thy Son also may glorify thee:"

        "verse": "17:2",
        "text": "As thou hast given him power over all flesh, that he should give eternal life to as many as thou hast given him."
