    setting:"At a village wedding in Cana, where Jesus, His mother, and His disciples are guests, the wine runs out—a quiet disaster for the host. His mother nudges Him, then tells the servants simply, “Whatsoever he saith unto you, do it.” Jesus has them fill six great stone jars with water, and what is drawn out is wine—better than what came first. It is the first of His signs; His glory shows through, and His disciples believe.",
    background:"A Galilean wedding ran for days, and the whole village shared in it; to run out of wine would shame the family and injure the sacred duty of hospitality. The six stone jars stood ready for the endless ceremonial washings that law and custom demanded—vessels of purification, now turned into vessels of joy. And notice where Jesus chooses to begin: not with a thunderbolt of judgment, but at a wedding. That sets the key for everything after.",
    prophecy:"The prophets had painted the age of salvation as a wedding and a feast of wine—the mountains dripping sweet wine, God delighting over His people the way a bridegroom delights over his bride. By turning water into wine, Jesus is quietly announcing that those promised days of joy have arrived in Him: the true Bridegroom, come at last to His own.",
    meaning:"Christ honors the home and the plain, innocent joys of ordinary life; where He is present, the water of daily existence begins turning into wine. When human resources give out, His supply begins—and it is lavish, and He saves the best for last. The flat water of mere ceremony gives way to the new wine of His kingdom.",
    revealed:"The Creator who first made the vine now does the vine’s slow year of work in a moment, by a word—quiet evidence of the power that made everything there is. And He hides that glory inside an act of ordinary kindness, letting it be seen only by the servants who obeyed and the disciples who were watching.",
    moments:["The wine fails at the marriage feast","“Whatsoever he saith unto you, do it”","The six stone jars filled with water","Water made wine, the best kept last","His glory shown, His disciples believe"],
    lessons:["Christ blesses ordinary joys; grace is not the enemy of a good feast.","He often begins to work at the point where our own resources have just run out.","Obedience—“whatsoever he saith unto you, do it”—is what puts the miracle within reach."],
    quote:"In the wilderness of temptation He Himself had drunk the cup of woe. He came forth to give to men the cup of blessing, by His benediction to hallow the relations of human life.", },

  { id:"temple-cleansing-first", era:"begin", title:"The First Cleansing of the Temple", gospel:"John 2", ref:"John 2:13–25",
    lens:"John sets a temple cleansing near the start of the ministry, where it works like a headline for everything Jesus came to do. Temple, sacrifice, the presence of God—all of it is being drawn up into Christ Himself, whose own body will be torn down and raised in three days.",
    scripture:"“Destroy this temple, and in three days I will raise it up.”",
    setting:"At Passover Jesus goes up to Jerusalem and finds the temple courts turned into a livestock market—oxen, sheep, doves, and money-changers doing a brisk trade. He knots a small whip, drives the animals out, and sends the coins scattering, shouting that His Father’s house is not a shop. When they demand a sign for such an act, He says only: tear down this temple, and in three days I will raise it. The rulers hear a boast about the building. After the resurrection, His disciples finally understand what He meant.",
    background:"Pilgrims genuinely needed sacrificial animals and the temple’s own coinage, but a useful service had swelled into a loud market in the one place meant for prayer. Even the poor, who could afford only doves, were squeezed. What drives Jesus here is not a flash of temper. It is the holy jealousy of the Son for His Father’s house—and for the ordinary worshiper’s way in to God.",
    prophecy:"The prophets had spent centuries rebuking worship that kept all its ceremonies and lost its reverence. Malachi said the Lord would come suddenly to His temple; Zechariah looked for a day when no trader would defile the house of the Lord. Jesus’ whip stands squarely in that line. But His word about the temple raised in three days points past the building altogether—to His own death and rising.",
    meaning:"Christ refuses to leave worship in the grip of greed. He clears out what people have cheapened, and calls the heart back from bargaining with God to actually meeting Him. And the scene turns to look at us: what has crowded into the inner temple—what lesser traffic—that His gracious authority needs to drive out?",
    revealed:"He calls the temple His Father’s house—and He is Himself the true Temple, the place where God and man actually meet. All the sacrifices going on around Him are shadows of a coming reality. He is both the Lamb and the dwelling place, the one door through which worship is finally opened.",
    witness:"John’s account bears a telltale mark of memory rather than invention: the disciples do not understand the saying until after the resurrection. Invented stories rarely leave their heroes baffled. Real eyewitness testimony, on the other hand, often keeps exactly the detail that was puzzling at the time and only came clear later.",
    moments:["Jesus enters the temple at Passover","The courts are filled with trade","He drives out the sellers and money changers","He calls the temple His Father's house","He points ahead to His death and resurrection"],
    lessons:["God cares intensely how He is worshiped, and who is being kept from access to Him.","Love can be fierce when holy things are being cheapened.","Ask what has crowded into the inner temple that Christ’s authority needs to clear out."],
    quote:"The worshipers offered their sacrifices without understanding that they were typical of the only perfect Sacrifice. And among them, unrecognized and unhonored, stood the One symbolized by all their service." },

{ id:"nicodemus", era:"begin", title:"Nicodemus", gospel:"John 3", ref:"John 3:1–21",
    lens:"This midnight conversation is John’s alone, and it has all his fingerprints on it: a teacher who takes an earthly figure literally and is walked up to a heavenly truth, and then the whole Gospel distilled into one verse, “God so loved the world.” It fits John’s Christ exactly—the Son sent from above to give eternal life to anyone who believes.",
    scripture:"“Except a man be born again, he cannot see the kingdom of God.”",
    setting:"Nicodemus, a Pharisee and a member of the ruling council, comes to Jesus after dark—drawn by the miracles, wary of being seen. He opens with a polished compliment. Jesus brushes past it and goes straight to the man’s real need: “Except a man be born again, he cannot see the kingdom of God.” The ruler is baffled, and out of that bafflement Jesus unfolds the new birth of water and the Spirit—and speaks the sentence that holds the entire gospel: “God so loved the world.”",
    background:"As a Pharisee on the Sanhedrin, Nicodemus was among the most learned and respected men in the nation, raised to believe that descent from Abraham and careful law-keeping secured his place in the kingdom. To be told that he, a teacher of Israel, had to start over—as helpless as a newborn—knocked the ground out from under everything he was sure of. He came at night. Perhaps only for caution; perhaps because a seeking heart is, for the moment, still in the dark.",
    prophecy:"“Water and the Spirit” is Ezekiel’s old promise coming due—that God would sprinkle clean water on His people and put a new heart and a new spirit inside them. And when Jesus compares Himself to the bronze serpent Moses raised in the desert, He is pointing ahead: as the dying looked at it and lived, so the Son of man must be lifted up, that whoever believes should not perish.",
    meaning:"Learning, rank, religious pedigree—none of it opens the kingdom. A person has to be born from above, by the Spirit’s hidden work, which comes and goes as freely and unaccountably as the wind. And to this careful, respectable seeker Jesus hands the greatest sentence ever spoken—“God so loved the world, that he gave his only begotten Son.” Eternal life is a gift for simple faith to receive. It was never wages for merit to earn.",
    revealed:"The One talking about heavenly things talks as someone who has been there—the Son of man who came down from heaven. He is at once the gift the Father’s love gave, and the object faith takes hold of: the lifted-up Saviour on whom the guilty can look, and live.",
    moments:["The ruler’s visit by night","“Ye must be born again”","Born of water and the Spirit","The serpent lifted up in the wilderness","“God so loved the world…”"],
    lessons:["No amount of learning or good standing can substitute for being born from above.","The Spirit’s work is real even when it is hidden, like the wind.","Eternal life is a gift to be received by faith, never a wage to be earned."],
    quote:"The blessing comes when by faith the soul surrenders itself to God. Then that power which no human eye can see creates a new being in the image of God.", },

{ id:"woman-well", era:"begin", title:"The Woman at the Well", gospel:"John 4", ref:"John 4:1–42",
    lens:"The long talk at the well is John’s alone, built on his favorite move—an everyday thing (water) opening onto a heavenly one (living water). And notice who gets the first plain “I that speak unto thee am he.” Not Jerusalem. A Samaritan woman. Her town’s verdict—that He is “the Saviour of the world”—is John’s widest theme said out loud.",
    scripture:"“Whosoever drinketh of the water that I shall give him shall never thirst.”",
    setting:"Going from Judea back to Galilee, Jesus takes the road through Samaria—the one most Jews went out of their way to avoid—and stops to rest at Jacob’s well near Sychar while the disciples go for food. Tired and thirsty in the midday heat, He asks a Samaritan woman, come alone to draw water, for a drink. Out of that one small request unfolds the longest conversation recorded in His whole life.",
    background:"Jews and Samaritans had loathed each other for centuries. The Samaritans kept their own temple on Mount Gerizim, accepted only the five books of Moses, and counted as unclean—so a Jewish teacher talking openly with a Samaritan, and a woman, and one with a reputation, broke about four rules at once. That she came at noon, instead of in the cool of the morning with the other women, quietly tells you she was avoided by her own neighbors. And Jacob’s well, deep and spring-fed, put a sharp edge on His offer of “living water” that would never need drawing again.",
    prophecy:"The prophets had sung of a day when God would pour water on the thirsty and open rivers in the desert, and Jeremiah had called the Lord Himself “the fountain of living waters,” abandoned by a people who dug their own broken cisterns instead. To this Samaritan woman Jesus offers that very fountain. And when she mentions her hope of a coming Messiah, He says it flat out: “I that speak unto thee am he.”",
    meaning:"Christ steps over every barrier at once—nation, sex, reputation—to reach one thirsty soul, meeting her exactly where she is and gently exposing the emptiness no earthly well can fill. He offers her not a drink for the day but a spring inside her, welling up to everlasting life. And the woman everyone else avoided becomes the first evangelist to a whole town. Grace loves to make its herald out of the outsider.",
    revealed:"To a lone outsider—before He ever says it plainly in Jerusalem—Jesus makes His first open claim: “I that speak unto thee am he.” He knows her entire history without being told, and He claims to give both the living water and the true worship the Father is seeking. This is no mere prophet at a well. It is the Christ, the Saviour of the world.",
    moments:["The road through Samaria, avoided by others","“Give me to drink”—the barrier crossed","The gift of living water offered","Worship “in spirit and in truth”","“Come, see a man”—the city drawn out"],
    lessons:["No one is beyond the reach of Christ’s mercy; He crosses every barrier to reach one soul.","Only He can satisfy the thirst that no earthly well was ever able to fill.","Grace often makes its best messengers out of the very people others avoid."],
    quote:"He who seeks to quench his thirst at the fountains of this world will drink only to thirst again. Everywhere men are unsatisfied. They long for something to supply the need of the soul. Only One can meet that want.", },

{ id:"nobleman", era:"begin", title:"The Nobleman’s Son", gospel:"John 4", ref:"John 4:46–54",
    scripture:"“Go thy way; thy son liveth. And the man believed the word.”",
    setting:"Back in Cana, Jesus is met by a court official from Capernaum whose son is dying twenty miles away. The father begs Him to come down and heal the boy. Jesus does not go. He says a sentence instead—“Go thy way; thy son liveth”—and first tests the man: is your faith only in what you can see? The father takes Him at His word and starts home, and on the road his servants meet him with the news that the fever broke in the very hour Jesus spoke.",
    background:"The father was a court official, likely of Herod’s household—a man of standing lowering himself to beg from a village teacher. He came wanting a healer who would travel back with him and lay hands on the boy, and he had to be taught something harder: to take Jesus at His bare word and walk away trusting it. Like the first Cana sign, this second one met a real, aching human need—and pulled a whole household into faith.",
    prophecy:"A word that heals twenty miles away answers the psalmist’s old line: God “sent his word, and healed them.” In this court official—and later in the centurion—the faith that rests on nothing but the word is honored above Israel’s hunger for a spectacle.",
    meaning:"Faith is not sight. It takes God at His word before any evidence shows up, and then acts on it. The official turned for home on the strength of one sentence, and found the sentence was true. People who will believe only once they have seen their sign know little of the faith that actually pleases God. Believe the word, and the sign tends to follow.",
    revealed:"A word spoken in Cana heals a dying boy in Capernaum in the very same hour. That is power over life and over distance that belongs to God and to no one else. He does not need to come and touch. He needs only to speak, and it is done.",
    lens:"This second Cana sign is John’s, and he counts it deliberately—“this is again the second miracle that Jesus did.” It belongs to his Book of Signs, where every wonder is a window into who Jesus is; and it traces the movement John loves, from wanting a sign to resting in the word: “himself believed, and his whole house.”",
    moments:["The nobleman’s desperate journey to Cana","“Except ye see signs and wonders, ye will not believe”","“Go thy way; thy son liveth”","The fever left in the self-same hour","“Himself believed, and his whole house”"],
    lessons:["Faith takes God at His word before the evidence arrives.","Christ’s power is not bound by distance, or by the conditions we try to attach to it.","One person’s believing can draw a whole household after it."],
    quote:"The Saviour cannot withdraw from the soul that clings to Him, pleading its great need.", },

{ id:"bethesda", era:"galilee", title:"The Pool of Bethesda", gospel:"John 5", ref:"John 5:1–15",
    lens:"The Bethesda healing is John’s, and he uses it to light a fuse: because Jesus healed on the Sabbath and called God His own Father, the rulers set out to kill Him. The miracle opens straight into one of John’s great discourses on the Son’s equality with the Father. It belongs to his Book of Signs.",
    scripture:"“Wilt thou be made whole?… Rise, take up thy bed, and walk.”",
    setting:"At a feast in Jerusalem, beside the pool called Bethesda with its five covered porches, a crowd of the sick, blind, and lame lie waiting for the water to stir. One man has been an invalid for thirty-eight years, and has no one to carry him in when it does. Jesus picks him out of that whole miserable crowd and asks a strange question: “Wilt thou be made whole?” Then, with a word, He has the man stand, pick up his mat, and walk.",
    background:"Bethesda, near the Sheep Gate, was a twin pool ringed by five covered colonnades—and archaeologists have dug up exactly such a place, matching John’s description in surprising detail. Popular belief held that an angel stirred the water now and then, and the first person in was cured. Which meant the most helpless people, like this man, had the least chance of ever winning the scramble to the edge. That Jesus healed him on the Sabbath, and told him to carry his mat, set the rulers off at once.",
    prophecy:"Isaiah had promised a day when the lame man would leap like a deer and the mute tongue break into song. Here that day dawns for one forgotten invalid by a pool. And the sign becomes Jesus’ opening to claim, to the rulers’ fury, that the Scriptures they pore over are all pointing at Him.",
    meaning:"Christ goes looking for the one man nobody else would help, and He asks about the will before He touches the body—do you actually want to be well? He does not wait for the man to reach the water. The same Word that once said “Let there be” speaks strength into a body ruined by thirty-eight years. Where a lifetime of human effort had failed, grace acts in a moment.",
    revealed:"Hauled up for healing on the Sabbath, Jesus answers, “My Father worketh hitherto, and I work”—calmly taking the works of God as His own to do. That is a claim to equality with God, and the rulers hear it exactly that way. The healer at the pool is the Lord of the Sabbath, and the Son who gives life.",
    witness:"Skeptics once doubted John’s pool with its five porches—too neat, too symbolic. Then archaeologists in Jerusalem uncovered a double-pool complex near the Sheep Gate that fits the description strikingly well. John knows this city not as a symbol but as a place he could have walked you to.",
    moments:["The five porches and the waiting multitude","Thirty-eight years, and none to help","“Wilt thou be made whole?”","“Rise, take up thy bed, and walk”","Healed on the Sabbath, the rulers offended"],
    lessons:["Christ often seeks out the very person everyone else has given up on.","He asks whether we truly want to be made whole; healing begins with the will.","When we act on His word, the strength we were missing arrives in the acting."],
    quote:"Jesus had given him no assurance of divine help. The man might have stopped to doubt, and lost his one chance of healing. But he believed Christ’s word, and in acting upon it he received strength.", },

{ id:"nazareth-rejection", era:"galilee", title:"Rejected at Nazareth", gospel:"Luke 4", ref:"Luke 4:16–30",
    scripture:"“This day is this scripture fulfilled in your ears.”",
    setting:"Back in His own town of Nazareth, Jesus stands up in the synagogue on the Sabbath and reads from Isaiah—the Spirit-anointed One sent to bring good news to the poor—then says, “This day is this scripture fulfilled in your ears.” For a moment they are charmed by His gracious words. But when He presses on their unbelief, the mood flips to fury, and they hustle Him out of town to throw Him off the cliff.",
    background:"Nazareth had watched Jesus grow up as the carpenter’s boy, and familiarity had curdled into contempt: “Is not this Joseph’s son?” They wanted the miracles He had done over in Capernaum, but they would not receive a prophet they were sure they already knew. And when He reminded them that Elijah went to a Gentile widow and Elisha healed a Syrian leper—God’s grace reaching clean past Israel—their pride ignited into a killing rage.",
    prophecy:"By reading Isaiah 61 and then applying it to Himself, Jesus lays open claim to be the Spirit-anointed Messiah, come to announce the year of the Lord’s favor. Their rejection runs true to the pattern He names—“no prophet is accepted in his own country”—and it is a small, early rehearsal of the far greater rejection His whole nation is moving toward.",
    meaning:"Familiarity blinded Nazareth to the glory standing in the room; they knew the carpenter and missed the Christ. Unbelief bars the door against grace—Mark says that even He could do no mighty work there. And the same gospel that is life to the humble is an offense to the proud. The people nearest the light can be the last to walk in it.",
    revealed:"In the synagogue of His boyhood, Jesus publicly claims the anointing of Isaiah’s Servant—the Messiah on whom the Spirit rests, sent to heal, release, and proclaim the Lord’s favor. And when He simply walks through the middle of the murderous crowd unharmed, it tells you His hour had not come. His life was His own to lay down, and no one would take it a day early.",
    lens:"Luke puts this rejection right at the front of the Galilean ministry, as the keynote of his whole book: the Spirit-anointed Saviour who preaches good news to the poor, is thrown out by His own, and whose mercy keeps spilling over to Gentiles—the widow of Sarepta, Naaman the Syrian. Matthew and Mark record a later rejection at Nazareth; Luke moves his to the beginning, because it sounds the theme of everything to come.",
    moments:["Jesus reads Isaiah in the synagogue","“This day is this scripture fulfilled”","“Is not this Joseph’s son?”","The Gentile widow and the Syrian leper recalled","Thrust out to the brow of the hill"],
    lessons:["Familiarity can blind us to the glory standing right in front of us.","Unbelief closes the door on grace that was ready to be given.","God’s mercy has always reached past the boundaries we would draw around it."],
    quote:"Our standing before God depends, not upon the amount of light we have received, but upon the use we make of what we have.", },

  { id:"sabbath-capernaum", era:"galilee", title:"A Sabbath in Capernaum", gospel:"Mark 1", ref:"Mark 1:21–39",
    lens:"Mark’s Gospel moves at a run, and this single Sabbath in Capernaum packs a whole portrait of Jesus’ authority into one day: teaching that stuns the synagogue, a command that silences an unclean spirit, a houseful of the sick made well, prayer before dawn, and then on to the next town.",
    parallels:"Luke 4:31–44",
    scripture:"“What thing is this? what new doctrine is this? for with authority commandeth he even the unclean spirits, and they do obey him.”",
    setting:"Jesus teaches in the Capernaum synagogue, and the people are startled: His word carries a weight the scribes’ quoting of other rabbis never had. An unclean spirit shrieks; He silences it and frees the man. From there He goes to Simon’s house and lifts Simon’s mother-in-law out of a fever, and she gets up and waits on them. By evening the whole town is at the door with its sick and its tormented, and He heals them late into the night. Before daylight He slips away to pray—and then moves the disciples on to the next towns.",
    background:"Capernaum sat on the northwest shore of Galilee, near the fishing grounds and the trade roads, and became the base for much of the Galilean ministry. The synagogue was the obvious place to teach on the Sabbath; the crowds came at evening because Sabbath law made it hard to carry the sick before sundown. Notice the shape of the day—worship, then home, then the suffering neighbors, then hidden prayer, then back to the road. It is a deeply human rhythm.",
    prophecy:"Isaiah had promised light dawning on Galilee and freedom for captives. In Capernaum that light is nothing abstract. It speaks with authority, snaps a demonic chain, lifts a fevered woman off her bed, and turns a fisherman’s house into a doorway of mercy for a whole town.",
    meaning:"Watch how His compassion travels across the day—from public worship to a private bedside, from one tormented man to a whole town at sunset. And then this: even a schedule that full does not crowd out time alone with the Father. The service that heals others has to be fed, before dawn, in the quiet place.",
    revealed:"Jesus turns out to be Lord over all of it—the synagogue, the home, the body, and the unseen powers. And His authority never shows off. It bends entirely toward rescue, setting people back on their feet so they can get up and serve.",
    witness:"The Gospels remember Capernaum with the kind of offhand local detail that comes from a real place, not a legend—the synagogue, the shoreline houses, the doorway jammed at evening, the short walks between neighboring towns. The ruins of ancient Capernaum still fit the world these stories take for granted.",
    moments:["Jesus teaches with authority","An unclean spirit is silenced","Peter's mother-in-law is healed","The town gathers at the door","Jesus prays before dawn and continues preaching"],
    lessons:["Christ’s authority always bends toward rescue, never toward display.","He is Lord of the public and the private alike—the synagogue and the bedside.","Even the busiest life of service must be fed by prayer in the quiet place."],
    quote:"But the Saviour spoke with authority, and set the captive free. The man who had been possessed stood before the wondering people happy in the freedom of self-possession." },
    { id:"peter-mother-law", era:"galilee", title:"Peter’s Mother-in-Law Healed", gospel:"Mark 1 · Matthew 8 · Luke 4", ref:"Mark 1:29–34",
    lens:"All three Synoptics keep this quiet mercy inside Simon Peter’s house. It comes right after the display of authority in the synagogue, and makes a point of it: the same Lord who orders unclean spirits around also bends down over a feverish woman in an ordinary home.",
    parallels:"Matthew 8:14–17 · Luke 4:38–41",
    scripture:"“And immediately the fever left her, and she ministered unto them.”",
    setting:"Straight from the synagogue, Jesus goes home with Simon and Andrew, and James and John. Simon’s mother-in-law is down with a high fever, and they mention her to Him the moment He walks in. He goes to her, takes her hand, and raises her up. The fever breaks at once—and so completely that she is on her feet serving the household. Then at sunset, the Sabbath over, the whole town seems to pile up at the door with its sick and its demon-oppressed, and He heals them, refusing to let the demons say who He is.",
    background:"The fishing houses of Capernaum stood close to the synagogue and the lake, so the step from public worship to a household need was short and immediate. The crowds hold off until evening because Sabbath rules made it hard to travel or carry the sick before sundown. And the whole thing is gently human: a family simply tells Jesus about a loved one’s fever, and His first miracle after the synagogue is not staged in front of rulers. It happens at a bedside.",
    prophecy:"Matthew ties this whole evening of healing to Isaiah’s Servant, the one who “took our infirmities, and bare our sicknesses.” These are not free-floating wonders. They are early signs of a burden-bearing mercy that will go all the way down at the cross.",
    meaning:"Christ’s kingdom comes through the front door of a house as surely as through a synagogue. He does not save in the abstract; He comes near to the heat of a fever, the worry on the family’s faces, the crush of neighbors at the door. And the woman’s serving afterward is not paying Him back—it is what being made whole looks like. Grace hands back her strength, and the strength turns at once into love.",
    revealed:"Jesus is Lord over sickness, over unclean spirits, and over the quiet anxieties of a household. He gags the demons’ testimony because who He is will be made known in the Father’s way and time, not shouted by the mouths of evil. His authority is never noisy self-advertisement. It is clean, kind power.",
    witness:"The Sabbath-evening timing, the named family, the crowd at the door—these belong to the lived world of a Galilean village, remembered. The three accounts come at it from slightly different angles, but the core is identical: Jesus comes, the fever goes, and the house becomes a place of service.",
    moments:["Jesus leaves the synagogue for Simon’s house","The sick woman is mentioned to Him at once","He takes her by the hand and lifts her","The fever leaves immediately","At sunset the city gathers at the door","He heals the sick and silences demons"],
    lessons:["Christ’s kingdom enters ordinary homes as truly as places of worship.","He draws near to the small, private troubles the world never notices.","Health restored is meant to become service given."],
    quote:"His tender compassion fell with a touch of healing upon weary and troubled hearts." },


{ id:"leper", era:"galilee", title:"The Cleansing of the Leper", gospel:"Mark 1 · Matthew 8", ref:"Mark 1:40–45",
    lens:"All three Synoptics record the leper’s cleansing; Mark, always alert to what Jesus felt, notes that He was “moved with compassion”—and that the healed man’s excited talk spread His fame so fast that Jesus could no longer walk openly into a town. It is one of the early wonders by which Mark keeps unveiling a Son of God who is mighty, and oddly determined to stay hidden.",
    parallels:"Matthew 8:1–4 · Luke 5:12–16",
    scripture:"“I will; be thou clean. And immediately his leprosy was cleansed.”",
    setting:"A leper—shut out from the living, forbidden by law to come near anyone—breaks through every rule to throw himself at Jesus’ feet: “If thou wilt, thou canst make me clean.” Moved with compassion, Jesus does the one thing no one else would dare. He reaches out and touches him. “I will; be thou clean.” The leprosy is gone in an instant, and He sends the man off to show himself to the priest, exactly as Moses commanded.",
    background:"Leprosy was the most dreaded affliction there was—a slow living death. The law counted the leper unclean, banished him from home and worship, and made him call out “Unclean!” so no one would be defiled by brushing against him. No rabbi went near such a man. And it was widely held that only God could cure leprosy—so cleansing a leper counted as a sign of divine power. Fittingly, it was the priest, not a physician, who pronounced a leper whole.",
    prophecy:"Later, when John’s disciples asked whether Jesus was the Coming One, He pointed to exactly this kind of work—“the lepers are cleansed”—as the signs Isaiah had tied to the day of salvation. And by sending the healed man to the priest with the offering Moses appointed, He honored the law at the very moment He was fulfilling its deeper meaning.",
    meaning:"The touch the law forbade, love simply gives—and here the usual direction reverses. The leper’s uncleanness does not pass to Christ; Christ’s wholeness passes to the leper. He takes on the reproach of the outcast and sends the man home clean, a walking picture of a soul scrubbed of the leprosy of sin. No one is too far gone, too defiled, or too alone to be within His reach.",
    revealed:"Touching the untouchable and healing with a word, Jesus shows at once the compassion and the authority of God—the Holy One who is not soiled by contact with our corruption but burns it away. This is the Lord who alone can cleanse, doing freely and gladly what only God can do.",
    moments:["The leper breaks through, and kneels","“If thou wilt, thou canst make me clean”","The forbidden touch of compassion","“I will; be thou clean”","Sent to the priest, as Moses commanded"],
    lessons:["No one is too defiled or too far gone to fall at Christ’s feet.","In Christ, contact runs the other way: His wholeness passes to us, not our ruin to Him.","Real faith says both “Thou canst” and “if Thou wilt”—power and surrender together."],
    quote:"The disciples sought to prevent their Master from touching him; for he who touched a leper became himself unclean. But in laying His hand upon the leper, Jesus received no defilement. His touch imparted life-giving power.", },

  { id:"paralytic", era:"galilee", title:"The Paralytic Forgiven and Healed", gospel:"Mark 2", ref:"Mark 2:1–12",
    lens:"All three Synoptics tell it, but Mark gives you the scene in full color: the crowd wedged in the doorway, the roof torn open from above, the stretcher lowered down in front of Jesus. The miracle makes one point sharp—the Son of man has authority not only over bodies but over sins.",
    parallels:"Matthew 9:1–8 · Luke 5:17–26",
    scripture:"“Son, thy sins be forgiven thee.”",
    setting:"Jesus is back in Capernaum, and the house is jammed so tight that four men carrying a paralyzed friend can’t get through the door. So they go up on the roof, dig through it, and lower him down in front of Jesus. Seeing their faith, Jesus goes for the deeper wound first: “Son, thy sins be forgiven thee.” The scribes think, silently, that this is blasphemy—only God forgives sins. Jesus answers the thought they never said out loud, tells the man to get up, take his mat, and go home—and the man walks out through the crowd.",
    background:"First-century roofs were usually flat—beams, branches, packed clay—reachable by an outside stair. Tearing one open was bold, messy, inconvenient faith, and Jesus read it not as an interruption but as trust. In that world people often assumed sickness was a direct payment for personal sin. Jesus does not endorse that assumption—but He does deal with the wounded conscience before He deals with the legs.",
    prophecy:"The prophets had promised that when God came to save, the lame would leap and sins would be wiped away. This crowded house in Capernaum becomes a little theater of that promise, all in one afternoon: forgiveness spoken aloud, hidden hearts exposed, and a paralyzed man walking home with his mat rolled under his arm.",
    meaning:"The friends carry in one need; Jesus sees the deeper one underneath it. And notice the tenderness—He calls the man “son” before He ever tells him to stand. Faith sometimes has to tear through a roof to get to Christ. It never lowers a needy soul in front of Him for nothing.",
    revealed:"Jesus does three things here that belong to God alone: He forgives sins, He reads the unspoken thoughts of His critics, and He heals by a command. The man walking out is just the visible receipt for the invisible mercy already given.",
    moments:["The crowd blocks the doorway","Four friends open the roof","Jesus sees their faith","Forgiveness is spoken first","The paralytic rises and carries his bed home"],
    lessons:["Christ heals the conscience before the body; forgiveness is the deeper need.","Faith that carries a friend to Jesus—however inconvenient—is never wasted.","The power to forgive sins is God’s alone, and Jesus wields it freely."],
    quote:"Yet it was not physical restoration he desired so much as relief from the burden of sin. If he could see Jesus, and receive the assurance of forgiveness and peace with Heaven, he would be content to live or die, according to God’s will." },

{ id:"matthew", era:"galilee", title:"The Call of Matthew", gospel:"Mark 2 · Matthew 9", ref:"Mark 2:13–17",
    lens:"The call of Levi is in all three Synoptics; the First Gospel, by tradition his own, names him Matthew and lists him among the Twelve. The feast crowded with “publicans and sinners,” and the word “I will have mercy, and not sacrifice,” fit Matthew’s steady conviction: real righteousness is mercy, not ceremony.",
    parallels:"Matthew 9:9–13 · Luke 5:27–32",
    scripture:"“Follow me. And he arose, and followed him.”",
    setting:"Jesus walks past the tax booth, sees Levi—also called Matthew—sitting at his collecting table, and says two words: “Follow me.” The tax man stands up, leaves it all, and goes. That night Matthew throws a great banquet, and a whole roomful of publicans and sinners sit down to eat with Jesus, while the scribes and Pharisees mutter about the company He keeps.",
    background:"Tax collectors squeezed Rome’s revenues out of their own neighbors, often skimming a fortune off the top, and were despised as collaborators and lumped in with “sinners.” No observant Jew would eat at their table. So for Jesus to call one of them to be an apostle—and then sit down to dinner in his house among his disreputable friends—scandalized the religious. His answer to their complaint: “They that be whole need not a physician, but they that are sick.”",
    prophecy:"To the Pharisees’ objection Jesus turns their own Scriptures back on them: “I will have mercy, and not sacrifice.” Hosea’s line had been read for centuries and mostly ignored. Now it lands—exposing a religion heavy on ritual and thin on love, and defending the mercy that will sit down and eat with sinners in order to save them.",
    meaning:"Christ calls the outcast and the despised, and turns a tax booth into a pulpit and a publican into an evangelist. He does not come to the people who think they are fine, but to the ones who know they are not—“I came not to call the righteous, but sinners to repentance.” The gospel’s door swings widest for exactly the people the world bolts out.",
    revealed:"Sitting down among publicans and sinners, Jesus shows what God’s heart is actually like: a physician who goes looking for the sick, not a judge who keeps his distance from them. And His welcome of Matthew announces the rule of His grace—no calling is too low, and no past too stained, for the mercy that can remake a life.",
    moments:["Levi at the receipt of custom","“Follow me”—and he left all","The feast with publicans and sinners","The Pharisees’ murmuring","“I came… to call sinners to repentance”"],
    lessons:["Jesus comes for those who know their need, not those who think they have none.","No past is too disreputable for the grace that remakes a life.","The instant a person is found, even a tax booth can become a pulpit."],
    quote:"There was no hesitation, no questioning, no thought of the lucrative business to be exchanged for poverty and hardship. It was enough for him that he was to be with Jesus, that he might listen to His words, and unite with Him in His work.", },

    { id:"lord-sabbath", era:"galilee", title:"Lord of the Sabbath", gospel:"Mark 2 · Matthew 12 · Luke 6", ref:"Mark 2:23–28",
    lens:"The Synoptics set this Sabbath quarrel amid the rising conflict with the Pharisees. Notice what Jesus does not do: He never belittles the Sabbath. He rescues it from the rule-makers, and reveals Himself as the One the whole day was always pointing to.",
    parallels:"Matthew 12:1–8 · Luke 6:1–5",
    scripture:"“The sabbath was made for man, and not man for the sabbath.”",
    setting:"Jesus and His disciples cut through grainfields on the Sabbath, and the hungry disciples pluck a few heads of grain and eat as they go. The Pharisees pounce—not because the law forbade a traveler to pick grain by hand (it allowed it), but because they counted the plucking and rubbing as “work.” Jesus answers from their own Scriptures: David, when he was hungry, ate the consecrated bread; the priests themselves “work” in the temple every Sabbath. Then He drops the sentence that settles it: the Sabbath was made for man, not man for the Sabbath—and the Son of man is Lord of it.",
    background:"The Sabbath was one of Israel’s most treasured gifts—a weekly sign of creation rest and covenant mercy. But layer on enough detailed tradition and rest turns into anxiety; the day starts to feel like a fence bristling with accusations instead of a sanctuary for communion with God. Jesus meets the challenge with Scripture, with human need, with mercy, and with His own authority. Hunger is not invisible to the Lord of the holy day.",
    prophecy:"In the prophets, keeping the Sabbath was never bare rule-keeping; it was delight in God bound together with justice and mercy. Jesus stands squarely inside that prophetic line—and then a step beyond it, because He claims to be Lord of the Sabbath itself. The rest given at creation and commanded at Sinai has a living center now, and it is Him.",
    meaning:"God’s commandments are not cruel masters. The Sabbath was given as a gift—for rest, for worship, for mercy. But when religion loses the heart of God behind the rules, it can end up making hungry men feel guilty for eating. Jesus teaches the opposite: real holiness and real mercy are never on opposite sides.",
    revealed:"Christ holds authority over the Sabbath—not as someone breaking it, but as its Lord. And He gives the deeper rest no regulation could ever manufacture: rest from having to justify yourself, rest in the plain goodness of the Father, the kind of rest that finally frees the heart to be merciful.",
    witness:"The dispute fits the real world of first-century Judaism exactly, where rabbis argued endlessly over what did and did not count as Sabbath work. The Gospel’s memory is precise about the point at issue: not theft, not contempt for the law, but how to read permitted human need on the holy day.",
    moments:["The disciples pluck grain while passing through fields","Pharisees object to Sabbath conduct","Jesus recalls David and the showbread","Priestly temple service is brought into the argument","Mercy and need are placed at the heart of holiness","The Son of man is declared Lord of the Sabbath"],
    lessons:["God’s commands are gifts for our good, not cruel masters over us.","True holiness is never at war with mercy.","The Sabbath, like the Lord of it, is meant for rest, not for guilt."],
    quote:"In the days of Christ the Sabbath had become so perverted that its observance reflected the character of selfish and arbitrary men rather than the character of the loving heavenly Father." },

{ id:"withered-hand", era:"galilee", title:"The Withered Hand", gospel:"Mark 3 · Luke 6", ref:"Mark 3:1–6",
    parallels:"Matthew 12:9–14 · Luke 6:6–11",
    scripture:"“Stretch forth thine hand. And he stretched it out; and it was restored whole.”",
    setting:"In the synagogue on the Sabbath there is a man with a withered hand, and the Pharisees are watching—hoping Jesus will heal him so they can charge Him with it. He calls the man out to the middle, and puts a question to the room: is it lawful to do good on the Sabbath, or evil? They say nothing. Grieved at how hard their hearts have gone, He tells the man, “Stretch forth thine hand”—and it is whole again.",
    background:"The rabbis had buried the Sabbath under a mountain of rules, forbidding even mercy unless a life was in immediate danger. Jesus does not break the day—He reclaims it, and in doing so exposes a piety that would rather leave a man maimed than bend one of its traditions. His enemies, caught in their own trap, storm out and start plotting with the Herodians—their own political opposites—to kill Him.",
    prophecy:"As Lord of the Sabbath, Jesus gives the day back its true purpose—a delight and a blessing, made for people. And by healing on it He acts out the prophets’ vision of a God who wants mercy and not sacrifice, and who loves to loose the bound on His own holy day.",
    meaning:"To sit on good you have the power to do is itself a kind of evil; mercy is never a breach of God’s law—it is the beating heart of it. And look at the man’s part: he could not stretch out that hand until Christ told him to, and the power came in the trying. Faith obeys before it feels able, and finds the strength inside the obedience.",
    revealed:"Jesus claims the Sabbath as its Lord and heals with a word right in front of His watching enemies, unafraid of any of them. The One who made the day now shows what it was for, in a single act of mercy—and proves Himself greater than every tradition men have piled on top of it.",
    lens:"All three Synoptics put this among the Sabbath conflicts that first turned the leaders murderous. Mark alone records the emotion on Jesus’ face—anger and grief together, “for the hardness of their hearts”—and notes that the Pharisees walked straight out to plot His death with the Herodians. It belongs to the Synoptics’ steady theme: a Christ who is Lord of the Sabbath, and who puts mercy above ritual every time.",
    moments:["The watching Pharisees in the synagogue","The man set in the midst","“Is it lawful to do good on the sabbath?”","“Stretch forth thine hand”—restored whole","The plot to destroy Him begins"],
    lessons:["To withhold good you have the power to do is itself to do evil.","Mercy is not a loophole in God’s law; it is the heart of it.","Obedience often comes before the strength does—and finds it in the trying."],
    quote:"Was it better to slay upon the Sabbath, as they were planning to do, than to heal the afflicted, as He had done? Was it more righteous to have murder in the heart upon God’s holy day than love to all men, which finds expression in deeds of mercy?", },

{ id:"calling-twelve", era:"galilee", title:"The Calling of the Twelve", gospel:"Mark 3 · Luke 6", ref:"Mark 3:13–19",
    parallels:"Matthew 10:1–4 · Luke 6:12–16",
    scripture:"“He ordained twelve, that they should be with him, and that he might send them forth.”",
    setting:"After a whole night alone on a mountain in prayer, Jesus calls His disciples to Him at dawn and, out of the larger group, picks twelve to be apostles—so that they would be with Him, and then be sent out to preach and to heal. The list holds fishermen and a tax collector, and, at the very end, the one who would hand Him over.",
    background:"Twelve was not a round number picked at random; it matched the twelve tribes, marking these men out as the foundation of a renewed Israel. For the most part they were unschooled, ordinary men, chosen not for rank or education but for teachable hearts. That Jesus prayed the whole night through before naming them tells you how much weight rested on the choice—His church would be built on these few.",
    prophecy:"In appointing twelve, Jesus lays the foundation of the new Israel of God—the true people gathered around the Messiah. The prophets had foreseen a renewed remnant and a kingdom without end; here the first pillars of it are set in place, twelve ordinary men who will one day, He tells them, sit on twelve thrones.",
    meaning:"The order of the call is everything: first “that they should be with him,” and only then “that he might send them forth.” Company before commission. Before you can work for Christ you have to spend time with Christ. He builds His kingdom not out of great men, but out of ordinary ones remade by keeping His company.",
    revealed:"Two things sit side by side here. He spends the whole night in prayer before He chooses—the true humanity, leaning hard on the Father. And He hands ordinary men authority over sickness and unclean spirits—the divine authority He can lend to those He sends in His name. Both are Him.",
    lens:"All three Synoptics list the Twelve. Luke alone tells us Jesus prayed through the night before choosing them; Mark alone gives the two-part purpose, “to be with him” and “to send them forth.” And every one of the rosters ends the same way—Judas Iscariot, “which also betrayed him.” The shadow is already lying across the company on the day it forms.",
    moments:["A whole night of prayer on the mountain","Twelve chosen from among the disciples","“That they should be with him”","Sent forth to preach and to heal","Judas numbered among the Twelve"],
    lessons:["Company with Christ comes before work for Christ—always in that order.","God builds His church out of ordinary, teachable people.","Decisions that matter are worth a whole night of prayer."],
    quote:"Alone upon a mountain near the Sea of Galilee He spent the entire night in prayer for them, while they were sleeping at the foot of the mountain. With the first light of dawn He summoned them to meet Him.", },

{ id:"sermon-mount", era:"galilee", title:"The Sermon on the Mount", gospel:"Matthew 5–7", ref:"Matthew 5:1–12",
    lens:"The Sermon on the Mount is the first and greatest of Matthew’s five great discourses—the charter of the kingdom, delivered from a mountain by a new Moses. Luke has a shorter version “on a plain.” Matthew gathers the teaching into one grand design and closes it the way he closes each discourse: with the crowds stunned at the authority of the man.",
    parallels:"Luke 6:17–49",
    scripture:"“Blessed are the poor in spirit: for theirs is the kingdom of heaven.”",
    setting:"On a hillside above the lake, with the crowds spread out before Him, Jesus sits down—the posture of a teacher—and begins. What falls on the listeners is the charter of His whole kingdom: the Beatitudes, blessing the poor in spirit and the meek; the call to be salt and light; the law driven inward, from the act to the heart behind it; the Lord’s Prayer; and a closing warning that it all comes down not to hearing, but to doing.",
    background:"A rabbi taught sitting down, his hearers gathered close, and the slopes above Capernaum made a natural amphitheater where one voice could carry to a crowd. The sermon quietly overturns everyone’s expectations. Blessed are not the rich, the strong, and the strict—but the poor in spirit, the grieving, the merciful. And against a religion satisfied with keeping the outward rule, Jesus pushes the law all the way inside: to anger, to lust, to the love of enemies—places only grace can actually reach.",
    prophecy:"Climbing a mountain to hand down the law of His kingdom, Jesus stands as a new and greater Moses. But watch the difference: He teaches on His own authority—“but I say unto you”—which no prophet before Him had ever dared. And the blessings He pronounces make good on Isaiah’s promise of good news for the meek and comfort for all who mourn.",
    meaning:"The kingdom of heaven is a kingdom of the heart, and its happiness is handed not to the proud and self-sufficient but to the poor in spirit, the meek, the merciful, the pure. And notice what Christ does with the law—He does not lower it an inch; He raises it to its full height, and in the same breath offers the grace to actually walk in it. To hear these words and do them is to build your house on rock.",
    revealed:"Listen to what this teacher quietly claims: to fulfill the law and the prophets, to judge the world on the last day, and to be the very foundation a life has to be built on. This is no lecturer in ethics. He speaks as the Lawgiver Himself—and the authority in His voice leaves the crowd astonished.",
    moments:["Jesus sits to teach the multitudes","The Beatitudes pronounced","“Ye are the salt… the light of the world”","The law written on the inward heart","The Lord’s Prayer, and the house on the rock"],
    lessons:["The kingdom of heaven is a matter of the heart, not the outward act alone.","Christ raises the law to its full height and gives the grace to walk in it.","Hearing His words is not enough; the house stands only on doing them."],
    quote:"The proud heart strives to earn salvation; but both our title to heaven and our fitness for it are found in the righteousness of Christ.", },

{ id:"centurion", era:"galilee", title:"The Centurion’s Faith", gospel:"Matthew 8 · Luke 7", ref:"Matthew 8:5–13",
    lens:"Matthew and Luke both tell it; Luke, always drawn to outsiders, adds the detail that the centurion sends Jewish elders to plead his case. And Jesus’ word that many will come “from east and west” to sit in the kingdom sounds, in both Gospels, the theme they keep returning to: a salvation reaching clean past Israel to the nations.",
    parallels:"Luke 7:1–10",
    scripture:"“Speak the word only, and my servant shall be healed.”",
    setting:"At Capernaum a Roman centurion sends for help: a servant he loves is sick and dying. When Jesus offers to come to the house, the soldier sends back word that he is not worthy to have Him under his roof—“speak the word only.” He is a man who gives orders and watches them obeyed, and he simply trusts that Christ’s bare word carries the same weight. Jesus marvels at him, and the servant is healed that very hour.",
    background:"A centurion commanded around a hundred men and was the backbone of the Roman army. This one, though a Gentile and an officer of the occupying power, had come to love the Jewish people and had paid to build them a synagogue. For a Roman to defer so humbly to a village teacher—and for Jewish elders to go to bat for a Gentile—crossed the deepest divide there was. And his whole trade, command given and command obeyed, became his picture of faith: Christ need only give the order.",
    prophecy:"In this one Gentile’s faith Jesus sees the whole ingathering of the nations promised to Abraham, and says so out loud: many will come from east and west to sit at the table with the patriarchs, while the heirs of the kingdom are shut out. The centurion is a first sample of a believing world far beyond Israel.",
    meaning:"Great faith turns out to be quiet, not loud. It takes God at His word and asks for nothing extra. The centurion needed no sign to look at, no hand laid on the boy—only the word of the One he trusted; and Jesus called it a bigger faith than any He had met in all Israel. To take Christ at His bare word is the deepest honor you can pay Him.",
    revealed:"A word from Jesus, spoken across the town, heals a dying man—power that no distance and no absence can limit. The soldier saw what so many missed: Christ commands sickness and health the way a captain commands his troops. He does not need to be in the room. He needs only to speak.",
    moments:["A beloved servant sick unto death","The elders plead the centurion’s cause","“I am not worthy that thou shouldest come”","“Speak the word only”","“I have not found so great faith”"],
    lessons:["Great faith is quiet; it takes Christ at His word and asks for nothing more.","Our need, not our worthiness, is the ground on which we come to Him.","Christ’s power is bound by neither distance nor the conditions we attach."],
    quote:"He saw his own unworthiness; yet he feared not to ask help. He trusted not to his own goodness; his argument was his great need.", },

  { id:"widow-nain", era:"galilee", title:"The Widow's Son at Nain", gospel:"Luke 7", ref:"Luke 7:11–17",
    lens:"Luke alone keeps this tender meeting at the town gate. His Gospel keeps its eye on widows, the poor, and only children—and here the compassion of Jesus walks straight into a funeral and stops it, before anyone has asked Him for a thing.",
    scripture:"“Young man, I say unto thee, Arise.”",
    setting:"As Jesus comes up to the gate of Nain with His disciples and a large crowd, another crowd is coming out—a funeral, for the only son of a widow. He sees her, and He is moved: “Weep not.” He reaches out and touches the open bier; the bearers stop. He tells the dead young man to get up. The man sits up and starts to speak, and Jesus gives him back to his mother.",
    background:"For a widow to bury her only son was grief and catastrophe at once: with him went her last support in the world. The town understood exactly what she had lost, and a crowd walked with her—but not one of them could give back what death had taken. Jesus does not wait to be asked. The compassion moves first.",
    prophecy:"The scene deliberately recalls Elijah and Elisha, through whom God once gave sons back to grieving mothers. But watch the difference: Jesus does not stretch Himself over the body and pray, as a prophet borrowing power from above. He speaks straight at death, as its Lord.",
    meaning:"Some sorrows are too deep to put into a request, and here Christ answers before one is made. His “Weep not” is not a scolding of her tears—it is a promise that grief does not have the final say while He is standing there. He meets the procession of death head-on, and turns it around in the road.",
    revealed:"He is the Lord of life, and His compassion reaches into the most helpless grief there is. The touch that would leave anyone else ceremonially unclean becomes, in His hand, the very touch that brings life back.",
    moments:["Two crowds meet at Nain's gate","Jesus sees the widowed mother","He says, “Weep not”","He touches the bier","The son is restored to his mother"],
    lessons:["Christ’s compassion often moves before we can even ask.","Grief does not have the final word where the Lord of life is present.","He willingly touches what others avoid, and life flows the other way."],
    quote:"He who stood beside the sorrowing mother at the gate of Nain, watches with every mourning one beside the bier. He is touched with sympathy for our grief. His heart, that loved and pitied, is a heart of unchangeable tenderness." },

  { id:"sinful-woman", era:"galilee", title:"The Sinful Woman Forgiven", gospel:"Luke 7", ref:"Luke 7:36–50",
    lens:"Luke sets a woman of known shame beside a Pharisee of careful reputation, and lets love see what pride is blind to. This is not the Bethany anointing just before the cross; it is an earlier scene—tears, forgiveness, and a broken life handed back its dignity.",
    scripture:"“Her sins, which are many, are forgiven; for she loved much.”",
    setting:"A Pharisee named Simon has Jesus over for a meal. Partway through, a woman the whole city knows as a sinner slips in behind Him, weeping, and washes His feet with her tears, dries them with her hair, kisses them, pours perfume over them. Simon thinks to himself that no real prophet would let a woman like that touch him. Jesus answers the thought he never spoke—with a little parable about two debtors—and then says it plainly: her many sins are forgiven. She goes out in peace.",
    background:"The customs of hospitality quietly indict the host: no water for the feet, no kiss of welcome, no oil for the head—Simon skipped them all. What the host withheld out of coolness, the woman supplies out of tears. Loosening her hair and weeping in public left her wide open to contempt; love pressed through the shame anyway to get to the Saviour.",
    prophecy:"The prophets had promised a God who binds up the brokenhearted and pardons without stint. In this dining room the promise stops being a theory of mercy and becomes a sentence spoken over one wounded life: your sins are forgiven.",
    meaning:"People who know they have been forgiven a great deal do not love halfway. Simon looks at the woman and sees a category—“sinner.” Jesus looks and sees a soul. The gospel does two things at once in this room: it humbles respectable pride, and it lifts a penitent out of shame into peace.",
    revealed:"Christ reads both hidden things in the room—the Pharisee’s silent verdict and the woman’s silent grief. He accepts worship from a sinner, forgives sins with an authority that belongs to God alone, and sends her out not merely let off, but made whole.",
    moments:["Simon hosts Jesus but withholds common courtesies","The woman comes with tears and ointment","Jesus tells of two debtors","Her love reveals forgiven faith","She is sent away in peace"],
    lessons:["Those forgiven much love much; gratitude is the truest measure of grace received.","Respectable pride can stand further from mercy than public shame.","Christ reads the heart—both the critic’s and the penitent’s—and answers each."],
    quote:"While he thought himself reading his Guest, his Guest had been reading him." },

        { id:"true-family", era:"galilee", title:"Jesus’ True Family", gospel:"Mark 3 · Matthew 12 · Luke 8", ref:"Mark 3:31–35",
    lens:"The Synoptics keep this scene not as a snub to Mary, but as a definition of discipleship. Mark sets it in a tense chapter—crowds pressing in, leaders accusing Him, even His own relatives worried He has lost His mind. In the middle of that pressure Jesus names the real family: the one formed by doing the will of God.",
    parallels:"Matthew 12:46–50 · Luke 8:19–21",
    scripture:"“Whosoever shall do the will of God, the same is my brother, and my sister, and mother.”",
    setting:"Jesus is inside, ringed by a seated crowd hanging on His words. His mother and brothers stand outside, unable to push through, and send word in. The message reaches Him: “thy mother and thy brethren without seek for thee.” He answers with a question that must have stilled the room: “Who is my mother, or my brethren?” Then, looking around at the people sitting at His feet, He says it: “Behold my mother and my brethren!” Whoever does the will of God is His brother, His sister, His mother.",
    background:"Family was among the strongest obligations in Jewish life, and Jesus never treats it lightly—He honors His mother, provides for her even from the cross, and condemns any tradition that dodges family duty. But His own brothers did not yet believe in Him, and simply being near holy things is no substitute for surrender to God’s word. The kingdom opens up a deeper loyalty without making natural love one bit less sacred.",
    prophecy:"The prophets had looked ahead to a renewed people with God’s law written on their hearts. Jesus is now gathering exactly that people around Himself—and the entrance is not bloodline or status or a household claim, but a will surrendered to the Father.",
    meaning:"You can be close to Jesus by sheer circumstance and still be standing outside the circle that matters. And you can be a nobody in the crowd, unnamed, and be welcomed into astonishing closeness. Christ widens the family without cheapening it: the truest kinship of all is formed wherever a heart receives and does the will of God.",
    revealed:"His holiness does not wall Him off. He throws His own fellowship open to everyone who obeys the Father. He is the Son who brings a great many sons and daughters into God’s household, making of His disciples not merely servants, but family.",
    witness:"The scene is bracingly honest. The Gospels make no effort to smooth over the awkward fact that Jesus’ own relatives are standing outside, not understanding Him. Legends flatter the hero’s family; this candor is the mark of something remembered rather than invented.",
    moments:["Jesus teaches while the multitude sits around Him","His mother and brethren stand outside","The message is carried in to Him","He asks, “Who is my mother, or my brethren?”","He looks upon those hearing His word","Obedience is named as the mark of His family"],
    lessons:["Nearness to Jesus by circumstance is no substitute for doing the Father’s will.","The truest family is formed by obedience, not by bloodline or status.","Christ opens His own fellowship to anyone who receives and does God’s word."],
    quote:"All who would receive Christ by faith were united to Him by a tie closer than that of human kinship. They would become one with Him, as He was one with the Father." },

{ id:"parable-sower", era:"galilee", title:"The Parable of the Sower", gospel:"Matthew 13 · Mark 4 · Luke 8", ref:"Matthew 13:1–23",
    lens:"All three Synoptics treat this parable as a kind of master key to the rest. It explains why the same word lands so differently in different people, and it trains the disciples not to judge the kingdom by how things look at first.",
    parallels:"Mark 4:1–20 · Luke 8:4–15",
    scripture:"“But other fell into good ground, and brought forth fruit.”",
    setting:"The crowd by the sea grows so large that Jesus gets into a boat and teaches from the water. He tells of a farmer scattering seed: some falls on the footpath, some on thin rocky soil, some among thorns, some into good ground. Later, alone with the disciples, He unlocks it—the seed is the word of the kingdom, and the four soils are four kinds of heart: hardened, shallow, crowded, and honest.",
    background:"In Galilee the sowing often came before the plowing, so a single throw of seed could land on a footpath, on stony patches, in weeds, and on good earth all across one field. It was a picture any farmer in the crowd could see at a glance—and deep enough to carry the whole secret of the kingdom: the word is scattered generously, but whether it bears fruit depends on the ground it falls in.",
    prophecy:"Isaiah had been warned long before that some would hear and not understand, look and not see. Jesus borrows that prophetic language—not to shut seekers out, but to sober everyone listening. The kingdom comes by a word that has to be received, held onto, and given time to bear fruit.",
    meaning:"The parable’s real question is not whether we have heard the word, but what kind of hearer we are turning into. The same sun that strengthens rooted grain scorches the shoot with no root. Grace is generous with the seed; our part is to keep the soil soft, clear the weeds, and let it go deep.",
    revealed:"Christ is the patient Sower, flinging the word out even over ground that looks like a waste of good seed. He knows the hidden state of every heart—and, better still, He can turn stony, thorn-choked ground into good soil where fruit will grow.",
    moments:["Jesus teaches from a boat","Seed falls on four kinds of ground","The disciples ask about the parable","Jesus explains the word and the soils","Fruit comes from honest, persevering hearts"],
    lessons:["The same word lands differently depending on the soil of the heart.","Our task is to keep the heart soft, cleared, and deep enough to hold the seed.","Christ can make good soil out of ground where stones and thorns once ruled."],
    quote:"His illustrations were taken from the things of daily life, and although they were simple, they had in them a wonderful depth of meaning." },

{ id:"storm", era:"galilee", title:"Stilling the Storm", gospel:"Mark 4", ref:"Mark 4:35–41",
    lens:"All three Synoptics record the stilling of the storm; Mark tells it most vividly, with Jesus asleep “on a pillow” and then rebuking the sea the way He rebukes demons. The disciples’ stunned question—“What manner of man is this?”—is exactly the question Mark’s whole Gospel is steering the reader to answer: this is the Son of God.",
    parallels:"Matthew 8:23–27 · Luke 8:22–25",
    scripture:"“Peace, be still. And the wind ceased, and there was a great calm.”",
    setting:"At evening Jesus tells the disciples to cross to the far side, and, worn out, He falls asleep on a cushion in the stern. A vicious squall drops onto the lake and starts filling the boat, and the terrified men shake Him awake: “Master, carest thou not that we perish?” He stands, rebukes the wind and the water—“Peace, be still”—and the lake goes flat calm. Then He turns to them: “Why are ye so fearful? how is it that ye have no faith?”",
    background:"The Sea of Galilee sits in a deep basin about seven hundred feet below sea level, ringed by hills whose ravines funnel cold air down without warning and whip the water into sudden, violent storms—well known and much feared by everyone who worked it. Several of these men had fished this lake their whole lives, so their terror tells you just how bad it was. And that Jesus could sleep straight through it says two things at once: how bone-tired His body was, and how completely His trust rested.",
    prophecy:"In the Scriptures, mastery over the raging sea belongs to God alone—“he maketh the storm a calm, so that the waves thereof are still”—and it is God who treads the waves and hushes their roar. So when the wind and the water fall silent at a word, the disciples’ awed question, “What manner of man is this?”, is already answered. The Lord of creation is in their boat.",
    meaning:"The Lord asleep in the storm is the same Lord who commands it. The danger was allowed for a reason—to grow a faith that trusts Him whether He seems awake or asleep. And when that faith finally cries out to Him, the voice that flattened the sea can bring the same calm to the most storm-tossed soul. Christ is never as unconcerned as our fear insists, and never once short of power to save.",
    revealed:"The one who is worn out and sleeping is truly a man; the one who stands and rules the weather with a word is truly God. In a single short scene you see both natures of the one Christ side by side—the exhausted traveler, and the Lord of wind and wave.",
    moments:["“Let us pass over unto the other side”","The Master asleep on the pillow","The storm, and “carest thou not?”","“Peace, be still”—a great calm","“What manner of man is this?”"],
    lessons:["The Lord asleep in the storm is the same Lord who commands it.","Fear imagines Him unconcerned; He is never that, and never short of power to save.","Faith rests in His care whether He seems to be awake or asleep."],
    quote:"As Jesus rested by faith in the Father’s care, so we are to rest in the care of our Saviour. If the disciples had trusted in Him, they would have been kept in peace.", },

{ id:"demoniac", era:"galilee", title:"The Gadarene Demoniac", gospel:"Mark 5 · Luke 8", ref:"Mark 5:1–20",
    parallels:"Matthew 8:28–34 · Luke 8:26–39",
    scripture:"“Go home to thy friends, and tell them how great things the Lord hath done for thee.”",
    setting:"Jesus steps ashore on the far side and is met by a man possessed of a legion of demons—living out among the tombs, gashing himself with stones, so strong no chain can hold him. At Jesus’ word the unclean spirits come out and pour into a herd of pigs, which stampede down the cliff and drown in the lake. And the man is found sitting at Jesus’ feet, clothed, and in his right mind.",
    background:"The Gadarene country, east of the lake, was mostly Gentile—which is why there were herds of pigs, animals no Jew would keep. The demoniac had been the terror of the whole district, a walking picture of a human being ruined and enslaved by evil. And when the townspeople came out and saw both the man restored and their pigs gone, they weighed the two—and asked Jesus to leave. The livestock mattered more to them than the miracle.",
    prophecy:"Casting out a whole legion, and setting free a man past all human help, is the promised binding of the strong man and the looting of his house. And by doing it on Gentile soil, for one bound soul, Christ shows how far the kingdom reaches—it has come to undo the works of the devil, wherever they are found.",
    meaning:"No chains of hell can hold once Christ commands release; the most wrecked life on earth is not out of reach of His word. The freed man begs to come along, but Jesus sends him home instead—to tell his own people what happened, the first missionary to the Decapolis. Grace received is grace to be passed on. And yet, in the same scene, a whole town can weigh its pigs against its Saviour and ask Him to go.",
    revealed:"The demons recognize Him instantly—“Jesus, thou Son of the most high God”—and they tremble; and one word from His mouth does what all the chains and force of the region never could. Here Christ’s authority over the entire kingdom of darkness is out in the open: the unclean spirits obey on the spot, and the prisoner walks free.",
    lens:"All three Synoptics put this crossing to Gadara right after the stilling of the storm—as if to show Christ mastering the raging sea and the raging soul back to back. Mark tells it fullest and most vividly: the snapped chains, the name “Legion,” the man finally clothed and in his right mind. It is part of his portrait of a mighty Son of God who overpowers every hostile thing.",
    witness:"The Gospels name the region variously—Gadarenes, Gerasenes, Gergesenes across the manuscripts—which simply reflects how ancient writers identified a district by whichever nearby town or larger region came to mind. Far from weakening the account, that kind of loose local naming is exactly the texture you expect from real geography along the eastern shore.",
    moments:["The wild man among the tombs","“What have I to do with thee, Jesus?”","“My name is Legion: for we are many”","The swine rush into the sea","“Sitting, and clothed, and in his right mind”"],
    lessons:["No life is so wrecked or enslaved that Christ’s word cannot set it free.","Grace received is meant to be told; the freed man became the first missionary home.","A heart can weigh its property against its Saviour—and choose wrongly."],
    quote:"In doing this work they could receive a greater blessing than if, merely for benefit to themselves, they had remained in His presence. It is in working to spread the good news of salvation that we are brought near to the Saviour.", },

{ id:"jairus", era:"galilee", title:"Jairus’ Daughter", gospel:"Mark 5", ref:"Mark 5:21–43",
    lens:"The raising of Jairus’ daughter comes wrapped around the healing of the woman who touched His hem—two stories folded into one, told by all three Synoptics and fullest by Mark, who even keeps the Aramaic on Jesus’ lips: “Talitha cumi.” One miracle is public and one is secret, and together they show the reach of a faith that simply comes and touches Christ.",
    parallels:"Matthew 9:18–26 · Luke 8:40–56",
    scripture:"“Talitha cumi… Damsel, I say unto thee, arise.”",
    setting:"Jairus, a ruler of the synagogue, throws himself at Jesus’ feet, begging Him to come heal his dying daughter. On the crowded way there, a woman who has bled for twelve years touches the hem of His robe and is instantly whole. Then word arrives: the girl has died, don’t trouble the Teacher further. Jesus says only, “Be not afraid, only believe.” He takes the dead child’s hand and calls, “Talitha cumi”—and she gets up.",
    background:"As a synagogue ruler, Jairus held a position of honor—and here he is on the ground before the young Teacher his colleagues despised, desperation breaking clean through his pride. The woman, meanwhile, had bled for twelve years, which left her not just ill but ceremonially unclean the whole time, cut off from worship and from touch. In one short walk Jesus meets a father’s grief, a woman’s shame, and the last enemy of all, death itself.",
    prophecy:"The prophets of old had traced this hour from afar: Elijah and Elisha each gave a dead child back to a grieving parent, dim first-fruits of a mightier Life to come. Now One greater than the prophets takes the cold hand, and the ancient promise sounds nearer—“I will ransom them from the power of the grave”—for the Lord of life has come among them.",
    meaning:"To the shaking father Christ speaks the word that has steadied believers ever since: “Be not afraid, only believe.” The delay does not rattle Him; death does not daunt Him; what everyone else calls the end, He calls sleep. The same hand that had just answered a woman’s secret touch reaches down, takes a dead girl by the hand, and gives her back alive.",
    revealed:"Christ speaks to the dead as casually as we wake a sleeping child—“Damsel, arise”—and death simply obeys. Here the Lord of life shows His mastery over the grave itself. It is a down payment on the greater morning, when the same voice will call all His sleeping ones to get up.",
    moments:["Jairus falls at Jesus’ feet","The touch of faith in the throng","“Be not afraid, only believe”","“Talitha cumi”—the child’s hand taken","The dead damsel arises"],
    lessons:["Christ meets our deepest fear with a steadying word: “only believe.”","What we call the end, He calls sleep—death has no more power over Him.","The same voice that raised one child will one day call all His own from the grave."],
    quote:"It is not enough to believe about Christ; we must believe in Him. The only faith that will benefit us is that which embraces Him as a personal Saviour.", },

  { id:"sending-twelve", era:"galilee", title:"The Sending of the Twelve", gospel:"Matthew 10 · Mark 6 · Luke 9", ref:"Matthew 10:1–15",
    lens:"The sending of the Twelve marks a turn in the ministry: the disciples stop being only witnesses at Jesus’ side and become messengers under His authority. Matthew gives the fullest instructions; Mark and Luke keep it lean, stressing how simple and urgent the mission is.",
    parallels:"Mark 6:7–13 · Luke 9:1–6",
    scripture:"“Freely ye have received, freely give.”",
    setting:"Jesus calls the Twelve, hands them authority over unclean spirits and disease, and sends them out—first to the lost sheep of Israel. Their message is His own: the kingdom of heaven is at hand. Their work is His own: heal the sick, cleanse lepers, raise the dead, drive out demons. They are to travel with almost nothing, live on whatever hospitality they are offered, and leave peace on any house that welcomes them. What they got from Him for free, they give away for free.",
    background:"A rabbi’s students normally learned by staying close to him. Jesus does that—and then teaches a further way, by sending them off. Traveling with no spare supplies forced the Twelve to lean on the Father’s provision and on the welcome of the people they came to. And going two by two, as Mark notes, gave them both a companion and a second voice to confirm the message.",
    prophecy:"Israel had long waited for shepherds who would gather and heal the scattered flock instead of fleecing it. By sending twelve apostles out across Israel, Jesus signals that the true Shepherd-King has come, and the flock is being gathered again—around Himself.",
    meaning:"Discipleship grows up into mission. Notice that Christ does not wait for His followers to be flawless before He sends them out—He gives them authority, clear directions, and deliberate dependence, all at once. And the messenger who travels light learns the lesson in his empty pockets: the kingdom is carried not by self-sufficiency, but by trust.",
    revealed:"Jesus has authority to hand out authority—that alone is worth pausing over. And His compassion for Israel is so large it spills over through ordinary men, turning their hands into extensions of His healing and their voices into echoes of His own call.",
    moments:["Jesus calls the Twelve to Himself","He gives authority over sickness and evil","They are sent first to Israel","They travel simply and dependently","They preach, heal, and bear witness"],
    lessons:["Christ sends His followers before they are flawless; He supplies what they lack.","Dependence is part of the training—empty hands learn to trust.","What we have freely received, we are meant to freely give."],
    quote:"None were sent forth alone, but brother was associated with brother, friend with friend. Thus they could help and encourage each other, counseling and praying together, each one’s strength supplementing the other’s weakness." },

{ id:"john-death", era:"galilee", title:"The Death of John the Baptist", gospel:"Mark 6 · Matthew 14", ref:"Mark 6:14–29",
    parallels:"Matthew 14:1–12",
    scripture:"“Among them that are born of women there hath not risen a greater than John the Baptist.”",
    setting:"Thrown into prison by Herod for calling out his unlawful marriage, John is executed to make good on a drunken promise. At a birthday feast, Herodias’ daughter dances; Herod swears to give her anything she asks; and, coached by her mother, she asks for the Baptist’s head on a platter. John’s disciples come for the body, bury it, and go to tell Jesus.",
    background:"John had dared to say it to Herod Antipas’ face—“It is not lawful for thee to have thy brother’s wife”—and Herodias never forgave him. Herod, half afraid of the prophet and half in awe of him, kept him locked in the fortress of Machaerus. Then a birthday, a dance, and a rash oath in front of his dinner guests boxed a weak king into a murder he did not even want to commit. So the greatest of the prophets fell to one woman’s spite and one man’s pride.",
