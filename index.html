    prophecy:"John, the Elijah who was to come, shared Elijah’s old fate—hunted by a queen, as Jezebel once hunted the prophet. And his death casts a shadow forward onto the greater Prophet he announced. The servant is not above his Lord: the forerunner’s road ran, like his Master’s, through rejection to a martyr’s end.",
    meaning:"The faithful witness is not always rescued. John, who never once doubted his calling, died in a dungeon on the whim of the wicked, and heaven did not step in to stop it. And yet his life was not cut short of its purpose—the road was prepared, the Lamb was pointed out. God measures a life not by how long or how easy it was, but by whether it was faithful.",
    revealed:"When word reached Jesus, He withdrew to grieve; the death of His forerunner and kinsman struck deep, and it pointed straight ahead to His own. But He also left a lasting verdict on John—“there hath not risen a greater”—honoring in death the man who had lived for nothing but to make Him known.",
    lens:"Mark and Matthew tell the grim story in full—a rare flashback, prompted when Herod hears of Jesus and panics that John has risen from the dead. Luke gives only the bare fact: Herod had beheaded John, and now wanted to see Jesus. Mark’s unsparing detail—the oath, the dance, the platter—frames the forerunner’s martyrdom against the Lord’s own coming passion.",
    moments:["John imprisoned for rebuking Herod","Herodias’ grudge against the prophet","The birthday feast and the fatal dance","The rash oath and the head demanded","John’s disciples bury him, and tell Jesus"],
    lessons:["Faithfulness, not length or ease, is how God measures a life.","The faithful witness is not always spared—but his work is never wasted.","A servant should not expect a smoother road than his Master walked."],
    quote:"In the prison he was the same in his loyalty to God and his zeal for righteousness as when he preached God’s message in the wilderness. In his faithfulness to principle he was as firm as a rock.", },

{ id:"feeding", era:"galilee", title:"Feeding the Five Thousand", gospel:"John 6", ref:"John 6:1–14",
    lens:"The feeding of the five thousand is the one miracle all four Gospels record. Here it is John’s, and he alone follows it with the great discourse on the Bread of Life—“I am the bread of life”—turning the miracle into a revelation of who Jesus is, which is exactly how his whole Gospel works.",
    parallels:"Matthew 14:13–21 · Mark 6:30–44 · Luke 9:10–17",
    scripture:"“I am the bread of life: he that cometh to me shall never hunger.”",
    setting:"A huge crowd, pulled along by His miracles, follows Jesus out to a lonely place, and as the day runs down there is nothing to eat. Jesus tests Philip—where do we buy bread for all these?—then takes a boy’s five barley loaves and two small fish, gives thanks, and breaks them. The disciples keep handing it out until all five thousand men, plus women and children, have eaten their fill. Then twelve baskets of leftovers are gathered up, so that nothing is wasted.",
    background:"This is the one miracle in all four Gospels, which tells you how much weight it carried. Barley bread was poor people’s food, and five small loaves with a bit of dried fish was one boy’s lunch. Philip did the math—two hundred days’ wages would not feed this crowd—and the disciples were stuck. And the twelve baskets of leftovers, it seems one for each disciple, proved the abundance was no trick of the eye.",
    prophecy:"In the wilderness God had fed Israel with manna, bread out of heaven, morning by morning; and the prophets looked ahead to a feast where the Lord Himself would spread the table. Here, in another wilderness, the true Bread is handed out—and the next day Jesus says what it meant: “I am the bread of life… the bread that I will give is my flesh.”",
    meaning:"Christ takes the little that is put in His hands and multiplies it in the act of giving—the loaves grew as they were broken and passed along. The One who supplies the daily bread is Himself the Bread of Life, enough for the hunger of the whole world. And notice: He never once works a miracle to feed Himself, only to feed the needy. It is in giving to others that we stumble onto the joy of His ministry.",
    revealed:"The Creator who quietly clothes the fields and fills the earth with harvest every year now does that same work openly, all at once, in His own two hands. The One feeding the thousands is Himself the living Bread come down from heaven—and the sign points straight past the body’s hunger to the soul’s.",
    moments:["The multitude in a desert place","A boy’s five loaves and two fishes","The blessing, breaking, and distributing","Five thousand filled","Twelve baskets of fragments gathered"],
    lessons:["Christ multiplies the little we place in His hands when it is given away.","He never used His power for Himself—only for the needy.","The bread that fills the body is a sign of the Bread that feeds the soul."],
    quote:"Christ never worked a miracle except to supply a genuine necessity, and every miracle was of a character to lead the people to the tree of life, whose leaves are for the healing of the nations.", },

{ id:"walking-water", era:"galilee", title:"Walking on the Water", gospel:"Matthew 14", ref:"Matthew 14:22–33",
    lens:"Matthew, Mark, and John all record Jesus walking on the sea; only Matthew adds Peter’s venture and near-drowning, and the disciples’ worship afterward—“Of a truth thou art the Son of God.” The scene fits Matthew’s pattern of confession, and his sharp lesson: faith falters the instant the eye slides off Christ and onto the storm.",
    parallels:"Mark 6:45–52 · John 6:16–21",
    scripture:"“Be of good cheer; it is I; be not afraid.”",
    setting:"Jesus sends the disciples on ahead by boat and goes up the mountain alone to pray. In the fourth watch—the black hours before dawn—He comes to them, walking on the water while they strain against the wind. They cry out, sure they are seeing a ghost. “Be of good cheer; it is I; be not afraid.” Peter climbs out and walks toward Him—then looks at the wild waves, and starts to go under. “Lord, save me.” And instantly Jesus’ hand closes on his.",
    background:"The fourth watch is the darkest stretch of the night, roughly three to six in the morning; the disciples had been hauling at the oars for hours against a headwind. In the Scriptures the sea stands for chaos and dread, ground no man can walk on—so to tread it, and to calm it just by arriving, was to do what belongs to God alone. And Peter’s bold step and quick sinking are exactly true to the man: he loved much, and trusted in fits and starts.",
    prophecy:"Job says of God that He “alone spreadeth out the heavens, and treadeth upon the waves of the sea,” and the psalmist sings, “thy way is in the sea, and thy path in the great waters.” So when Jesus walks the waves and the wind drops the moment He steps aboard, the disciples do the only fitting thing—they worship, and say, “Of a truth thou art the Son of God.”",
    meaning:"As long as the eye stays fixed on Christ, the water holds Peter up; the second it turns to the storm, he begins to sink. And yet—here is the mercy—the hand that caught him is always reaching out to the failing, and it gets there before we go all the way under. Faith is not the absence of the storm. It is keeping the heart fixed on the One who walks above it.",
    revealed:"Treading the sea and hushing the wind, Jesus does the very work of God—and even His words carry it: “It is I,” which in the Greek is an echo of the divine “I am.” The disciples’ frightened worship is the correct response. The Son of God is Lord even of the deep.",
    moments:["Jesus goes up alone to pray","He comes walking on the sea","“Be of good cheer; it is I”","Peter walks, then begins to sink","“Lord, save me”—the outstretched hand"],
    lessons:["We sink the moment our eyes leave Christ for the storm.","His hand reaches the failing before they go under—He does not call us in order to let us drown.","Faith is not the absence of storms but the heart fixed on the One above them."],
    quote:"When trouble comes upon us, how often we are like Peter! We look upon the waves, instead of keeping our eyes fixed upon the Saviour. Our footsteps slide, and the proud waters go over our souls.", },

  { id:"bread-life", era:"galilee", title:"The Bread of Life", gospel:"John 6", ref:"John 6:22–71",
    lens:"John follows the feeding of the five thousand with the long discourse that interprets the sign. The crowd wants bread, security, and a king on its own terms; Jesus offers them Himself—the true bread from heaven—and a great many of them walk away.",
    scripture:"“I am the bread of life: he that cometh to me shall never hunger.”",
    setting:"The morning after the feeding and the night crossing, the crowd tracks Jesus down in Capernaum. He names their motive to their faces: you came looking for me because you ate the loaves, not because you understood the sign. They ask for bread like the manna Moses gave; He tells them the Father gives the true bread from heaven—and that He Himself is that bread, given for the life of the world. The saying is too hard for them. Many disciples leave. And Peter says the thing that keeps the Twelve: “thou hast the words of eternal life.”",
    background:"Passover was near, and the memory of manna was thick in the air. The crowd could easily picture a Messiah who kept the food coming and restored the nation’s fortunes. Jesus pushes them past full stomachs toward surrendered faith. His talk of eating and drinking is not an invitation to superstition—it is a call to take Him in completely, as life itself.",
    prophecy:"Moses had said that a person lives by every word out of the mouth of God, and the daily manna drilled Israel in dependence. Jesus now unveils the deeper gift the manna was only pointing at: not bread from heaven merely, but the Son from heaven, whose flesh will be given for the life of the world.",
    meaning:"Christ refuses to be treated as a vending machine for blessings while the heart stays exactly where it was. He gives the bread, then asks the harder question: do you actually want me? Real faith does not just admire His gifts. It feeds on His life, leans its whole weight on His sacrifice, and stays put when the saying gets hard.",
    revealed:"He is the living bread come down from heaven—with the Father before the world began, and now given in flesh for the life of the world. The miracle was only ever a signpost pointing at Him. The meal was the sign; He is the substance.",
    witness:"John’s account keeps the awkward realism of the ministry: a miracle can pull an enormous crowd and produce almost no faith, and a public triumph can turn, overnight, into a mass exit. That unsentimental memory strengthens the record—the Gospel is not flattering the disciples or the crowd. It is telling you what happened.",
    moments:["The crowd seeks Jesus after the feeding","He exposes their shallow hunger","He identifies Himself as the true bread","Many stumble over His words","Peter remains: “Thou hast the words of eternal life”"],
    lessons:["Christ will not be used as a supplier of blessings while the heart stays unchanged.","Real faith feeds on Christ Himself, not merely on His gifts.","Some of the hardest words are exactly where faith is proven—many left, but Peter stayed."],
    quote:"What food is to the body, Christ must be to the soul. Food cannot benefit us unless we eat it, unless it becomes a part of our being. So Christ is of no value to us if we do not know Him as a personal Saviour." },

{ id:"canaanite", era:"galilee", title:"The Canaanite Woman", gospel:"Matthew 15 · Mark 7", ref:"Matthew 15:21–28",
    parallels:"Mark 7:24–30",
    scripture:"“O woman, great is thy faith: be it unto thee even as thou wilt.”",
    setting:"Up in the region of Tyre and Sidon, a Gentile woman comes crying after Jesus about her daughter, badly tormented by a demon. He gives her, at first, nothing—not a word—and then a hard saying about the children’s bread. She refuses to be put off: “Truth, Lord: yet the dogs eat of the crumbs which fall from their masters’ table.” Jesus marvels at her faith, and her daughter is healed that very hour.",
    background:"Jesus had crossed out of Israel into pagan country, and there a Canaanite—descended from a people anciently at war with Israel—came begging. His apparent silence and hard words were not a brush-off; they were drawing her faith out into the open, and teaching a lesson to the disciples, who just wanted her gone. And her humble quick-wittedness—content to be a dog and claim a dog’s crumbs—turned the test itself into her victory.",
    prophecy:"A healing worked outside Israel’s borders is a preview of the whole gospel heading out to the Gentiles, and a first payment on the ancient promise that in Abraham’s seed all nations would be blessed. The long wall between Jew and Gentile comes down here, quietly, in one act of mercy.",
    meaning:"Faith gets proved by holding on. Hers held through silence, through delay, through a saying that would have crushed a lesser seeker—and it would not let go. She took the lowest seat in the house, content with crumbs, and in that humility she got everything. Christ’s seeming hardness was only ever uncovering a faith He was longing to reward, and to hold up for everyone to see.",
    revealed:"Sent first to the lost sheep of Israel, Jesus still cannot keep His mercy hidden from a believing Gentile heart—and He grants, at twenty miles’ distance, exactly what her faith asks. The Saviour of Israel is already, here, the Saviour of the world.",
    lens:"Matthew and Mark alone record the scene, from the season when Jesus withdrew from Galilee. Matthew, the evangelist most focused on Israel, keeps the hard sayings—“the lost sheep of the house of Israel,” the children’s bread; and yet his Gospel, which opened with Gentile magi and will close with “all nations,” lets a Canaanite woman’s faith break clean through every barrier.",
    moments:["Jesus withdraws to Tyre and Sidon","“Have mercy on me… my daughter is grievously vexed”","The disciples would send her away","“Yet the dogs eat of the crumbs”","“Great is thy faith”—her daughter healed"],
    lessons:["Faith is proved by holding on through silence, delay, and hard words.","Humility that will take even the crumbs receives the whole table.","No true seeker, of any nation, is finally turned away."],
    quote:"Beneath the apparent refusal of Jesus, she saw a compassion that He could not hide.", },

{ id:"peter-confession", era:"galilee", title:"Peter’s Confession", gospel:"Matthew 16", ref:"Matthew 16:13–20",
    lens:"Peter’s confession is the hinge of the whole Synoptic story: from Caesarea Philippi on, Jesus turns toward the cross and starts foretelling His death. Matthew alone adds “upon this rock I will build my church” and the keys of the kingdom. Mark makes the confession the pivot of his Gospel—the moment the disciples finally see who He is.",
    parallels:"Mark 8:27–30 · Luke 9:18–20",
    scripture:"“Thou art the Christ, the Son of the living God.”",
    setting:"Away in the district of Caesarea Philippi, Jesus asks His disciples, “Whom do men say that I… am?” They pass along the rumors going around. Then He narrows it to them: “But whom say ye that I am?” Peter answers for all of them—“Thou art the Christ, the Son of the living God.” Jesus blesses him for it; and from that hour He starts telling them plainly what is coming: He must suffer, be killed, and rise again.",
    background:"Caesarea Philippi sat far in the north, at the foot of Mount Hermon, beside a great rock cliff honeycombed with pagan shrines—an oddly fitting spot to confess the living God among the gods of the nations. The confession is the hinge of the ministry: from here Jesus sets His face toward the cross and begins bracing His followers for it. And notice the whiplash—Peter, so lately inspired, is rebuked in the very next breath when he flinches from the word of the cross.",
    prophecy:"No sooner is He confessed as the Christ than Jesus tells them what kind of Christ He is—and it is not the conquering king the nation was dreaming of. It is Isaiah’s suffering servant, who has to be rejected, killed, and raised. The cross He now begins to predict is not a detour from the Messiah’s work. It is the heart of it.",
    meaning:"The kingdom of heaven is not built on flesh and blood but on this confession—something the Father revealed to a humble heart, not something Peter reasoned out. On the truth that Jesus is the Christ, the Son of the living God, the whole church is founded, and the gates of hell will not overpower it. This confession is the rock under every believing life.",
    revealed:"Here, out of a human mouth, the mystery finally gets named: the carpenter from Nazareth is the Christ, the Son of the living God. And Jesus immediately ties the title to the cross—teaching that His Sonship is proved not by dodging suffering, but by walking straight into it for us.",
    moments:["“Whom do men say that I am?”","“But whom say ye that I am?”","“Thou art the Christ, the Son of the living God”","“Upon this rock I will build my church”","The cross first foretold"],
    lessons:["Who you say Jesus is is the question everything turns on.","This confession is a gift of the Father, not a prize of human cleverness.","The Christ is revealed not by escaping the cross but by embracing it."],
    quote:"The truth which Peter had confessed is the foundation of the believer’s faith. It is that which Christ Himself has declared to be eternal life.", },

{ id:"transfiguration", era:"galilee", title:"The Transfiguration", gospel:"Matthew 17", ref:"Matthew 17:1–8",
    lens:"All three Synoptics set the Transfiguration soon after Peter’s confession—a burst of glory to steady the disciples for the cross that is coming. Moses and Elijah, the law and the prophets, attend Him, and the Father’s voice, “hear ye him,” echoes the baptism. Matthew, always mindful of the new Moses, notes that Jesus’ face “did shine as the sun.”",
    parallels:"Mark 9:2–8 · Luke 9:28–36",
    scripture:"“This is my beloved Son, in whom I am well pleased; hear ye him.”",
    setting:"Six days after telling them He would die, Jesus takes Peter, James, and John up a high mountain by themselves—and is transfigured in front of them. His face blazes like the sun; His clothes go white as light. Moses and Elijah appear in glory beside Him, and what they are discussing is His coming death at Jerusalem. Then a bright cloud wraps them, and out of it the Father’s voice: “This is my beloved Son… hear ye him.”",
    background:"The three taken up the mountain are the same inner circle who will soon keep the nearest watch in Gethsemane. Moses and Elijah stand for the Law and the Prophets—both had met God on a mountain, and both left the earth in ways wrapped in mystery. And the word Luke uses for what they discuss with Jesus, His “decease,” is literally His exodus: His death is the theme all of Scripture had been moving toward. The disciples, heavy with sleep, saw His glory as if through a waking dream.",
    prophecy:"Moses had promised a prophet like himself to whom Israel must hearken, and Malachi had foretold Elijah’s coming before the great day of the Lord; both now give place to the beloved Son, whom the Father commands them to hear. The glory on the mount is a foregleam of the kingdom the prophets had seen, and of the Son of man coming in power.",
    meaning:"A single ray of the coming kingdom breaks across the darkness of the approaching cross. Heaven is bracing the Son for Calvary, and the three are handed a pledge of the glory that follows suffering—so that in His hour of deepest humiliation they would have this to remember. The law and the prophets step back, and the Father says the only thing that matters now: hear Him.",
    revealed:"For a few minutes the veil of His humanity is pulled back, and the disciples see the glory that was always His—light shining not onto Him from somewhere else, but out from inside Him. The same face that will be disfigured on the cross is here transfigured on the mountain: the beloved Son, in whom the Father is well pleased.",
    moments:["Up the high mountain with the three","The face shining, the raiment white","Moses and Elijah in glory","The bright cloud overshadowing","The Father’s voice: “Hear ye him”"],
    lessons:["Before the crown comes the cross; even the glory pointed toward Calvary.","Heaven strengthens us for the hardest road, sometimes with a glimpse of the end.","The Father’s word over the Son is simple and final: hear Him."],
    quote:"But before the crown must come the cross. Not the inauguration of Christ as king, but the decease to be accomplished at Jerusalem, is the subject of their conference with Jesus.", },

  { id:"boy-unclean-spirit", era:"galilee", title:"The Boy with an Unclean Spirit", gospel:"Mark 9", ref:"Mark 9:14–29",
    lens:"Matthew, Mark, and Luke all place this deliverance right after the Transfiguration, but Mark gives the father’s anguished cry in unforgettable detail. The glory on the mountaintop is dragged straight down into the pain of a convulsing child and a father at the end of his rope.",
    parallels:"Matthew 17:14–21 · Luke 9:37–43",
    scripture:"“Lord, I believe; help thou mine unbelief.”",
    setting:"Coming down off the mountain, Jesus walks into a mess: a crowd, scribes arguing, His own disciples stymied, and a father whose son is thrown into fire and water by an evil spirit. The disciples have tried to cast it out and failed. Jesus asks how long this has gone on, hears the father’s broken plea, and presses him to believe. The man cries out the truest prayer in the Gospels: “Lord, I believe; help thou mine unbelief.” Jesus rebukes the spirit, lifts the boy up by the hand, and tells the disciples that this kind only comes out by prayer.",
    background:"The contrast could hardly be sharper: heavenly glory on the mountain above, raw human misery in the valley below. And the father’s words ring true precisely because faith and doubt so often come mixed. He does not put on a brave show of confidence he does not have. He brings even his unbelief to Jesus and lays it down.",
    prophecy:"Isaiah’s vision of restoration had room in it for afflicted children healed and destroying powers broken. Here that vision arrives, not as a spectacle for the crowd, but as plain rescue for one family worn down by years of suffering.",
    meaning:"Weak faith is not turned away when it clings to a strong Saviour. The father hands Jesus everything he has—which includes the honest admission that what he has is not enough. That is the whole point: prayer is the posture that owns its own dependence, and it is exactly there that Christ’s power gets in.",
    revealed:"Jesus is Lord over the destroying powers that torment body and soul—one command, and the thing is gone. And He is tender enough, once the battle is won, to reach down and take a limp child by the hand, lifting him out of a deathlike stillness back into life.",
    moments:["Jesus descends from the mountain","The disciples have failed to help","The father tells the long sorrow","“Help thou mine unbelief”","Jesus delivers the boy and lifts him up"],
    lessons:["Weak faith that clings to a strong Saviour is not rejected.","Honesty about our unbelief is itself a kind of faith—it brings the weakness to Christ.","Some battles are won only on the knees; prayer owns our dependence."],
    quote:"There is no lack of power on the part of Christ; the healing of the son depends upon the father’s faith." },

{ id:"feast-tabernacles", era:"jerusalem", title:"At the Feast of Tabernacles", gospel:"John 7", ref:"John 7:10–52",
    scripture:"“If any man thirst, let him come unto me, and drink.”",
    setting:"Jesus goes up to the Feast of Tabernacles quietly, then teaches out in the open in the temple, splitting the crowd—some call Him a good man, others say He is a fraud leading people astray. On the last and greatest day of the feast He stands up and calls out over the crowd: “If any man thirst, let him come unto me, and drink,” promising rivers of living water. The temple police sent to arrest Him come back empty-handed, with only this to say: “Never man spake like this man.”",
    background:"Tabernacles was the happiest feast of the year: Israel camped in leafy booths to remember the wilderness, and every day a priest carried water up from the pool of Siloam and poured it out beside the altar, a prayer for rain and for the outpouring of the Spirit. It was against that very ceremony—water splashing on the altar—that Jesus stood and cried out that He is the true source of living water. The city was buzzing with argument and with fear of the rulers; the police sent to arrest Him were simply disarmed by what He said.",
    prophecy:"The promise of “rivers of living water” picks up the prophets’ vision of streams running out from the temple and the Spirit poured on dry ground—which John says points ahead to the Spirit given once Jesus is glorified. The whole water-pouring ceremony of the feast finds its meaning in Him: He is the source the promised Spirit flows from.",
    meaning:"Surrounded by all the feast’s water and light, Jesus offers Himself as the one thing that can reach the deepest thirst. The invitation could not be wider—“if any man thirst”—and the gift is not a trickle but rivers, welling up inside a person and running out to everyone around. The longing no ceremony could ever satisfy is met in one place only: coming to Christ.",
    revealed:"Standing in the temple at the height of the feast, Jesus claims to be the giver of the Spirit and the fountain of living water—things that belong to God alone. Even the officers sent by His enemies feel the strange weight of His words and go back saying, “Never man spake like this man.”",
    lens:"This whole scene is John’s, part of his record of Jesus’ later teaching in Jerusalem amid rising hostility. And it is pure John—a great feast becomes the backdrop for a self-revelation of Christ, the crowd splits, the rulers plot, and Jesus openly offers living water and, soon after, calls Himself the light of the world.",
    moments:["Jesus goes up privately to the feast","Teaching openly in the temple","The people divided over Him","“If any man thirst… rivers of living water”","“Never man spake like this man”"],
    lessons:["Every ceremony points beyond itself to the Christ who alone satisfies the soul.","The invitation is as wide as thirst itself—“if any man.”","What Christ pours in is meant to flow out to others, not pool in us."],
    quote:"Jesus invited them to come and drink of the fountain of life, of that which would be in them a well of water, springing up unto everlasting life.", },

{ id:"woman-adultery", era:"jerusalem", title:"The Woman Taken in Adultery", gospel:"John 8", ref:"John 8:1–11",
    lens:"This scene is found only in John, and in many early manuscripts it floats loose, without a fixed home—a treasured fragment of gospel memory the church could not bear to lose. Its picture of a mercy that neither excuses the sin nor crushes the sinner fits perfectly where John’s text keeps it, right beside Jesus’ claim, “I am the light of the world.”",
    scripture:"“He that is without sin among you, let him first cast a stone at her.”",
    setting:"Early in the morning, while Jesus is teaching in the temple court, the scribes and Pharisees haul in a woman caught in adultery and stand her up in front of everyone. They use her shame as bait: does the law of Moses, which says stone her, still stand or not? Jesus bends down and writes in the dust with His finger, then straightens up with a sentence that goes through every conscience in the crowd: “He that is without sin among you, let him first cast a stone at her.”",
    background:"The trap was well built. If Jesus waved the law aside, they could charge Him with despising Moses; if He ordered the stoning, He would be defying Rome, which alone held the power of execution—and contradicting His own reputation as the friend of sinners. The accusers cared nothing for the woman, and not much for the law either, which demanded both guilty parties—yet the man is nowhere in sight. What Jesus wrote in the dirt, we are never told. It was enough that the accusers, starting with the oldest, drifted away one by one.",
    prophecy:"Ezekiel had put God’s own heart into words: “I have no pleasure in the death of the wicked; but that the wicked turn from his way and live.” By refusing to condemn while still forbidding the sin, Jesus acts that word out in a temple courtyard. And some have caught an echo, in His writing on the ground, of Jeremiah’s line that those who forsake the Lord are “written in the earth.”",
    meaning:"Christ neither excuses the sin nor crushes the sinner. Convicted by their own consciences, the accusers slip out, until only the sinner and the sinless One are left standing there. And He is the one person present who actually had the right to throw a stone—and He will not. Instead He gives her both pardon and power in a single breath: “Neither do I condemn thee: go, and sin no more.”",
    revealed:"The one person qualified to judge her chooses to save her instead; the only sinless man in the courtyard refuses to throw the first stone. That is the heart of God toward the guilty, shown in a single scene. He forgives with an authority that belongs to God alone—and His mercy is no soft looking-the-other-way. It is a command to a whole new life: go, and sin no more.",
    moments:["Set in the midst to entrap Him","Jesus stoops and writes on the ground","“He that is without sin… cast a stone”","The accusers withdraw, from the eldest","“Neither do I condemn thee: go, and sin no more”"],
    lessons:["Christ neither excuses sin nor crushes the sinner—He does both harder things at once.","The stone drops from the hand that examines its own heart first.","His pardon is never permission; it comes with “go, and sin no more.”"],
    quote:"While He does not palliate sin, nor lessen the sense of guilt, He seeks not to condemn, but to save.", },

  { id:"man-born-blind", era:"jerusalem", title:"The Man Born Blind", gospel:"John 9", ref:"John 9:1–41",
    lens:"John tells this sign as both a healing and a trial. A blind man gets his sight—and then sees more clearly than the religious experts cross-examining him. The whole miracle turns into a running commentary on Jesus’ claim to be the light of the world.",
    scripture:"“One thing I know, that, whereas I was blind, now I see.”",
    setting:"Jesus notices a man who has been blind since birth. The disciples want to know whose sin caused it—his or his parents’? Jesus throws out the whole question and says instead that the works of God are about to be shown. He makes clay, smears it on the man’s eyes, and sends him to wash in the pool of Siloam. The man comes back seeing. Then the trials begin: neighbors argue over whether it is even him, the Pharisees interrogate him, his parents get pressured into silence, and the healed man only grows bolder—until they throw him out. Jesus goes and finds him, reveals Himself as the Son of God, and the man falls down and worships.",
    background:"Blindness usually meant poverty, dependence, and a whisper that God must be punishing someone. The disciples’ question—whose fault is this?—is the common human reflex to explain suffering by assigning blame. And the pool of Siloam was a real, findable Jerusalem landmark; John’s naming it roots the sign in the city’s actual geography, not a vague “somewhere.”",
    prophecy:"Isaiah had promised that in the day of salvation blind eyes would be opened. Jesus keeps that promise on both levels at once—literally, for the man; and spiritually, exposing a far deeper blindness in the leaders who will not see the Light standing right in front of them.",
    meaning:"Christ does not treat a suffering person as a theological puzzle to be solved; He treats him as someone to be rescued. The man obeys a strange command, receives his sight, and then testifies with the plain, unshakable simplicity of someone who was there. He cannot answer every clever question the Pharisees fire at him—but he knows the One who changed him, and that turns out to be enough.",
    revealed:"Jesus is the light of the world, giving both kinds of sight—the eyes and the soul. And notice the end: after respectable religious society has thrown the man out, Jesus goes looking for him. The healed soul is never left standing alone once it stands with Christ.",
    witness:"John’s account has the grain of a real public dispute: neighbors unsure it is even the same man, parents afraid of being thrown out of the synagogue, authorities split over the Sabbath, and the healed man’s testimony sharpening the harder they push him. It reads less like a polished legend and more like a memory people argued about.",
    moments:["Jesus sees the man born blind","He rejects blame as the explanation","The man washes in Siloam and sees","Interrogation follows the miracle","Jesus finds him and receives his worship"],
    lessons:["Christ treats sufferers as people to redeem, not puzzles to explain.","A plain testimony—“I was blind, now I see”—can outlast every clever objection.","When the world casts out the one He has healed, Christ comes looking for him."],
    quote:"As the sunbeams penetrate to the remotest corners of the earth, so does the light of the Sun of Righteousness shine upon every soul." },

{ id:"good-shepherd", era:"jerusalem", title:"The Good Shepherd", gospel:"John 10", ref:"John 10:1–18",
    lens:"The Good Shepherd discourse is John’s, one of the great “I am” sayings by which Jesus keeps revealing Himself. Set against the false shepherds of Israel, and drawing on the prophets’ promise that God Himself would shepherd His people, it belongs to John’s high portrait of the Son who lays down His life of His own free will—and takes it up again.",
    scripture:"“I am the good shepherd: the good shepherd giveth his life for the sheep.”",
    setting:"In the temple courts, with the rulers’ hostility all around Him, Jesus paints a picture as old as Israel itself: a shepherd who comes in by the door, whose sheep know his voice and follow him, and who—unlike the hired hand who bolts when the wolf shows up—lays down his life for the flock. “I am the good shepherd,” He says; “I know my sheep, and am known of mine.”",
    background:"In a country full of shepherds, the flock spent the night in a walled fold with one doorway, and the shepherd himself lay down across the opening so that nothing could get in or out except past him. Sheep were led, not driven, and they answered to the voice and the names their own shepherd had given them. Against that everyday scene Jesus set Himself as both the Door of the sheep and the Shepherd who dies for them.",
    prophecy:"The prophets had blistered the false shepherds of Israel who fattened themselves and scattered the flock, and had promised that God Himself would come to shepherd His people, setting over them one Shepherd, His servant David. By taking the title on His own lips, Jesus announces the promise fulfilled: the Lord has come in person to seek and gather His own.",
    meaning:"Christ does not just stand guard over the flock; He dies for it—and no one takes that life from Him; He lays it down Himself. His sheep are safe, not because of their own grip, but because of His hand and the Father’s, and no one can tear them out of it. To belong to Him is to be known by name, and led by a voice that will never once mislead you.",
    revealed:"“I am the good shepherd” is one of Christ’s great self-revelations, binding the tenderness of a shepherd to the authority of God—who alone, the Scriptures say, is Israel’s Shepherd. And He adds something larger: He has other sheep, not of this fold, that He must also bring. One flock, gathered out of every nation, under one Shepherd.",
    moments:["The door of the sheepfold","“My sheep hear my voice”","The hireling flees, the shepherd stays","“The good shepherd giveth his life for the sheep”","“Other sheep I have… one fold, one shepherd”"],
    lessons:["The Good Shepherd does not merely guard the flock; He dies for it.","His sheep are safe in His hand and the Father’s, not in their own grip.","To belong to Him is to be known by name and led by a trustworthy voice."],
    quote:"Jesus knows us individually, and is touched with the feeling of our infirmities. He knows us all by name. He knows the very house in which we live, the name of each occupant.", },

        { id:"mission-seventy", era:"jerusalem", title:"The Mission of the Seventy", gospel:"Luke 10", ref:"Luke 10:1–24",
    lens:"Only Luke records the sending of the seventy, and it suits his wide-angle view of the gospel. The mission reaches past the Twelve, runs ahead to towns Jesus Himself will visit, and quietly signals that the work of the kingdom will not rest on one small circle. The harvest is large because the mercy behind it is large.",
    scripture:"“The harvest truly is great, but the labourers are few.”",
    setting:"The Lord appoints seventy more and sends them out two by two, ahead of Him, into every town He plans to visit. They travel light, without the usual safety-nets a traveler counted on—speaking peace over every house, taking whatever hospitality they are given, healing the sick, announcing that the kingdom of God has come near. Some towns will welcome them; others will slam the door. And when the seventy come back thrilled that even demons obeyed them in His name, Jesus lifts their eyes higher: do not rejoice in that—rejoice that your names are written in heaven.",
    background:"The number seventy carries echoes—of Israel’s elders, and, in the old table of nations, of the whole human family. Luke may want you to feel both order and reach: this is no private burst of enthusiasm, but a commissioned mission under the Lord of the harvest. Sent out as lambs among wolves, they have to lean on the message, on the hospitality of peace, and on Christ’s authority rather than on purse, bag, or self-defense. And they go ahead of Him—their work is preparation. The messenger never replaces the Lord; he only gets the town ready for His arrival.",
    prophecy:"Isaiah had sung of beautiful feet that bring good news and publish peace. Here those feet go two by two down the roads of Judea and Perea, ahead of the King’s own arrival. The nearness of the kingdom is no longer a far-off hope preached in a temple; it is carried house to house by ordinary disciples, on Jesus’ orders.",
    meaning:"Mission starts on its knees before it ever starts on the road: pray the Lord of the harvest to send out workers. Then it goes forward in dependence, simplicity, courage, and peace. But watch how carefully Jesus guards His workers against the head-rush of visible success. Power over evil is real enough—it just is not the deepest joy. The deepest joy is simply to belong to God, name written in heaven.",
    revealed:"Christ is Lord of the harvest, sender of the workers, giver of peace, and conqueror of Satan. And Luke shows Him actually rejoicing in spirit—glad that the Father hides these things from the clever and reveals them to babes. His joy is wrapped up in the Father’s gracious will, and in watching the humble receive what the proud walk right past.",
    witness:"The instructions have the ring of real mission practice—lodging customs, greetings on the road, table fellowship, towns that turn you away, messengers sent in pairs. Luke has preserved not just a saying about mission, but the actual working shape of it in the villages Jesus was walking toward.",
    moments:["Seventy are appointed and sent two by two","They are sent as lambs among wolves","Peace is spoken to households","The sick are healed and the kingdom announced","Rejected towns are warned soberly","The disciples return with joy","Jesus points them to names written in heaven"],
    lessons:["Mission begins in prayer before it becomes activity.","The kingdom advances on dependence, not on self-protection.","Rejoice not that the work succeeds, but that your name is known in heaven."],
    quote:"When we have a realization of our weakness, we learn to depend upon a power not inherent." },

{ id:"good-samaritan", era:"jerusalem", title:"The Good Samaritan", gospel:"Luke 10", ref:"Luke 10:25–37",
    lens:"Luke alone records this parable, and it fits his running concern for mercy that crosses despised lines. The lawyer’s question—“Who is my neighbour?”—gets turned inside out. The real question, Jesus shows, is not who qualifies as my neighbor, but whether I will become one to the wounded person in front of me.",
    scripture:"“Go, and do thou likewise.”",
    setting:"A lawyer tries to test Jesus: what must I do to inherit eternal life? Jesus turns him back to the law—love God, love your neighbor. Wanting to justify himself, the man asks, “And who is my neighbour?” So Jesus tells him about a man beaten and left half-dead on the Jerusalem–Jericho road. A priest comes by and crosses over. A Levite does the same. Then a Samaritan—of all people—sees him, is moved, cleans and binds the wounds, puts the man on his own animal, takes him to an inn, and pays the bill. Which one, Jesus asks, was the neighbor? The one who showed mercy.",
    background:"The road from Jerusalem down to Jericho dropped through lonely, bandit-ridden country. A priest and a Levite were the respected religious professionals of the day; a Samaritan was exactly the person a Jewish audience would have despised. And Jesus deliberately makes the despised outsider the hero—the one who actually keeps the law of love—exposing how much religious knowledge can walk right past a bleeding man while plain compassion stops.",
    prophecy:"The law had always tied love for God to hands-on mercy, right down to caring for the stranger and even the enemy’s stray ox. Jesus’ story refuses to let that heart of the law be fenced in by boundary lines. It is fulfilled, He shows, only in compassion that actually costs something.",
    meaning:"The parable will not let love stay an idea in the head. Mercy here crosses the road, loses time, risks its own safety, spends its own money, and comes back afterward to check the wound. Christ makes neighbor-love concrete enough to be genuinely inconvenient—which is the only kind that counts.",
    revealed:"Jesus is the Teacher who sees straight through a self-justifying question and walks the soul back to mercy. And there is a deeper layer: He is Himself the Samaritan of the story—the despised outsider who comes to us where we lie wounded, binds what sin has broken, and pays, out of His own pocket, the whole cost of our healing.",
    moments:["A lawyer asks about eternal life","Jesus points to love for God and neighbour","A wounded man is passed by","The Samaritan stops in compassion","Jesus commands, “Go, and do thou likewise”"],
    lessons:["The question is not who counts as my neighbor, but whether I will be one.","Real mercy costs time, safety, and money; love that is convenient is barely love.","Christ is the Samaritan who came to us, and paid our healing in full."],
    quote:"Our neighbor is every person who needs our help. Our neighbor is every soul who is wounded and bruised by the adversary. Our neighbor is everyone who is the property of God." },

  { id:"mary-martha", era:"jerusalem", title:"Mary and Martha", gospel:"Luke 10", ref:"Luke 10:38–42",
    lens:"Luke sets this household scene right after the Good Samaritan, and the pairing is on purpose. Between them they put doing and listening in their proper order: yes, mercy has to act—and yet discipleship has first of all to sit down at the feet of Jesus and listen.",
    scripture:"“Mary hath chosen that good part, which shall not be taken away from her.”",
    setting:"Jesus comes to a village, and Martha welcomes Him into her home. Her sister Mary settles at His feet and drinks in every word, while Martha is run off her feet with the serving. Frazzled and feeling abandoned, Martha comes and asks Jesus to order Mary to get up and help. He answers gently, and by name: “Martha, Martha, thou art careful and troubled about many things: but one thing is needful,” and Mary has chosen the better part—the one thing that will not be taken from her.",
    background:"To sit at a teacher’s feet was the posture of a disciple in training. Mary quietly takes a seat many in that world would not have expected a woman to take—and Jesus defends her right to be there and to receive His word. And notice: Martha’s serving is never despised. It is only her distraction, her divided and anxious heart, that He gently names out loud.",
    prophecy:"The prophets had called God’s people not only to work but to listen—“incline your ear, come unto me: hear, and your soul shall live.” In this Bethany house that ancient invitation gets suddenly personal, because the Word made flesh is sitting in the living room, giving Himself to be heard.",
    meaning:"Good, well-meant service can curdle into anxiety the moment it loses sight of the Person it is for. Jesus does not ask Martha to love Him less or serve Him less—only to be less divided down the middle. The “better part” is not idleness. It is receiving Him before working for Him.",
    revealed:"Christ is the Lord who seats a woman among His disciples and, without a hint of scolding, untangles an anxious heart. He is not ungrateful for the meal—but He has come to give something better than dinner: His own word.",
    moments:["Martha welcomes Jesus into her house","Mary sits at His feet","Martha becomes burdened and resentful","Jesus names her anxious distraction","Mary's chosen part is defended"],
    lessons:["Service loses its center the moment it loses sight of Christ Himself.","Being near Him comes before working for Him; worship precedes usefulness.","He never scolds our love, only our divided and anxious hearts."],
    quote:"Mary was storing her mind with the precious words falling from the Saviour’s lips, words that were more precious to her than earth’s most costly jewels." },
    { id:"lords-prayer", era:"jerusalem", title:"The Lord’s Prayer", gospel:"Luke 11 · Matthew 6", ref:"Luke 11:1–13",
    lens:"Luke gives the prayer as an answer to a disciple who has just watched Jesus pray; Matthew keeps its fuller form inside the Sermon on the Mount. Between them they make one thing clear: prayer is not first a technique to master, but a share in the Son’s own confidence before the Father.",
    parallels:"Matthew 6:9–13",
    scripture:"“Lord, teach us to pray.”",
    setting:"Jesus has been praying somewhere, off by Himself. When He finishes, one of the disciples asks, “Lord, teach us to pray, as John also taught his disciples.” He answers with words plain enough for a child and deep enough to hold a whole lifetime of faith: Father, hallowed name, coming kingdom, daily bread, forgiven sins, rescue from temptation. Then He tells about a friend who bangs on the door at midnight, to teach persistence, and gives the open-handed command: ask, seek, knock. If flawed human fathers still know how to hand a hungry child bread instead of a stone, how much more will the heavenly Father give the Holy Spirit to those who ask Him?",
    background:"Jewish prayer was already rich—psalms, synagogue forms, the memory of the temple, devotion around the family table. And disciples often learned a distinctive prayer from their teacher. But Jesus gives more than a set of phrases to recite. He teaches His followers to stand exactly where He stands: in front of God as Father, with reverence and dependence and honesty and trust. That word “Father” is not casual chumminess; it is intimate and holy at once, made safe only by the Son who brings us in with Him.",
    prophecy:"The prophets had looked toward a renewed people who would call on the Lord from the heart and be given His Spirit. In Jesus’ teaching that promise turns startlingly intimate. The Father is not reluctant, waiting to be worn down; and the gift He most wants to give is not just bread for the day but the Holy Spirit for the soul.",
    meaning:"Prayer starts with God’s name before it ever gets to our needs—yet no need is too ordinary to bring. Daily bread, daily forgiveness, daily protection, daily surrender: all of it belongs in a child’s ordinary speech to the Father. And the persistence Jesus urges is not a way of wearing down a reluctant God; it is the slow training of our own desire in the presence of His goodness. Forgiven people learn to forgive because they are living out of mercy, not out of their own supply.",
    revealed:"Jesus is the praying Son who teaches us to say “Father.” Through Him prayer can be bold without going careless, persistent without turning suspicious, humble without shrinking into fear. He does not just describe access to God from the outside. He walks us through the door.",
    witness:"The fact that Matthew and Luke preserve slightly different forms is not a problem to explain away; it is a window. A teacher taught his best material more than once, tuned to the room, and Jesus very likely did the same with this prayer. And the heart of it never moves: God’s honor, God’s kingdom, daily dependence, forgiveness, deliverance.",
    moments:["A disciple asks to be taught to pray","Jesus gives the pattern of prayer","Daily bread and forgiveness are named","The friend at midnight teaches persistence","Ask, seek, and knock","The Father gives the Holy Spirit"],
    lessons:["Prayer is not a technique to master but access to a Father who welcomes us.","No need is too ordinary to bring, and none is met before His name is honored.","The Father’s best gift is not the day’s bread but His own Spirit."],
    quoteSource:"Thoughts from the Mount of Blessing",
    quote:"So ready, so eager, is the Saviour’s heart to welcome us as members of the family of God, that in the very first words we are to use in approaching God He places the assurance of our divine relationship, “Our Father.”" },


    { id:"ten-lepers", era:"jerusalem", title:"The Ten Lepers", gospel:"Luke 17", ref:"Luke 17:11–19",
    lens:"Only Luke tells this healing, and he makes the one grateful man a Samaritan. It fits his long road to Jerusalem, where mercy keeps stepping over boundaries and the outsider so often sees most clearly. Cleansing goes out to ten. Worship comes back in one.",
    scripture:"“Were there not ten cleansed? but where are the nine?”",
    setting:"On the way toward Jerusalem, through the borderlands between Samaria and Galilee, ten lepers meet Jesus—kept at a distance by their disease, but not silenced by it. They call out together: “Jesus, Master, have mercy on us.” This time He does not reach out and touch, as He did the earlier leper. He simply sends them off to show themselves to the priests. And as they walk—before any priest has said a word—the leprosy lifts off them. One of the ten turns around, praising God at the top of his voice, throws himself face-down at Jesus’ feet, and thanks Him. He is a Samaritan.",
    background:"Leprosy cut a person off from home, worship, work, and every human touch. Lepers formed their own miserable fellowship, and in this band the usual Jewish–Samaritan hatred seems to have dissolved in shared suffering. The order to go show themselves to the priests took faith to obey, because a priest’s inspection only made sense if the cleansing had already happened. They set out still visibly sick—and the healing caught up with them on the road.",
    prophecy:"Cleansing lepers was one of the signs of messianic mercy, and the prophets had also foreseen the blessing reaching past Israel’s borders. Here the foreigner does both at once—receives the mercy, and then finds his way to the one right place to give thanks for it: the feet of Jesus.",
    meaning:"All ten are healed; only one comes back. And “Where are the nine?” is not bitterness in Christ—it is a searching kindness, aimed at every heart that pockets the gift and forgets the Giver. Gratitude turns out to be more than good manners; it is a kind of spiritual eyesight. The Samaritan sees what the other nine missed: a priest can certify the cleansing, but Jesus is where it came from.",
    revealed:"Christ is Master over the uncleanness, and Saviour of the outsider. He receives a Samaritan’s thanks at His feet and sends him off with a word that goes deeper than his skin: “Thy faith hath made thee whole.” The other nine were cured. This one was made whole.",
    witness:"The scene fits the borderland geography of Luke’s journey, where Jewish and Samaritan worlds rubbed against each other uneasily. And it keeps the actual priestly procedure for a restored leper—a small legal detail that roots the miracle firmly in Israel’s law, even as the mercy spills straight over the old boundary lines.",
    moments:["Ten lepers cry from afar","Jesus sends them to the priests","They are cleansed as they go","One Samaritan returns glorifying God","He falls at Jesus’ feet in thanks","Jesus asks, “Where are the nine?”","Faith is named as wholeness"],
    lessons:["It is possible to take the gift and forget the Giver—nine did.","Gratitude is a kind of spiritual sight; the thankful one saw furthest.","Nine were cured of a disease; one was made whole."],
    quote:"When the ten lepers came to Jesus for healing, He bade them go and show themselves to the priest. On the way they were cleansed, but only one of them returned to give Him glory. The others went their way, forgetting Him who had made them whole." },

{ id:"blessing-children", era:"jerusalem", title:"Blessing the Children", gospel:"Mark 10", ref:"Mark 10:13–16",
    lens:"All three Synoptics tell of the children brought to Jesus; Mark, always attentive to what Jesus felt, records that He was “much displeased” with the disciples and that He “took them up in his arms.” The saying that the kingdom belongs to such as these—and has to be received like a little child—sits very near the heart of the Synoptic gospel.",
    parallels:"Matthew 19:13–15 · Luke 18:15–17",
    scripture:"“Suffer the little children to come unto me, and forbid them not: for of such is the kingdom of God.”",
    setting:"Parents bring their little ones—even babies in arms—hoping Jesus will touch and bless them. The disciples, sure this is beneath His dignity and a waste of His time, shoo them away. And Jesus is genuinely displeased with the disciples: “Suffer the little children to come unto me, and forbid them not: for of such is the kingdom of God.” Then He gathers the children up in His arms, puts His hands on them, and blesses them.",
    background:"It was a Jewish custom to bring children to a respected teacher for a blessing—yet the disciples, still dreaming of a grand and busy kingdom, filed the little ones under “interruption.” Children counted for almost nothing in the ancient world, easy to overlook. So the sight of the Lord of glory stopping for them, lifting them up, holding them, quietly overturned everyone’s sense of what actually matters. His displeasure with the disciples here is one of the very few times Scripture records that feeling in Him.",
    prophecy:"Isaiah had pictured the coming Shepherd who “shall gather the lambs with his arm, and carry them in his bosom.” Here that very tenderness is on display in the flesh, as Jesus gathers the children in. And the psalmist’s line—that out of the mouth of babes God has ordained strength—finds its answer in a kingdom you enter by being small and trusting.",
    meaning:"The Saviour of the world has time for the smallest and the least—and He turns childlike trust into the very pattern of belonging to His kingdom, which is received, not earned, the way a child simply takes a gift. He rebukes anyone who would keep the humble at arm’s length, and welcomes exactly the people the world overlooks. In His kingdom, greatness is measured by lowliness.",
    revealed:"Folding the children against Himself, Jesus shows the heart of God to be a shepherd’s and a father’s, not a distant judge’s. And the very arms that will soon be stretched out on a cross are the ones now gathering the little ones in—strength made gentle, majesty made tender.",
    moments:["The little ones brought to be blessed","The disciples rebuke the parents","“Suffer the little children to come unto me”","“Of such is the kingdom of God”","Taken up in His arms and blessed"],
    lessons:["Christ has time for the small and overlooked; no one is beneath His notice.","The kingdom is received like a gift a child takes, not earned like a wage.","Greatness in His kingdom is measured by lowliness."],
    quote:"He is as verily the helper of mothers today as when He gathered the little ones to His arms in Judea.", },

{ id:"rich-ruler", era:"jerusalem", title:"The Rich Young Ruler", gospel:"Mark 10", ref:"Mark 10:17–31",
    lens:"The rich young ruler is in all three Synoptics; Mark alone catches the detail that Jesus, “beholding him, loved him.” The hard saying about the camel and the needle’s eye, and the promise to those who leave everything, fit the Synoptics’ steady call to count the cost and follow in the way of the cross.",
    parallels:"Matthew 19:16–30 · Luke 18:18–30",
    scripture:"“One thing thou lackest… come, take up the cross, and follow me.”",
    setting:"A young ruler comes running and drops to his knees: “Good Master, what shall I do that I may inherit eternal life?” He has kept the commandments, he says, since he was a boy. And Jesus looks at him—and loves him—and names the single thing he lacks: sell what you have, give it to the poor, and come follow me. The man had great wealth. He turned and walked away grieved.",
    background:"Here was everything the age admired stacked in one person—youth, wealth, rank, a spotless public record—and, on top of it, a real hunger for eternal life. But his money had a grip on his heart, and Jesus’ one condition simply exposed the idol he would not let go of. The disciples were stunned when Jesus said a rich man gets into the kingdom about as easily as a camel through a needle’s eye—because in their world wealth was widely read as a sign of God’s favor.",
    prophecy:"The commandments the young man recited were the very words of Sinai, yet the last of them—“Thou shalt not covet”—laid bare the idol he would not name. The psalmist had warned, “if riches increase, set not your heart upon them,” and the prophets had called Israel from its trust in gold. Christ asks only what the law had always required: a heart wholly the Lord’s.",
    meaning:"The one thing he lacked was not another good deed but a surrender: the throne of his heart was still occupied by self and by gold. And notice—Christ’s love does not lower the price to keep him; it names the price exactly, because He will not share that throne with an idol. Plenty of people keep the letter of the law and still walk away sad the moment love asks for everything.",
    revealed:"Jesus looks at the young man and loves him, and in that one look reads the hidden master of his heart. What He offers is not another rule but Himself—“come… follow me”—because eternal life was never a prize you earn by ticking off commandments. It is a Person you receive, at the cost of everything else you were holding.",
    moments:["The young ruler kneels: “what shall I do?”","“All these have I kept from my youth”","Jesus, beholding him, loved him","“One thing thou lackest”","He went away grieved, having great possessions"],
    lessons:["The last idol is usually the one thing we will not put on the table.","Christ’s love names the true price rather than lowering it.","Eternal life is a Person to follow, not a prize to earn."],
    quote:"Only one thing he lacked, but that was a vital principle. He needed the love of God in the soul. This lack, unless supplied, would prove fatal to him.", },

{ id:"lazarus", era:"jerusalem", title:"The Raising of Lazarus", gospel:"John 11", ref:"John 11:1–44",
    lens:"The raising of Lazarus is John’s alone, the climactic seventh sign—and the very thing that triggers the plot to kill Jesus. “I am the resurrection, and the life” crowns all the signs. And the irony is vintage John: the act that gives Lazarus life is the act that seals Jesus’ own death. Life brings on His death, so that His death can bring life.",
    scripture:"“I am the resurrection, and the life: he that believeth in me, though he were dead, yet shall he live.”",
    setting:"Word arrives that Lazarus—the friend Jesus loves—is sick. And yet Jesus waits two more days, so that by the time He reaches Bethany, Lazarus has been four days in the tomb. Martha and Mary come to Him with their grief, and He weeps with them. Then, declaring “I am the resurrection, and the life,” He has the stone rolled back and calls out in a loud voice, “Lazarus, come forth.” And the dead man walks out of the grave, still wrapped hand and foot in his burial cloths.",
    background:"Bethany sat less than two miles from Jerusalem, just over the shoulder of the Mount of Olives, so a crowd of mourners had come out from the city. By common reckoning a body four days dead was past all hope, decay already begun—which is exactly what makes this sign undeniable, and public, worked almost at the capital’s gates. And it is this, the greatest of the miracles, that finally hardens the rulers’ resolve to kill Him—and Lazarus along with Him.",
    prophecy:"Long before, Ezekiel had stood in a valley of dry bones and heard the promise, “I will open your graves… and ye shall live.” Calling Lazarus out is that promise made good in miniature. And the words Jesus wraps around it—“I am the resurrection, and the life”—claim for Himself a power over death that the Scriptures give to God and to no one else.",
    meaning:"The greatest sign is the pledge of the greatest hope: the One who calls Lazarus out of the grave holds the keys of death, and to trust Him is to hold a life the tomb cannot end. And notice—He wept, even knowing He was about to raise His friend. That is a Saviour who steps all the way into our grief before He lifts it. The delay that looked like failure turned out to be the stage for a larger glory.",
    revealed:"“I am the resurrection, and the life”—not merely someone who can raise the dead, but the living source of life itself. The voice that summoned a four-days’ corpse up out of decay is the Creator’s own voice. And it is the guarantee that the same voice will one day call out every person who sleeps in Him.",
    moments:["The message: “he whom thou lovest is sick”","Four days in the grave","“I am the resurrection, and the life”","“Jesus wept” at the tomb","“Lazarus, come forth”"],
    lessons:["The One who holds the keys of death offers a life the grave cannot end.","Christ weeps with us before He lifts the sorrow—He is not aloof from our grief.","Delays that look like failure can be the setting for a greater glory."],
    quote:"He who Himself was soon to die upon the cross stood with the keys of death, a conqueror of the grave, and asserted His right and power to give eternal life.", },

    { id:"bartimaeus", era:"jerusalem", title:"Blind Bartimaeus", gospel:"Mark 10 · Matthew 20 · Luke 18", ref:"Mark 10:46–52",
    lens:"All three Synoptics set this healing near Jericho, as Jesus makes His last approach to Jerusalem. Mark alone gives the blind man a name—Bartimaeus—and lets his cry, “Son of David,” ring out on the very edge of the royal entry into the city.",
    parallels:"Matthew 20:29–34 · Luke 18:35–43",
    scripture:"“Jesus, thou Son of David, have mercy on me.”",
    setting:"Jesus passes through Jericho with His disciples and a big crowd. Bartimaeus, blind and begging by the roadside, hears that it is Jesus of Nazareth going by and starts shouting: “Jesus, thou Son of David, have mercy on me.” People tell him to be quiet—and he only shouts louder. Jesus stops in His tracks and has the man called over. Bartimaeus flings off his cloak, jumps up, and comes. “What wilt thou that I should do unto thee?” Jesus asks. “Lord, that I might receive my sight.” “Go thy way; thy faith hath made thee whole.” Instantly he can see—and instead of going his way, he follows Jesus down the road.",
    background:"Jericho sat on the pilgrim road up to Jerusalem, and Passover crowds would have been streaming through. Beggars staked out the spots with the heaviest traffic. The crowd’s attempt to hush him could have come from simple annoyance, or nervousness about that dangerous “Son of David” language, or the sense that a great Teacher should not be held up by a blind man bawling from the ditch. Bartimaeus hears none of that. He hears an opening that may never come by again.",
    prophecy:"Isaiah had promised that blind eyes would be opened in the day of salvation, and “Son of David” names Jesus outright as the promised King. The irony is almost too neat to miss: the blind beggar sees the King more clearly than half the sighted people crowding the road.",
    meaning:"Faith refuses to be shushed when mercy is walking past. Bartimaeus has no rank, no leverage, nothing to bargain with—just a voice, and he spends the whole of it on Jesus. When he is called, he throws off the cloak that likely held the day’s coins and comes with empty hands. And when the healing is done he does not simply wander off seeing. He falls in behind Jesus, on the road that leads to a cross.",
    revealed:"Christ is the Son of David who stops dead in the road for the cry of a beggar. Royal glory does not make Him hard to reach. His kingship shows itself precisely in mercy—mercy that asks “what do you want?”, listens, heals, and then folds the healed man into the company of His followers.",
    witness:"The small differences between the accounts are the kind that turn up in genuine remembered testimony, not in a copied script: Matthew mentions two blind men, Mark names Bartimaeus, Luke keeps to one unnamed man near Jericho. The core event stays perfectly clear, while each witness leans on a slightly different angle of the same mercy.",
    moments:["Bartimaeus sits begging by the road","He hears that Jesus is passing by","He cries, “Son of David, have mercy on me”","The crowd tries to silence him","Jesus stands still and calls him","His sight is restored","He follows Jesus in the way"],
    lessons:["Faith refuses to be silenced when mercy is passing by.","The King of glory stops for the cry of a nobody by the road.","The healed do not just walk away seeing; they follow."],
    quote:"Never did a soul utter that cry unheeded." },

{ id:"zacchaeus", era:"jerusalem", title:"Zacchaeus", gospel:"Luke 19", ref:"Luke 19:1–10",
    lens:"Zacchaeus belongs to Luke alone—the last scene of his long journey to Jerusalem, and a perfect emblem of the whole thing. A despised tax collector sought out and saved, capped with “the Son of man is come to seek and to save that which was lost,” sums up Luke’s entire portrait of a Saviour for everyone.",
    scripture:"“The Son of man is come to seek and to save that which was lost.”",
    setting:"As Jesus comes through Jericho, Zacchaeus—a rich chief tax collector—badly wants to see Him, but he is short, and the crowd is a wall. So he runs on ahead and climbs a sycamore tree. Jesus stops right under it, looks up, and calls him by name: “Zacchaeus, make haste, and come down; for to day I must abide at thy house.” The crowd grumbles that He has gone off to be the houseguest of a sinner. But Zacchaeus stands up and vows to pay back fourfold everything he ever cheated—and Jesus says, “This day is salvation come to this house.”",
    background:"Jericho was a wealthy city on the trade routes near the Jordan, a hub for collecting tolls and customs; a chief publican like Zacchaeus had gotten rich off the taxes of his own people and was written off as a traitor and a swindler, barred from the synagogue. For Jesus to invite Himself into that man’s house and eat there was to walk straight into the scandal of the pious. And Zacchaeus’ pledge blew right past what the law asked—which was only a fifth added on. He offered the fourfold repayment owed by a convicted thief.",
    prophecy:"Ezekiel had foretold a Shepherd-God who would “seek that which was lost, and bring again that which was driven away.” Here that word walks around on two feet: “the Son of man is come to seek and to save that which was lost.” And a despised son of Abraham is put back in his place among the people of the promise.",
    meaning:"Grace goes looking for the despised tax collector and works a change no law could ever force. The seeking love of Christ was up that tree before Zacchaeus ever climbed down. And “salvation come to this house” is proved not by a feeling but by restitution actually made, wrong actually set right. No repentance is real that leaves the hands still full of what they wrongly took.",
    revealed:"Jesus knows the man’s name before a word passes between them, and claims a right to seek and to save that belongs to God the Shepherd. And in going out of His way for one small, hated man, He shows the errand of His whole life—and what a single soul is worth to heaven.",
    moments:["Zacchaeus climbs the sycamore to see","“Make haste, and come down”","Received with joy, murmured against by the crowd","Fourfold restitution freely vowed","“Salvation is come to this house”"],
    lessons:["Christ’s seeking love reaches us before we ever reach for Him.","Real repentance shows in restitution—hands emptied of what was wrongly taken.","Heaven will go out of its way for one despised soul."],
    quote:"Beneath the appearance of worldliness and pride was a heart susceptible to divine influences.", },

{ id:"anointing", era:"jerusalem", title:"The Anointing at Bethany", gospel:"John 12 · Matthew 26", ref:"John 12:1–8",
    lens:"Matthew, Mark, and John all tell of the anointing at Bethany (Luke’s is a different scene); John alone names Mary and Judas. Set six days before the Passover, every version reads it the same way—as an anointing for burial. It is an act of extravagant love the Gospels place, on purpose, in the deep shadow of the cross.",
    parallels:"Matthew 26:6–13 · Mark 14:3–9",
    scripture:"“She hath wrought a good work upon me… she did it for my burial.”",
    setting:"At supper in Bethany, six days before the Passover, Mary takes a pound of pure, costly spikenard, breaks open the alabaster jar, and pours it over Jesus’ feet, wiping them with her hair, until the whole house is heavy with the scent. Judas complains that it could have been sold and the money given to the poor. Jesus shuts him down and defends her: “Let her alone… she is come aforehand to anoint my body to the burying.”",
    background:"For a woman to loosen her hair and anoint a guest’s feet at a public meal was a startling, self-forgetting thing to do—more startling still because the ointment, pure nard hauled in from far-off lands, was worth close to a year’s wages. Anointing was for kings, for honored guests, and for the dead; Mary’s single gift managed to touch all three. And Judas, who kept the common purse and helped himself from it, dressed his greed up as concern for the poor—the way false piety so often does.",
    prophecy:"The very titles Messiah and Christ mean the Anointed One; and here, on the eve of His passion, He is anointed—not by a priest for a throne, but by a loving woman for a grave. So the King is prepared for a burial that will open into resurrection—and the fragrance of what she did keeps drifting out, exactly as He promised, wherever the gospel is told.",
    meaning:"Love pours out its best without stopping to total the bill, and what a calculating heart writes off as waste is treasured in heaven. While Judas is still resenting the expense, Mary’s devotion is received as an anointing for the burial only days away, and set into the gospel as a memorial forever. She gave what she could, in the one hour she had it to give—and it was enough.",
    revealed:"Jesus accepts the homage poured over His feet, and reads in it a preparation for His burial—knowing, as no one else at that table did, the cross that stood only six days off. He receives worship as His by right, and yet He turns it toward the grave: the Anointed King who is about to reign by dying.",
    moments:["Supper at Bethany, six days before the Passover","The alabaster box of spikenard broken","The feet anointed, the house filled with fragrance","Judas murmurs of the waste","“She did it for my burial”"],
    lessons:["Love that stops to count the cost is not yet love.","What the calculating call waste, heaven treasures.","Give your best in the hour you have it—“she did what she could.”"],
    quote:"Had these words been spoken when the weary spirit needed them so much, when the ear could hear and the heart could feel, how precious would have been their fragrance!", },

{ id:"triumphal-entry", era:"jerusalem", title:"The Triumphal Entry", gospel:"Matthew 21", ref:"Matthew 21:1–11",
    lens:"The entry into Jerusalem is in all four Gospels, each one recalling the prophet’s meek king “upon an ass.” The Synoptics make it the opening of the final week; Luke adds Jesus’ tears over the city, and John the palms and the crowd streaming out from Bethany. Together it is the one public acclamation of His whole earthly life—and it happens on the road to the cross.",
    parallels:"Mark 11:1–11 · Luke 19:28–44 · John 12:12–19",
    scripture:"“Hosanna to the Son of David: Blessed is he that cometh in the name of the Lord.”",
    setting:"Meek and lowly, riding a borrowed colt no one has ever sat on, Jesus comes down the Mount of Olives toward Jerusalem, while the crowds throw their cloaks and palm branches across the road and shout, “Hosanna to the Son of David!” It is the one open, royal welcome of His earthly life. And yet, as the city comes into view, He breaks down and weeps over it, seeing its ruin coming, “because thou knewest not the time of thy visitation.”",
    background:"The city was packed for Passover, and many in the crowd had seen or heard about the raising of Lazarus, so messianic hope was running hot; palm branches were an old emblem of national triumph. But here is the deliberate detail: a king rode to war on a horse—Jesus came on the foal of a donkey, the mount of peace, claiming the throne and refusing the sword in the same gesture. And within a few days this same city that shouted “Hosanna” would be shouting “Crucify him.”",
    prophecy:"Centuries earlier Zechariah had told Zion to rejoice: “behold, thy King cometh unto thee… lowly, and riding upon an ass, and upon a colt the foal of an ass.” Jesus fulfills the word deliberately, to the letter. And the crowd’s cry, lifted straight out of the psalm—“Blessed is he that cometh in the name of the Lord”—hails Him as the promised Son of David.",
    meaning:"The King comes as the Prince of Peace—not on a war-horse, but on a borrowed colt—offering Himself openly to Jerusalem at last. For one hour the world watches its King acclaimed. And yet, even through the Hosannas, He is looking past the crowd to the cross, and weeping for the city that will not recognize its day of visitation. He accepts the homage—and rides on to die.",
    revealed:"By staging the entry to fulfill the prophet’s word, Jesus openly claims to be the King of Zion. And by weeping over the city on the way in, He shows the heart of a King who longs to save even the people who are about to reject Him. Majesty and meekness meet here in one man: the Son of David, enthroned on lowliness.",
    moments:["The colt made ready, as foretold","Garments and palms spread in the way","“Hosanna to the Son of David!”","Jesus weeps over Jerusalem","The King enters His city"],
    lessons:["Christ’s kingship comes on the mount of peace, not the war-horse.","Even in His hour of acclaim, His eye was on the cross and on the lost.","Crowds that shout Hosanna one day can shout “Crucify” the next; feeling is not faith."],
    quote:"Never before had the world seen such a triumphal procession. It was not like that of the earth’s famous conquerors. No train of mourning captives, as trophies of kingly valor, made a feature of that scene.", },

  { id:"greeks-seek", era:"jerusalem", title:"The Greeks Seek Jesus", gospel:"John 12", ref:"John 12:20–36",
    lens:"John places the arrival of these Greek seekers right after the triumphal entry. Their small request is a signal: the hour has come. The Son of man will draw all peoples to Himself—not by grabbing a throne, but by falling into the ground like a grain of wheat, and dying.",
    scripture:"“And I, if I be lifted up from the earth, will draw all men unto me.”",
    setting:"Among the worshipers who come up to the feast are some Greeks, who go to Philip with a simple request: “Sir, we would see Jesus.” Philip tells Andrew, and the two of them bring it to Jesus. His answer seems almost to step past the request and straight into its meaning: the hour has come for the Son of man to be glorified. Unless a grain of wheat falls into the ground and dies, He says, it stays a single seed; but if it dies, it bears a great harvest. A voice from heaven answers His prayer, and He speaks of being lifted up—to draw all people to Himself.",
    background:"These Greeks were probably God-fearing Gentiles, drawn toward Israel’s worship. And their wish to see Jesus lands right on the threshold of the cross—a quiet sign that yes, the nations will come, but only through the death that clears the way for them. The crowd wants glory without the suffering. Jesus refuses to let the two be pried apart.",
    prophecy:"The prophets had seen the nations streaming toward the light of Israel’s God. Jesus now shows the road that promise actually travels: the Servant has to be lifted up and rejected—and, in exactly that, become the point around which the whole world gathers.",
    meaning:"“We would see Jesus”—and the answer He gives is the cross. To really see Him is to look at love that gives itself away. Fruit in His kingdom comes only by the grain’s surrender, its willingness to be buried; and no disciple can follow a crucified Lord while clutching a carefully self-protected life.",
    revealed:"He is the Son of man whose death becomes the magnet that pulls the nations in. His glory was never escape from suffering; it is holy love poured out right through the middle of it.",
    moments:["Greek worshipers ask to see Jesus","Philip and Andrew bring the request","Jesus says His hour has come","The grain of wheat must die to bear fruit","The lifted-up Christ will draw all"],
    lessons:["To truly see Jesus is to look at the cross.","Fruitfulness comes only by the seed’s surrender—there is no harvest without the burial.","You cannot follow a crucified Lord while guarding a self-protected life."],
    quote:"In the request of the Greeks He saw an earnest of the results of His great sacrifice." },

    { id:"fig-tree", era:"passion", title:"The Fig Tree and Faith", gospel:"Mark 11 · Matthew 21", ref:"Mark 11:12–25",
    lens:"Mark deliberately wraps the temple cleansing inside the fig-tree story, so that the tree explains the temple and the temple explains the tree. Leaves with no fruit stand right next to worship with no prayer. Matthew compresses the withering; Mark lets it play out over two mornings, giving the whole thing the weight of a solemn acted parable in the last week.",
    parallels:"Matthew 21:18–22",
    scripture:"“Have faith in God.”",
