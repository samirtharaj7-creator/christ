      {
        "verse": "17:3",
        "text": "And this is life eternal, that they might know thee the only true God, and Jesus Christ, whom thou hast sent."
      },
      {
        "verse": "17:4",
        "text": "I have glorified thee on the earth: I have finished the work which thou gavest me to do."
      },
      {
        "verse": "17:5",
        "text": "And now, O Father, glorify thou me with thine own self with the glory which I had with thee before the world was."
      },
      {
        "verse": "17:6",
        "text": "I have manifested thy name unto the men which thou gavest me out of the world: thine they were, and thou gavest them me; and they have kept thy word."
      },
      {
        "verse": "17:7",
        "text": "Now they have known that all things whatsoever thou hast given me are of thee."
      },
      {
        "verse": "17:8",
        "text": "For I have given unto them the words which thou gavest me; and they have received them, and have known surely that I came out from thee, and they have believed that thou didst send me."
      },
      {
        "verse": "17:9",
        "text": "I pray for them: I pray not for the world, but for them which thou hast given me; for they are thine."
      },
      {
        "verse": "17:10",
        "text": "And all mine are thine, and thine are mine; and I am glorified in them."
      },
      {
        "verse": "17:11",
        "text": "And now I am no more in the world, but these are in the world, and I come to thee. Holy Father, keep through thine own name those whom thou hast given me, that they may be one, as we are."
      },
      {
        "verse": "17:12",
        "text": "While I was with them in the world, I kept them in thy name: those that thou gavest me I have kept, and none of them is lost, but the son of perdition; that the scripture might be fulfilled."
      },
      {
        "verse": "17:13",
        "text": "And now come I to thee; and these things I speak in the world, that they might have my joy fulfilled in themselves."
      },
      {
        "verse": "17:14",
        "text": "I have given them thy word; and the world hath hated them, because they are not of the world, even as I am not of the world."
      },
      {
        "verse": "17:15",
        "text": "I pray not that thou shouldest take them out of the world, but that thou shouldest keep them from the evil."
      },
      {
        "verse": "17:16",
        "text": "They are not of the world, even as I am not of the world."
      },
      {
        "verse": "17:17",
        "text": "Sanctify them through thy truth: thy word is truth."
      },
      {
        "verse": "17:18",
        "text": "As thou hast sent me into the world, even so have I also sent them into the world."
      },
      {
        "verse": "17:19",
        "text": "And for their sakes I sanctify myself, that they also might be sanctified through the truth."
      },
      {
        "verse": "17:20",
        "text": "Neither pray I for these alone, but for them also which shall believe on me through their word;"
      },
      {
        "verse": "17:21",
        "text": "That they all may be one; as thou, Father, art in me, and I in thee, that they also may be one in us: that the world may believe that thou hast sent me."
      },
      {
        "verse": "17:22",
        "text": "And the glory which thou gavest me I have given them; that they may be one, even as we are one:"
      },
      {
        "verse": "17:23",
        "text": "I in them, and thou in me, that they may be made perfect in one; and that the world may know that thou hast sent me, and hast loved them, as thou hast loved me."
      },
      {
        "verse": "17:24",
        "text": "Father, I will that they also, whom thou hast given me, be with me where I am; that they may behold my glory, which thou hast given me: for thou lovedst me before the foundation of the world."
      },
      {
        "verse": "17:25",
        "text": "O righteous Father, the world hath not known thee: but I have known thee, and these have known that thou hast sent me."
      },
      {
        "verse": "17:26",
        "text": "And I have declared unto them thy name, and will declare it: that the love wherewith thou hast loved me may be in them, and I in them."
      }

  "Luke 1:57-80": {

    if (sceneBtn) { selectScene(sceneBtn.dataset.eventId, { updateHash:true, scroll:true }); return; }
    const navBtn = e.target.closest("button[data-nav]");
    if (navBtn && !navBtn.disabled) { moveScene(navBtn.dataset.nav === "next" ? 1 : -1); return; }
    const tagBtn = e.target.closest("button[data-tag]");
    if (tagBtn) { STATE.tag = STATE.tag === tagBtn.dataset.tag ? "" : tagBtn.dataset.tag; renderReader(); return; }
    const trailBtn = e.target.closest("button[data-trail]");
    if (trailBtn) { STATE.trail = STATE.trail === trailBtn.dataset.trail ? "" : trailBtn.dataset.trail; renderReader(); return; }
    if (e.target.closest("[data-clear-filters]")) { clearReaderFilters(); return; }
    if (e.target.closest("[data-reading-mode]")) { STATE.readingMode = !STATE.readingMode; renderSceneRail(); syncReaderMode(); return; }
  });
  document.addEventListener("input", e => {
    const input = e.target.closest("[data-top-search]");
    if (!input) return;
    STATE.search = input.value;
    renderReader({ keepSearchFocus:true });
  });
  document.addEventListener("click", e => {
    const overviewScene = e.target.closest("[data-overview-scene]");
    if (overviewScene) { selectScene(overviewScene.dataset.overviewScene, { updateHash:true, scroll:true }); return; }
    const audienceCard = e.target.closest("[data-audience]");
    if (audienceCard) { STATE.audience = audienceCard.dataset.audience; renderAudienceCategories(); return; }
    const eventTypeCard = e.target.closest("[data-event-type]");
    if (eventTypeCard) { STATE.eventType = eventTypeCard.dataset.eventType; renderEventTypeCategories(); return; }
    const themeCard = e.target.closest("[data-overview-trail]");
    if (themeCard) { STATE.overviewTrail = themeCard.dataset.overviewTrail; renderThemeTrailCategories(); return; }
    const placeCard = e.target.closest("[data-overview-place]");
    if (placeCard) { STATE.overviewPlace = placeCard.dataset.overviewPlace; renderPlaceCategories(); return; }
    const eraCard = e.target.closest(".tl-era-card[data-era]");
    if (eraCard) { e.preventDefault(); STATE.overviewEra = eraCard.dataset.era; setActiveEra(STATE.overviewEra); return; }
    const link = e.target.closest('a[data-era][href^="#era-"]');
    if (!link) return;
    e.preventDefault();
    selectFirstInEra(link.dataset.era, { scroll:true });
  });
  window.addEventListener("hashchange", () => {
    const ev = sceneFromHash();
    if (ev) selectScene(ev.id, { updateHash:false, scroll:true });
  });
}

/* ---- scene state for timeline/top navigation ---- */
function initScrollSpy(){
  const ev = EVENT_BY_ID.get(STATE.activeId) || EVENTS[0];
  setActiveEra(ev.era);
}

/* ======================================================================
   THE FOUR GOSPEL PORTRAITS — the living-creature emblems of the evangelists
   ====================================================================== */
const EVANGELIST = {
  man(){
    let s = C(60,25,11,0.7);
    s += `<g stroke-width="0.5">${rays(60,25,11,14,20,0.5)}</g>`;
    s += C(60,30,7.5,1.3);
    s += PT("M53,37 Q60,33 67,37 L72,80 Q60,84 48,80 Z",1.3) + line(60,39,60,76,0.5);
    s += PT("M52,44 Q26,40 19,71 Q37,58 54,58",1.1) + PT("M51,50 Q34,49 26,66",0.6);
    s += PT("M68,44 Q94,40 101,71 Q83,58 66,58",1.1) + PT("M69,50 Q86,49 94,66",0.6);
    return s;
  },
  lion(){
    let s = PT("M50,48 Q66,40 86,42 Q98,43 98,52 Q98,58 92,60 L90,62 Q76,58 60,60 Q52,58 50,52 Z",1.3);
    s += line(56,58,54,80,1.4)+line(63,59,62,80,1.4)+line(86,60,88,80,1.4)+line(93,58,96,80,1.4);
    s += PT("M84,45 Q94,47 94,58",0.5);
    s += PT("M98,50 q10,2 8,15 q-1,7 -7,8",1.1)+PT("M97,71 q-4,3 -1,8 q5,-2 5,-7 q3,4 5,-1",0.9);
    s += `<g stroke-width="0.8">`;
    for(let i=0;i<20;i++){ const a=i/20*Math.PI*2; s+=line(42+Math.cos(a)*9,44+Math.sin(a)*9,42+Math.cos(a)*15,44+Math.sin(a)*15,0.8); }
    s += `</g>`;
    s += C(42,44,9,1.3)+C(38,43,1.1,1)+PT("M33,45 q-5,1 -6,4 q3,2 7,0",1);
    return s;
  },
  ox(){
    let s = PT("M50,48 Q66,41 84,43 Q94,44 94,53 Q94,59 88,61 L86,62 Q72,58 58,60 Q52,58 50,52 Z",1.3);
    s += line(56,59,54,80,1.4)+line(64,60,63,80,1.4)+line(84,61,86,80,1.4)+line(90,59,93,80,1.4);
    s += line(94,50,99,76,1)+PT("M99,76 q-1,3 3,4",0.8);
    s += PT("M50,46 Q37,44 35,55 Q37,62 47,61 Q52,56 51,50 Z",1.3);
    s += C(42,53,1,1)+PT("M35,58 q3,2 6,0",0.6);
    s += PT("M50,44 q-2,-11 -12,-12",1.1)+PT("M43,45 q-1,-11 -11,-10",1.1);
    return s;
  },
  eagle(){
    let s = C(60,30,6,1.3);
    s += PT("M56,31 q-6,1 -7,5 q3,1 6,-1 q1,3 3,2",1) + C(61,29,0.9,1);
    s += PT("M55,36 Q60,34 65,36 L63,64 Q60,69 57,64 Z",1.2);
    s += PT("M56,40 Q34,31 14,46 Q24,48 33,45 Q26,52 37,50 Q30,57 43,54",1.1);
    s += PT("M64,40 Q86,31 106,46 Q96,48 87,45 Q94,52 83,50 Q90,57 77,54",1.1);
    s += PT("M56,64 L57,80 M60,66 L60,82 M64,64 L63,80",0.9) + PT("M57,66 l-3,5 M63,66 l3,5",0.8);
    return s;
  }
};
const PORTRAITS = [
  { id:"matthew", name:"Matthew", creature:"The Man", emblem:"man", line:"The Messiah of Israel",
    text:"Steeped in the Hebrew Scriptures, this Gospel presents Jesus as the promised Messiah and King of David’s line, the son of Abraham in whom Israel’s whole story finds its Yes. Again and again it marks how “it was fulfilled,” and it gathers His teaching into five great discourses—a new Moses giving the law of the kingdom. He is Immanuel at the first, and “I am with you alway” at the last: God with us." },
  { id:"mark", name:"Mark", creature:"The Lion", emblem:"lion", line:"The Suffering Son of God",
    text:"The swiftest Gospel, hastening from deed to deed on its restless word “immediately.” It shows Jesus as the mighty Son of God—mastering demon, disease, and storm—yet moving with fixed purpose toward the cross, for He came “to give his life a ransom for many.” Power and suffering meet in one figure; and only at Calvary does a Roman soldier confess what the reader has known from the opening line." },
  { id:"luke", name:"Luke", creature:"The Ox", emblem:"ox", line:"The Saviour for All",
    text:"The work of a careful historian who leaves no one outside the story—shepherds and Samaritans, women and children, tax-gatherers and the dying thief, the poor and the lost. Its Jesus is the compassionate Saviour whose mercy reaches beyond Israel to every people, a prophet mighty in word and deed, given to prayer and filled with the Spirit. It is a Gospel of great joy, and good news for the poor." },
  { id:"john", name:"John", creature:"The Eagle", emblem:"eagle", line:"The Eternal Son",
    text:"The Gospel that soars highest, opening not at Bethlehem but in eternity: “In the beginning was the Word, and the Word was God.” Here Jesus is the divine Son who reveals the Father—“he that hath seen me hath seen the Father”—the great “I AM” who was before Abraham, the light and life of the world. Through seven signs and the “I am” sayings it lifts the most exalted portrait of Christ, that we might believe and have life in His name." }
];

const GOSPEL_OVERVIEWS = {
  all:{ name:"All Gospels", creature:"Four Witnesses, One Christ", emblem:"all", line:"The whole witness held together", text:"Read the scenes with the full Gospel witness in view: Matthew frames promise and kingdom, Mark presses the action toward the cross, Luke gathers the poor and overlooked, John opens the glory of the eternal Son, and Acts carries the risen Christ's mission outward." },
  acts:{ name:"Acts", creature:"The Witness", emblem:"acts", line:"The risen Christ continues His work", text:"Acts is not a fifth Gospel, but it carries the story forward: the ascended Lord sends His Spirit, forms His witnesses, and turns Jerusalem's hope toward the ends of the earth. Its scene here keeps the Ascension tied to mission, promise, and return." }
};
PORTRAITS.forEach(p => { GOSPEL_OVERVIEWS[p.id] = p; });
function gospelNoteIcon(data){
  if (data.emblem === "all") return frontEmblem().replace('<svg viewBox="0 0 320 248" role="img" aria-label="Six scenes from the life of Christ: birth, baptism, ministry, cross, resurrection, and second coming">', '<svg viewBox="0 0 320 248" class="art" aria-hidden="true">');
  if (data.emblem === "acts") return '<svg viewBox="0 0 100 78" class="art" aria-hidden="true">' + EMBLEM.risen(50, 38) + '</svg>';
  return '<svg viewBox="0 0 120 96" class="art" aria-hidden="true">' + EVANGELIST[data.emblem]() + '</svg>';
}
function renderGospelNote(id = "all", variant = "inline"){
  const key = GOSPEL_OVERVIEWS[id] ? id : "all";
  const data = GOSPEL_OVERVIEWS[key];
  const count = key === "all" ? EVENTS.length : EVENTS.filter(ev => gospelsOf(ev).includes(key)).length;
  const countLabel = count + " " + (count === 1 ? "scene" : "scenes");
  const extraClass = variant === "standalone" ? " gospel-note-standalone" : "";
  return '<section class="gospel-note' + extraClass + '" data-gospel-note><div class="gospel-note-icon">' + gospelNoteIcon(data) + '</div><div><span class="gospel-note-kicker">' + escapeHtml(data.creature) + '</span><h3>' + escapeHtml(data.name) + '</h3><div class="gospel-note-line">' + escapeHtml(data.line) + '</div><p>' + escapeHtml(data.text) + '</p></div><div class="gospel-note-count">' + escapeHtml(countLabel) + '</div></section>';
}
function renderPortraits(){
  const host = document.getElementById("portraits");
  if (!host) return;
  const countOf = id => EVENTS.filter(ev => gospelsOf(ev).includes(id)).length;
  const cards = PORTRAITS.map(p => {
    const n = countOf(p.id);
    return `<div class="portrait-card" data-gospel="${p.id}" role="button" tabindex="0" aria-label="${p.name}: ${p.line}. Show the ${p.name} scenes.">
      <svg viewBox="0 0 120 96" class="art" aria-hidden="true">${EVANGELIST[p.emblem]()}</svg>
      <div class="pc-creature">${p.creature}</div>
      <h3>${p.name}</h3>
      <div class="pc-line">${p.line}</div>
      <p>${p.text}</p>
      <div class="pc-count">${n} ${n === 1 ? "scene" : "scenes"}</div>
    </div>`;
  }).join("");
  host.innerHTML = `
    <div class="tl-head">
      <span class="tl-title">Four Witnesses, One Christ</span>
      <span class="tl-sub">Each Gospel paints its own portrait · choose one to read its scenes</span>
    </div>
    <div class="portrait-grid">${cards}</div>`;
}
function initPortraits(){
  const host = document.getElementById("portraits");
  if (!host) return;
  const act = card => {
    const btn = document.querySelector(`#filter button[data-gospel="${card.dataset.gospel}"]`);
    if (btn){ btn.click(); document.getElementById("entries").scrollIntoView({ behavior:"smooth" }); }
  };
  host.addEventListener("click", e => { const c = e.target.closest(".portrait-card"); if (c) act(c); });
  host.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " "){ const c = e.target.closest(".portrait-card"); if (c){ e.preventDefault(); act(c); } } });
}
